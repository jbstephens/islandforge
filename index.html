  #game { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);

      width:96px; height:64px; font-size:16px; touch-action:none; }

  .tbtn.big { width:104px; height:104px; border-radius:50%; font-size:44px;
      background:rgba(90,200,120,0.35); border-color:rgba(160,255,180,0.7); }
  .tbtn.small { width:80px; height:80px; border-radius:50%; font-size:34px;
      background:rgba(220,90,80,0.3); border-color:rgba(255,170,150,0.65); }

      right:max(14px, env(safe-area-inset-right)); width:60px; height:60px;
      border-radius:50%; border:3px solid rgba(255,255,255,0.5);
      background:rgba(20,40,60,0.55); color:#fff; font-size:22px; font-weight:900;
      display:none; align-items:center; justify-content:center; z-index:6;

  body.input-pad #tbPause { display:none !important; }

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════════
   ISLAND FORGE — Stephens Arcade
   Kid-friendly incremental island builder. One file, zero assets:
   every sprite is baked into offscreen canvases at load, all audio is
   WebAudio synth. Per-frame hot path is drawImage + transforms only —
   all static content (ocean, land, wires, paths, buildings, trees) lives in ONE
   background canvas rebuilt only when the island changes.
   ═══════════════════════════════════════════════════════════════════════ */

const W = 1280, H = 720, TILE = 32, GY0 = 8;
/* v4b: TWO worlds. The active world's grid/canvases live in these globals;
   the inactive world's live in `otherWorld` and swap in wholesale. */
const EGW = 80, EGH = 44;                      // Earth grid
const MGW = 40, MGH = 26;                      // Moon grid (all space around one landmass)
const RGW = 44, RGH = 28;                      // v6b: Mars grid — bigger than the moon
let GW = EGW, GH = EGH;
let WORLD_W = GW * TILE, WORLD_H = GY0 + GH * TILE;   // 2560 x 1416 (Earth)
const CX = 24, CYG = 13;                       // home island centre in grid coords
const MCX = 20, MCY = 13;                      // moon landmass centre
const RCX = 22, RCY = 14;                      // mars landmass centre
const PGW = 44, PGH = 28;                      // v8a: Mercury/Jupiter grids (Mars-sized)
const PCX = 22, PCY = 14;                      // v8a: planet landmass centre (both new worlds)
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
addEventListener('resize', fit); fit();

/* ───── tiny utils ───── */
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
function mulberry(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash2(x, y) {
  let h = (x * 374761393 + y * 668265263) ^ ((x + 7) * (y + 13) * 1274126177);
  h = (h ^ (h >>> 13)) >>> 0;
  return (h % 1024) / 1024;
}
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K';
  return '' + n;
}
const tX = gx => gx * TILE, tY = gy => GY0 + gy * TILE;

/* ───── storage ───── */
const SLOT_KEY = i => 'islandforge_slot' + i;
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch (e) {} }
let best = parseInt(lsGet('islandforge_best') || '0', 10) || 0;
let muted = lsGet('islandforge_mute') === '1';

/* ───── audio (all synthesized, context created lazily on first gesture) ───── */
let actx = null, musNext = 0, chordI = 0;
function ensureAudio() {
  if (!actx) {
    const A = window.AudioContext || window.webkitAudioContext;
    if (A) { actx = new A(); musNext = actx.currentTime + 0.4; }
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol, sweepTo) {
  if (!actx || muted) return;
  const t0 = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, sweepTo), t0 + dur);
  g.gain.setValueAtTime(vol || 0.06, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur, peak, lp0, lp1) {
  if (!actx || muted) return;
  const t0 = actx.currentTime, sr = actx.sampleRate;
  const buf = actx.createBuffer(1, Math.floor(sr * dur), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length * 0.5);
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(lp0, t0);
  f.frequency.exponentialRampToValueAtTime(Math.max(30, lp1), t0 + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(f).connect(g).connect(actx.destination);
  src.start(t0); src.stop(t0 + dur + 0.05);
}
let lastTickSnd = 0;
const SFX = {

  confirm:  () => { blip(660, 0.07, 'triangle', 0.07); setTimeout(() => blip(990, 0.09, 'triangle', 0.07), 60); },
  cancel:   () => blip(330, 0.09, 'square', 0.05, 200),
  chop:     () => { noiseBurst(0.07, 0.12, 1600, 500); blip(190, 0.06, 'square', 0.07, 120); },
  mine:     () => { noiseBurst(0.06, 0.12, 2600, 900); blip(560, 0.05, 'square', 0.05, 340); },
  place:    () => { blip(240, 0.1, 'triangle', 0.09, 480); noiseBurst(0.1, 0.08, 900, 300); },
  remove:   () => { noiseBurst(0.14, 0.1, 1200, 200); blip(300, 0.12, 'square', 0.05, 90); },
  coin:     () => { const t = performance.now(); if (t - lastTickSnd < 120) return; lastTickSnd = t;
                    blip(880, 0.05, 'triangle', 0.045, 1320); },
  pop:      () => blip(500, 0.08, 'sine', 0.08, 900),
  fanfare:  () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.22, 'triangle', 0.09), i * 130)); },
  legendary:() => { [660, 880, 1100, 1320, 1760].forEach((f, i) => setTimeout(() => blip(f, 0.18, 'triangle', 0.08), i * 90)); },
  crate:    () => { blip(200, 0.1, 'square', 0.07, 400); setTimeout(() => blip(400, 0.12, 'square', 0.06, 800), 90); },
  hungry:   () => blip(420, 0.12, 'sine', 0.05, 300),
  power:    () => { [440, 660, 880].forEach((f, i) => setTimeout(() => blip(f, 0.14, 'sawtooth', 0.05, f * 1.4), i * 70)); },
  count:    () => blip(700, 0.14, 'square', 0.08),
  rumble:   () => { noiseBurst(2.8, 0.26, 400, 60); blip(60, 2.6, 'sawtooth', 0.14, 30); },
  firework: () => { noiseBurst(0.25, 0.12, 2400, 200); blip(1200, 0.2, 'triangle', 0.04, 300); },
  hatch:    () => { [520, 700, 940].forEach((f, i) => setTimeout(() => blip(f, 0.1, 'sine', 0.07), i * 80)); },
  alarm:    () => { [420, 300, 420, 300].forEach((f, i) => setTimeout(() => blip(f, 0.16, 'square', 0.06), i * 180)); },
  boom:     () => { noiseBurst(0.5, 0.28, 900, 60); blip(90, 0.4, 'sawtooth', 0.1, 35); },
  fixed:    () => { [523, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.12, 'triangle', 0.08), i * 70)); },
  gate:     () => { [330, 440, 587, 784].forEach((f, i) => setTimeout(() => blip(f, 0.3, 'sawtooth', 0.05, f * 1.5), i * 160)); },
  splash:   () => { noiseBurst(0.28, 0.14, 1400, 220); blip(320, 0.14, 'sine', 0.05, 130); },
  /* v4c: pop cannon */
  shoot:    () => { noiseBurst(0.12, 0.14, 900, 220); blip(150, 0.16, 'square', 0.07, 430); },
  bounce:   () => blip(300, 0.07, 'sine', 0.06, 620),
  boing:    () => { blip(150, 0.08, 'sine', 0.09, 80); setTimeout(() => blip(190, 0.24, 'sine', 0.08, 540), 50); },
  burst:    () => { noiseBurst(0.2, 0.14, 2200, 300); blip(900, 0.18, 'triangle', 0.06, 260); },
  /* v5b: interiors */
  purr:     () => { blip(170, 0.32, 'sine', 0.05, 130); setTimeout(() => blip(210, 0.26, 'sine', 0.045, 150), 130); },
  ding:     () => { blip(880, 0.16, 'triangle', 0.06); setTimeout(() => blip(1320, 0.3, 'triangle', 0.05), 110); },
  door:     () => { blip(300, 0.08, 'triangle', 0.06, 420); setTimeout(() => blip(460, 0.1, 'triangle', 0.05, 620), 70); },
  /* v7: asteroid rush */
  jet:      () => { noiseBurst(0.22, 0.09, 2000, 500); blip(540, 0.3, 'sine', 0.05, 180); },
  thunk:    () => { blip(120, 0.12, 'square', 0.09, 70); noiseBurst(0.08, 0.1, 700, 250);
                    setTimeout(() => blip(760, 0.07, 'triangle', 0.05, 1100), 70); },
  zap:      () => { blip(1400, 0.09, 'sawtooth', 0.045, 300); noiseBurst(0.06, 0.07, 3200, 1200); },
  /* v7.2: come upstairs */
  liftding: () => { blip(1040, 0.14, 'triangle', 0.06); setTimeout(() => blip(1560, 0.28, 'triangle', 0.05), 100); },
  bloop:    () => { blip(340, 0.09, 'sine', 0.07, 620); setTimeout(() => blip(560, 0.12, 'sine', 0.06, 340), 80); },
  /* v8a: the nine planets */
  hum:      () => { blip(70, 1.4, 'sawtooth', 0.05, 110); blip(140, 1.2, 'sine', 0.05, 220);
                    setTimeout(() => blip(880, 0.3, 'triangle', 0.05, 1320), 500); },
  mapblip:  () => blip(740, 0.06, 'sine', 0.05, 1100),
  planet:   () => { [392, 523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.2, 'triangle', 0.08), i * 110));
                    setTimeout(() => noiseBurst(0.3, 0.06, 2600, 400), 550); },
};
/* cozy ambient loop — soft pad chords + pentatonic plucks, scheduled ahead */
const CHORDS = [[130.8, 196, 329.6], [110, 164.8, 261.6], [87.3, 130.8, 220], [98, 146.8, 246.9]];
const PENTA = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
function musicTick() {
  if (!actx || muted) return;
  const now = actx.currentTime;
  if (musNext < now - 4) musNext = now + 0.1;
  while (musNext < now + 0.5) {
    const t0 = musNext, ch = CHORDS[chordI % CHORDS.length]; chordI++;
    for (const f of ch) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.02, t0 + 0.8);
      g.gain.linearRampToValueAtTime(0.0001, t0 + 3.1);
      o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0 + 3.2);
    }
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.35) continue;
      const t1 = t0 + i * 0.8 + (Math.random() < 0.3 ? 0.4 : 0);
      const f = PENTA[(Math.random() * PENTA.length) | 0];
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t1);
      g.gain.linearRampToValueAtTime(0.035, t1 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t1 + 0.7);
      o.connect(g).connect(actx.destination); o.start(t1); o.stop(t1 + 0.75);
    }
    musNext += 3.2;
  }
}

const RES_LIST = ['wood', 'stone', 'food', 'ore', 'metal', 'parts', 'power', 'science',
                  'regolith', 'ice', 'he3', 'fuel', 'rediron', 'frost',
                  'astroiron', 'crystal', 'alloy', 'starsteel',
                  'sunstone', 'stormcore'];      // v8a: the nine planets

                   regolith: 7, ice: 7, he3: 7, fuel: 7, rediron: 7, frost: 7,
                   astroiron: 7, crystal: 7, alloy: 7, starsteel: 7,
                   sunstone: 7, stormcore: 7 };

                   metal: '#e8eef4', parts: '#ffd24a', power: '#59e0ff', science: '#7dff9a', pop: '#ffd1a1',
                   regolith: '#c2c9d6', ice: '#9fe8ff', he3: '#7dffe0', fuel: '#ff9a4a',
                   rediron: '#ff8a66', frost: '#dff2ff',
                   astroiron: '#d8c49a', crystal: '#c99bff', alloy: '#7dffe0', starsteel: '#9fd8ff',
                   sunstone: '#ffc061', stormcore: '#57e8d4' };

  .some(r => (res[r] || 0) > 0 || (life[r] || 0) > 0);

const cargoTotal = () => (cargo.astroiron || 0) + (cargo.crystal || 0) + (cargo.alloy || 0);
const bargeSlots = () => bargeUpgraded ? 12 : 8;
const AGE_NAMES = [null, 'CAMPFIRE', 'FARMING', 'INDUSTRY', 'ELECTRICITY', 'SCIENCE', 'CYBERPUNK', 'MOON COLONY'];

  /* v4c: playful physics launcher — buildable on Earth AND the moon */
  popcannon: { name: 'POP CANNON', age: 3, size: 1, cost: { stone: 20, metal: 10 }, both: true, grp: 'tools' },

  pole:      { name: 'POWER POLE', age: 4, size: 1, cost: { wood: 5, metal: 2 },   pole: true, both: true, grp: 'power' },

/* ═══════════════════════════════════════════════════════════════════════
   SPRITE ATLAS — everything baked once at load. P() draws chunky 2x
   "16px art" pixels; gradients/ellipses are fine HERE (load time only).
   ═══════════════════════════════════════════════════════════════════════ */
const SPR = {};
function C(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d'); g.imageSmoothingEnabled = false;
  return [c, g];
}
function S(w, h, fn) {          // w,h in art units (1 unit = 2px)
  const [c, g] = C(w * 2, h * 2);
  const P = (x, y, ww, hh, col) => { g.fillStyle = col; g.fillRect(Math.round(x * 2), Math.round(y * 2), Math.round(ww * 2), Math.round(hh * 2)); };
  fn(g, P);
  return c;
}
function rr(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
function shad(g, cx, cy, rx, ry) {
  g.fillStyle = 'rgba(15,40,30,0.28)';
  g.beginPath(); g.ellipse(cx, cy, rx, ry, 0, 0, 6.3); g.fill();
}
function glowDot(r, col) {      // baked radial glow sprite
  const [c, g] = C(r * 2, r * 2);
  const gr = g.createRadialGradient(r, r, 1, r, r, r);
  gr.addColorStop(0, col); gr.addColorStop(0.5, col.slice(0, 7) + '88'); gr.addColorStop(1, col.slice(0, 7) + '00');
  g.fillStyle = gr; g.fillRect(0, 0, r * 2, r * 2);
  return c;
}

function initSprites() {
  /* terrain tiles (16 units = 32px) */
  /* 5 grass shades, dark→light, picked by smooth noise for mottled patches */
  const GRASS_BASE = ['#4c9c45', '#52a64a', '#57b04f', '#5cb954', '#62c15a'];
  const GRASS_DARK = ['#438c3d', '#489642', '#4da046', '#52a94b', '#57b250'];
  const GRASS_LITE = ['#57ad4f', '#5db755', '#63c159', '#68c95f', '#6ed165'];
  SPR.grass = [0, 1, 2, 3, 4].map(v => S(16, 16, (g, P) => {
    P(0, 0, 16, 16, GRASS_BASE[v]);
    for (let i = 0; i < 16; i++) {
      const x = (i * 7 + v * 5) % 16, y = (i * 11 + v * 3 + 2) % 16;
      P(x, y, 1, 1, i % 3 ? GRASS_DARK[v] : GRASS_LITE[v]);
    }
    if (v >= 3) { P((v * 3) % 12 + 2, (v * 5) % 12 + 2, 1, 2, '#7ed07a'); }
  }));
  /* tiny decor stamped on some grass tiles during the terrain bake */
  SPR.flower = ['#ffd1e0', '#f6e97e', '#fefefe', '#ffb28a'].map(c => S(3, 3, (g, P) => {
    P(1, 0, 1, 3, c); P(0, 1, 3, 1, c); P(1, 1, 1, 1, '#f5c542');
  }));
  SPR.pebble = S(3, 2, (g, P) => { P(0, 0.6, 3, 1.4, '#9aa2ab'); P(0.6, 0, 1.8, 1, '#b8bfc7'); });
  SPR.tuft = S(4, 3, (g, P) => { P(0, 1, 1, 2, '#7ed07a'); P(1.5, 0, 1, 3, '#8ed88a'); P(3, 1, 1, 2, '#7ed07a'); });
  SPR.sand = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#ecd794');
    for (let i = 0; i < 12; i++) P((i * 5 + 3) % 16, (i * 7 + 1) % 16, 1, 1, i % 2 ? '#dbc27b' : '#f7e8b4');
  });
  SPR.shallow = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#3f97c9');
    for (let i = 0; i < 6; i++) P((i * 6 + 2) % 15, (i * 9 + 4) % 15, 2, 1, '#57aad6');
  });
  SPR.foam = [0, 1].map(v => S(16, 16, (g, P) => {
    for (let i = 0; i < 5; i++) P((i * 4 + v * 2 + 1) % 14, (i * 6 + v * 5 + 2) % 14, 2, 1, 'rgba(230,248,255,0.85)');
  }));

  /* trees & rocks — bottom-anchored, 16x22 units (32x44 px) */
  const mkTree = (stage, golden) => S(16, 22, (g, P) => {
    shad(g, 16, 40, 10 - stage * 2, 3.5);
    const tD = golden ? '#9a7328' : '#6e4023', tL = golden ? '#b98d38' : '#8a5530';
    const c1 = golden ? '#a37a10' : '#2c7a3a', c2 = golden ? '#dda428' : '#3a9a49', c3 = golden ? '#f4cc4e' : '#54bd62';
    if (stage === 0) {
      P(7, 13, 2, 8, tD); P(7, 13, 1, 8, tL);
      P(2, 8, 12, 6, c1);
      P(3, 4, 10, 6, c2);
      P(5, 2, 6, 4, c2);
      P(5, 3, 5, 3, c3); P(4, 6, 4, 3, c3);

    P(2, 11, 12, 3, '#b46bff');
    P(2, 9, 12, 2.4, '#59a0ff');
    P(2.6, 7, 10.8, 2.4, '#4cd674');
    P(3.4, 5, 9.2, 2.4, '#ffd24a');
    P(4.4, 3.4, 7.2, 2, '#ff9a4a');
    P(5.4, 2, 5.2, 1.8, '#ff5f8a');
    P(6.4, 1, 3.2, 1.2, '#ffb2d0');
    P(4, 8, 1, 1, '#ffffff'); P(10.4, 5.6, 1, 1, '#ffffff'); P(7, 11.6, 1, 1, '#ffffff');

  /* v4d: sleeping (dimmed) variants of the treasure trees — baked once,

  const dimify = src => {
    const [c, g] = C(src.width, src.height);

/* ═══ v5a: DECOR ART — paths (16-variant auto-connect sets), garden bits,
   showpieces and the golden trophies. ALL baked at load. ═══ */
const FLAG_COLS = [['#e05a3a', '#f0705e'], ['#3a7bd5', '#5f9ae8'], ['#4cb45a', '#6ecc78'], ['#ffd24a', '#ffe27a']];
function initDecorSprites() {
  SPR.dec = {}; SPR.path = {};
  /* covered rects for a connection mask: fat centre pad + an arm per bit */
  const maskRects = m => {
    const r = [[9, 9, 14, 14]];
    if (m & 1) r.push([9, 0, 14, 9]);
    if (m & 2) r.push([23, 9, 9, 14]);
    if (m & 4) r.push([9, 23, 14, 9]);
    if (m & 8) r.push([0, 9, 9, 14]);
    return r;
  };
  const inRects = (r, x, y) => r.some(q => x >= q[0] && x < q[0] + q[2] && y >= q[1] && y < q[1] + q[3]);
  const mkPathSet = paint => [...Array(16)].map((_, m) => {
    const [c, g] = C(32, 32);
    paint(g, maskRects(m), m);
    return c;
  });
  SPR.path.stonepath = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#848c95'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#a9b1ba'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let i = 0; i < 26; i++) {
      const x = (i * 7 + m * 3) % 30, y = (i * 11 + 5 + m) % 30;
      if (!inRects(r, x, y) || !inRects(r, x + 3, y + 2)) continue;
      g.fillStyle = i % 3 ? '#98a0a8' : '#c6cdd5';
      g.fillRect(x, y, 3, 2);
    }
  });
  SPR.path.boardwalk = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#7a4a2b'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#9c6b3d'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let y = 2; y < 32; y += 4) for (const q of r) {
      if (y <= q[1] || y >= q[1] + q[3] - 1) continue;
      g.fillStyle = '#8a5c33'; g.fillRect(q[0] + 1, y, q[2] - 2, 1);
      g.fillStyle = '#b07c48'; g.fillRect(q[0] + 1, y + 1, q[2] - 2, 1);
    }
    for (let i = 0; i < 8; i++) {
      const x = (i * 9 + m * 5 + 3) % 29, y = (i * 13 + 7) % 29;
      if (inRects(r, x, y)) { g.fillStyle = '#5f3a22'; g.fillRect(x, y, 1, 1); }
    }
  });
  SPR.path.sandtrail = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#dbc27b'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#ecd794'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let i = 0; i < 22; i++) {
      const x = (i * 5 + m * 7 + 2) % 30, y = (i * 11 + 3) % 30;
      if (inRects(r, x, y)) { g.fillStyle = i % 2 ? '#d4ba76' : '#f7e8b4'; g.fillRect(x, y, 2, 1); }
    }
  });
  /* fence + hedge: same 16-mask idea, but they live in the bg (y-sorted) */

/* ═══════════════════════════════════════════════════════════════════════
   WORLD — organic island mask per age, terrain layer, static bg layer,
   decor + wire bakes. Terrain/bg are rebuilt ONLY on island changes.
   ═══════════════════════════════════════════════════════════════════════ */
let terrainC, tg, bgC, bgg;
{ const a = C(WORLD_W, WORLD_H); terrainC = a[0]; tg = a[1]; }
{ const a = C(WORLD_W, WORLD_H); bgC = a[0]; bgg = a[1]; }
const RX = [0, 6.4, 8.6, 10.8, 13.2, 15.4, 16.4];
const RY = [0, 4.8, 6.2, 7.6, 8.8, 10.0, 10.6];

/* ═══ v6b: N WORLDS (the Planet Pattern) — the active world lives in the
   globals above; every inactive world is parked in `parked` by name and
   swaps in wholesale. Exactly one world renders/updates; the economy ticks
   ALL of them (see economyTick). New planets are data additions. ═══ */
let world = 'earth';
const parked = new Map();                       // name → bundle for every INACTIVE world
function mkWorldBundle(name, gw, gh) {
  const [tc, tgx] = C(gw * TILE, GY0 + gh * TILE);
  const [bc, bgx] = C(gw * TILE, GY0 + gh * TILE);
  return { name, GW: gw, GH: gh, WORLD_W: gw * TILE, WORLD_H: GY0 + gh * TILE,
           landAge: [], coast: [], occ: [], isleId: [], buildings: [], flora: [],
           wires: [], decor: [], decorMap: new Map(),
           anims: [], robots: [], ferries: [], camX: 0, camY: 0, camPan: null,
           terrainC: tc, tg: tgx, bgC: bc, bgg: bgx, terrainDirty: true, bgDirty: true };
}
function packCurWorld() {
  return { name: world, GW, GH, WORLD_W, WORLD_H, landAge, coast, occ, isleId,
           buildings, flora, wires, decor, decorMap, anims, robots, ferries, camX, camY, camPan,
           terrainC, tg, bgC, bgg, terrainDirty, bgDirty };
}
function swapTo(name) {
  if (world === name) return;
  const o = parked.get(name);
  parked.delete(name);
  parked.set(world, packCurWorld());
  GW = o.GW; GH = o.GH; WORLD_W = o.WORLD_W; WORLD_H = o.WORLD_H;
  landAge = o.landAge; coast = o.coast; occ = o.occ; isleId = o.isleId;
  buildings = o.buildings; flora = o.flora; wires = o.wires; anims = o.anims;
  decor = o.decor; decorMap = o.decorMap;
  robots = o.robots; ferries = o.ferries;
  camX = o.camX; camY = o.camY; camPan = o.camPan;
  terrainC = o.terrainC; tg = o.tg; bgC = o.bgC; bgg = o.bgg;
  terrainDirty = o.terrainDirty; bgDirty = o.bgDirty;
  world = o.name;
  glowDirty = true;                             // placement-aid overlay is per-world
}
/* run fn with the named world's data bound (pure data swap, no visuals) */
function inWorld(name, fn) {
  if (world === name) return fn();
  const back = world;
  swapTo(name);
  try { return fn(); } finally { swapTo(back); }
}
/* read-only view of a world's contents, live or parked */
function worldData(name) {
  return world === name
    ? { buildings, flora, robots, decor, bgC, WORLD_W, WORLD_H }
    : parked.get(name);
}
/* all buildings across EVERY world (economy/goals are global) */
function allB() {

}
/* earth's island-component lookup, valid from any world (colony bonuses) */
function earthIsleAt(gx, gy) {
  const ids = world === 'earth' ? isleId : parked.get('earth').isleId;
  return ids && ids[gy] ? (ids[gy][gx] || 0) : 0;
}

function genIsland(sd) {
  seed = sd;
  const rng = mulberry(sd);
  landSalt = [rng() * 6.28, rng() * 6.28, rng() * 6.28];
  landAge = [];
  for (let gy = 0; gy < GH; gy++) {
    landAge[gy] = [];
    for (let gx = 0; gx < GW; gx++) {
      let a = 0;
      if (gx >= 1 && gx < GW - 1 && gy >= 1 && gy < GH - 1) {
        for (let k = 1; k <= 6; k++) {
          const dx = (gx - CX) / RX[k], dy = (gy - CYG) / RY[k];
          const r = Math.hypot(dx, dy);
          const ang = Math.atan2(dy, dx);
          const wob = 1 + 0.13 * Math.sin(ang * 3 + landSalt[0]) + 0.09 * Math.sin(ang * 5 + landSalt[1]) + 0.05 * Math.sin(ang * 7 + landSalt[2]);
          if (r < wob * 0.82 || (k === 1 && Math.hypot(gx - CX, gy - CYG) < 2.2)) { a = k; break; }
        }
      }
      landAge[gy][gx] = a;
    }
  }
  occ = [];
  for (let gy = 0; gy < GH; gy++) { occ[gy] = []; for (let gx = 0; gx < GW; gx++) occ[gy][gx] = null; }
  recomputeIsleIds();
}

/* ── v3: settled-island blobs — deterministic per seed + settle order ── */
function isleTiles(cx2, cy2, order, step) {
  const rng = mulberry(((seed % 65536) * 131 + order * 29 + 7) >>> 0);
  const s0 = rng() * 6.28, s1 = rng() * 6.28, s2 = rng() * 6.28;
  const rx = 5.0 + step * 1.2, ry = 3.8 + step * 1.0;
  const out = [];
  for (let gy = Math.floor(cy2 - ry - 2); gy <= Math.ceil(cy2 + ry + 2); gy++)
    for (let gx = Math.floor(cx2 - rx - 2); gx <= Math.ceil(cx2 + rx + 2); gx++) {
      const dx = (gx - cx2) / rx, dy = (gy - cy2) / ry;
      const r = Math.hypot(dx, dy), ang = Math.atan2(dy, dx);
      const wob = 1 + 0.14 * Math.sin(ang * 3 + s0) + 0.1 * Math.sin(ang * 5 + s1) + 0.05 * Math.sin(ang * 7 + s2);
      if (r < wob * 0.8 || Math.hypot(gx - cx2, gy - cy2) < 1.7) out.push({ gx, gy });
    }
  return out;
}
function carveIsle(isl, step, ageVal) {        // raise any still-water tiles of this ring
  const out = [];
  for (const t of isleTiles(isl.gx, isl.gy, isl.o, step)) {
    if (t.gx < 2 || t.gy < 2 || t.gx >= GW - 2 || t.gy >= GH - 2) continue;
    if (landAge[t.gy][t.gx] !== 0) continue;
    landAge[t.gy][t.gx] = ageVal;
    out.push(t);
  }
  return out;
}
/* island component ids (flood fill over RAW land incl. future rings + moon);
   grids / robots / crates use these — nothing ever links across water */
function recomputeIsleIds() {
  isleId = [];

            chunks, pebbles, crumbles, boosts: 0, beacon: null, fullT: 0,

/* ── max-age land growth: at Age 7 the island keeps spreading every +25 pop ── */
function growCandidates() {
  const out = [];
  for (let gy = 2; gy <= GH - 3; gy++) for (let gx = 2; gx <= GW - 3; gx++) {
    if (landAge[gy][gx] !== 0) continue;              // water only
    let n = 0;
    if (isLand(gx - 1, gy)) n++;
    if (isLand(gx + 1, gy)) n++;
    if (isLand(gx, gy - 1)) n++;
    if (isLand(gx, gy + 1)) n++;

  }

}
function growIsland() {

    if (!islandFull && settled.length >= SETTLE_MAX) {
      islandFull = true;

      banners.push({ title: 'YOUR ARCHIPELAGO IS FULL!', sub: 'Every last tile tamed!', t: 0, dur: 3.6, legendary: true });
      SFX.fanfare();

  /* connected band of ~10-16 tiles hugging the coastline (prefer 2+ land

  const want = 10 + ((Math.random() * 7) | 0);
  const picked = [];
  const nearPicked = c => picked.some(p => Math.abs(p.gx - c.gx) + Math.abs(p.gy - c.gy) === 1);
  const score = c => {

    return n;

    let pool = picked.length ? cands.filter(nearPicked) : cands;
    if (!pool.length) pool = cands;                   // boxed in — start a new arm
    let bestS = 0;
    for (const c of pool) { c.s = score(c); if (c.s > bestS) bestS = c.s; }
    const top = pool.filter(c => c.s >= Math.min(2, bestS));
    const t = top[(Math.random() * top.length) | 0];

    cands.splice(cands.indexOf(t), 1);

  }
  for (const t of picked) {                           // fresh flora takes root (not on sand)
    if (sandAt(t.gx, t.gy) || occ[t.gy][t.gx] || floraAt(t.gx, t.gy)) continue;
    const r = hash2(t.gx * 5 + 3, t.gy * 9 + 1);
    if (r < 0.16) flora.push({ type: 'tree', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
    else if (r < 0.24) flora.push({ type: 'rock', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
  }
  banners.push({ title: 'THE ISLAND GROWS!', sub: '+' + picked.length + ' new land — room to build!', t: 0, dur: 3 });
  SFX.fanfare();
  let px2 = 0, py2 = 0;
  for (const t of picked) { px2 += tX(t.gx) + 16; py2 += tY(t.gy) + 16; }
  camPanTo(px2 / picked.length, py2 / picked.length, 2.4);   // show kids the new land
  recomputeIsleIds();
  landGrowthSanity(false);                      // v4d: boats push off, landlocked ports pack up
  refreshColonyChecks(); refreshFerries();
  terrainDirty = true;
  saveGame();
  return true;
}

/* ── v3: camera — one smooth window into the big world ── */

/* ═══ v5a: THE POWER GRID — real and player-built (SimCity-style).

  return { x: tX(b.gx) + s * 16, y: tY(b.gy) + 8 };

function recomputePower() {
  for (const b of buildings) b.conn = false;

  while (q.length) {
    const b = q.pop();

    for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) {
      const gx = b.gx + dx, gy = b.gy + dy;
      const nbs = [occ[gy - 1] && occ[gy - 1][gx], occ[gy + 1] && occ[gy + 1][gx],
                   occ[gy][gx - 1], occ[gy][gx + 1]];

      const gx = b.gx + dx, gy = b.gy + dy;

        if (!o || o === b || o.rubble) continue;

          (isSource(b) && B[o.k].needPower) || (isSource(o) && B[b.k].needPower);
        if (!wired) continue;

        if (seen.has(key)) continue;

function rebuildPowGlow() {

  const g = powGlowG;

}

  const prev = new Map(), q = [];

    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const o = occ[gy + dy] && occ[gy + dy][gx + dx];
      if (o && o.conn && !o.rubble) return true;

/* ═══ v5a: DECORATIONS — placement, removal, auto-connect masks ═══ */

/* ── v4b: the moon bake — deep space, starfield, Earth in the sky,

/* ═══════════════════════════════════════════════════════════════════════
   POOLS — particles / floaty texts / wire sparks (no per-frame allocation:
   fixed arrays, dead slots recycled).
   ═══════════════════════════════════════════════════════════════════════ */
const P_MAX = 48, parts = [];   // v4c: 96→48 — worst-case scenes stay well under the draw budget
for (let i = 0; i < P_MAX; i++) parts.push({ on: false });
function spawnP(x, y, spr, o) {
  o = o || {};
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (p.on) continue;
    p.on = true; p.x = x; p.y = y; p.spr = spr;
    p.vx = o.vx !== undefined ? o.vx : (Math.random() - 0.5) * 60;
    p.vy = o.vy !== undefined ? o.vy : -40 - Math.random() * 40;
    p.g = o.g !== undefined ? o.g : 140;
    p.life = o.life || 0.7; p.t = 0;
    p.fade = o.fade !== false;
    p.tx = o.tx !== undefined ? o.tx : null;   // homing target (HUD pops)
    p.ty = o.ty !== undefined ? o.ty : null;
    p.sp = 150;
    return p;
  }
  return null;
}
const F_MAX = 14, floats = [];
for (let i = 0; i < F_MAX; i++) floats.push({ on: false });
function addFloat(x, y, str, color, icon) {
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (f.on) continue;
    f.on = true; f.x = x; f.y = y; f.str = str; f.color = color || '#fff';
    f.icon = icon || null; f.t = 0;
    return;
  }
}
/* v5a: subtle blue sparks running along POWERED wires (replaces pipe dots) */
const K_MAX = 12, sparks = [];
for (let i = 0; i < K_MAX; i++) sparks.push({ on: false });
let sparkT = 0, sparkRR = 0;
function updateSparks(dt) {
  sparkT -= dt;
  if (sparkT <= 0 && wires.length) {
    sparkT = Math.max(0.07, 1.3 / wires.length);
    for (let tries = 0; tries < wires.length; tries++) {
      const w = wires[sparkRR++ % wires.length];
      if (!w.on) continue;
      for (let i = 0; i < K_MAX; i++) {
        if (sparks[i].on) continue;
        sparks[i].on = true; sparks[i].w = w; sparks[i].t = 0;
        tries = 99; break;
      }
      break;
    }
  }
  for (let i = 0; i < K_MAX; i++) {
    const s = sparks[i];
    if (!s.on) continue;
    s.t += dt * 2.4;
    if (s.t >= 1 || wires.indexOf(s.w) === -1) s.on = false;
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   ECONOMY — fixed 1s tick. One shared global pool; placement never
   affects function. All numbers live in B / REQ_NEXT above.
   ═══════════════════════════════════════════════════════════════════════ */
/* counts span BOTH worlds — goals, wonders and pop are global */
const cnt = k => {
  let n = 0;
  for (const b of buildings) if (b.k === k) n++;
  for (const o of parked.values()) for (const b of o.buildings) if (b.k === k) n++;
  return n;
};
function capPop() {
  let c = 2;
  for (const b of allB()) {
    if (b.rubble || !B[b.k].pop) continue;
    if (B[b.k].mega && !megaDone(b)) continue;   // v7: nobody lives on a construction site
    c += B[b.k].pop;
  }
  return c;
}
function canAfford(cost) { for (const r in cost) if ((res[r] || 0) < cost[r]) return false; return true; }
function payCost(cost) { for (const r in cost) res[r] -= cost[r]; }
function refund(cost) { for (const r in cost) res[r] += cost[r]; }

function economyTick() {
  const wellBonus = cnt('well') > 0 ? 1.5 : 1;
  const mult = 1 + 0.1 * stars;                 // prestige bonus on ALL production
  /* v4a: TOWN islands boost their specialty producers 1.5x locally;
     each finished COLONY adds +10% to its specialty resource GLOBALLY
     (multiplicative with prestige) */
  const townSpec = {}, colonyMult = {};
  for (const il of settled) {
    if (il.lvl >= 3) townSpec[earthIsleAt(il.gx, il.gy)] = il.spec;
    if (il.lvl >= 4) colonyMult[il.spec] = (colonyMult[il.spec] || 1) * 1.1;
  }
  /* v4b: the tick spans BOTH worlds — production never stops while away */
  const every = allB();
  powerInc = 0; powerDem = 0;
  const inc = {};
  for (const b of every) {
    if (b.rubble) continue;                     // rubble makes nothing
    const d = B[b.k];
    if (d.mega && !megaDone(b)) continue;       // v7: construction sites draw nothing yet
    if (d.prod && d.prod.power) powerInc += d.prod.power * mult;
    if (d.needPower && b.conn) powerDem += d.needPower;   // v5a: only the WIRED city draws
  }
  powerInc = Math.round(powerInc * 10) / 10;
  /* batteries: surplus charges them, deficit drains them before anything idles */
  battCap = every.reduce((n, b) => n + (!b.rubble && B[b.k].store ? B[b.k].store : 0), 0);
  battCharge = Math.min(battCharge, battCap);
  let avail = powerInc + battCharge;
  const sorted = every.sort((a, b2) => a.seq - b2.seq);
  for (const b of sorted) {
    const d = B[b.k];
    b.idle = null;
    if (b.rubble) continue;
    if (d.mega && !megaDone(b)) continue;       // v7: under construction — feeds first!
    if (d.needPower) {
      if (!b.conn) { b.powered = false; b.idle = 'plug'; continue; }   // v5a: wire it in! (🔌)
      if (avail >= d.needPower) { avail -= d.needPower; b.powered = true; }
      else { b.powered = false; b.idle = 'power'; continue; }          // wired, grid too small (⚡)
    }
    if (d.cons) {
      let ok = true;
      for (const r in d.cons) if ((res[r] || 0) < d.cons[r]) ok = false;
      if (!ok) { b.idle = 'input'; continue; }
      for (const r in d.cons) { res[r] -= d.cons[r]; inc[r] = (inc[r] || 0) - d.cons[r]; }
    }
    if (d.prod) for (const r in d.prod) {
      if (r === 'power') continue;
      let amt = d.prod[r] * mult;
      if (b.k === 'farm') amt *= wellBonus;
      const ts = (d.moon || d.mars) ? null : townSpec[earthIsleAt(b.gx, b.gy)];   // colonies are an Earth thing
      if (ts && SPEC_B[ts] === b.k) amt *= 1.5;  // golden TOWN producer
      if (colonyMult[r]) amt *= colonyMult[r];   // global COLONY bonus
      if (r === 'metal' && marsBaseDone) amt *= 1.1;   // v6b: MARS ★ planet specialty
      res[r] += amt; inc[r] = (inc[r] || 0) + amt;
      if (r === 'metal') life.metal += amt;
      if (r === 'parts') life.parts += amt;
      if (r === 'science') life.science += amt;
      if (r === 'regolith') life.regolith += amt;
      if (r === 'ice') life.ice += amt;
      if (r === 'fuel') life.fuel += amt;        // v6a: REFINE 20 FUEL goal
      if (r === 'starsteel') life.starsteel += amt;   // v7: FORGE 20 STARSTEEL goal
      if (r === 'alloy') life.alloy = (life.alloy || 0) + amt;   // v8a: the SOLAR FORGE makes alloy too
    }
  }
  /* population eats (age 2+); never dies — growth just pauses */
  const eat = age >= 2 ? pop * 0.05 : 0;
  const before = res.food;
  res.food = Math.max(0, res.food - eat);
  hungry = age >= 2 && res.food <= 0 && eat > 0 && (inc.food || 0) <= eat;
  inc.food = (inc.food || 0) - Math.min(eat, before);
  const cap = capPop();
  if (popF < cap && (age < 2 || !hungry)) popF = Math.min(cap, popF + 0.5);
  pop = Math.floor(popF);
  if (pop > best) { best = pop; lsSet('islandforge_best', '' + best); }
  /* max-age growth: at Age 7 every +25 pop past the last growth adds land
     (Earth-only; while on the moon it politely waits for your return) */
  if (age >= 7 && !islandFull && !loading && world === 'earth' && !travel) {
    if (!growNextPop) growNextPop = pop + 25;
    else if (pop >= growNextPop && growIsland()) growNextPop = pop + 25;
  }
  battCharge = clamp(avail, 0, battCap);      // leftovers charge the batteries
  rates = inc; rates.power = powerInc - powerDem;
  const nowPowered = powerInc > 0;
  if (nowPowered !== islandPowered) {
    islandPowered = nowPowered;
    bgDirty = true;
    for (const o of parked.values()) o.bgDirty = true;   // lit windows in every world
    if (nowPowered && !firstPowerDone) {
      firstPowerDone = true;
      banners.push({ title: 'POWER ONLINE!', sub: 'The island comes alive!', t: 0, dur: 2.6 });
      SFX.power();
    }
  }
  /* mystery crate — every 4–6 minutes of active play */
  if (!crate && scene === 'play') {
    crateT -= 1;
    if (crateT <= 0) spawnCrate();
  }
  /* a goal the player has clearly moved past never stalls the ladder —
     if a LATER goal is already met, quietly catch up to just beyond the
     furthest one (no crates or banners for old milestones, the same rule
     skipSatisfiedGoals applies when loading a save) */
  if (!loading && goalI < GOALS.length && !GOALS[goalI].ok()) {
    for (let gi = GOALS.length - 1; gi > goalI; gi--)
      if (GOALS[gi].ok()) { goalI = gi + 1; break; }
  }
  /* goals — one active goal, reward crate washes ashore */
  if (!loading && goalI < GOALS.length && GOALS[goalI].ok()) {
    banners.push({ title: 'GOAL DONE!', sub: GOALS[goalI].t + ' — a reward crate washed ashore!', t: 0, dur: 3, legendary: true });
    SFX.fanfare();
    goalI++;
    if (!crate) spawnCrate();
    else crateT = Math.min(crateT, 5);
  }
  /* v4a: colony ladders — one level-up per tick (staged celebrations).
     Earth-only machinery: while on the moon it simply waits. */
  if (!loading && world === 'earth') {
    for (const il of settled)
      if (colonyReady(il)) { colonyLevelUp(il); break; }
    refreshColonyChecks();                       // keep HUD checklists live
  }
  /* v6b: MARS BASE COMPLETE — the planet specialty bonus (colony pattern
     at planet scale): port + greenhouse + catcher + hab + shipyard */
  if (!loading && !marsBaseDone && marsArrived &&
      cnt('marsport') >= 1 && cnt('greendome') >= 1 && cnt('dustcatcher') >= 1 &&
      cnt('habdome') >= 1 && cnt('marsyard') >= 1) {
    marsBaseDone = true;
    banners.push({ title: 'MARS BASE COMPLETE!', sub: 'The red planet is home — METAL +10% everywhere, forever!', t: 0, dur: 4.4, legendary: true });
    SFX.legendary();
    fwShow = Math.max(fwShow, 6); fwT = 0;
    pushEvent('marsbase');
    saveGame();
  }
  /* age advancement (5 → 6 happens via the rocket instead) */
  const rq = REQ_NEXT[age];
  if (rq && rq.ok()) ageUp();
}
function skipSatisfiedGoals() { while (goalI < GOALS.length && GOALS[goalI].ok()) goalI++; }

function ageUp() {
  if (age >= 7) return;
  age++;
  banners.push({ title: 'AGE ' + age + ' — ' + AGE_NAMES[age] + '!', sub: AGE_SUBS[age], t: 0, dur: 3.4 });
  SFX.fanfare();
  /* every settled island grows its own ring, from its own centre */
  for (const il of settled) {
    if (il.steps >= ISLE_STEP_MAX) continue;
    il.steps++;
    carveIsle(il, il.steps, age);
  }
  recomputeIsleIds();
  scatterFlora(age);
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (landAge[gy][gx] === age && hash2(gx + age, gy) < 0.4)
      spawnP(tX(gx) + 16, tY(gy) + 16, SPR.spark[0], { vy: -30, g: 0, life: 1.2 });
  }
  camPanTo(tX(CX) + 16, tY(CYG) + 16, 2.2);     // watch the home island bloom

    banners.push({ title: 'THE MOON AWAITS!', sub: 'Build a MOON ROCKET at your launch pad!', t: 0, dur: 3.8, legendary: true });

/* v6a: MOON ROVERS — chunky 6-wheelers that trundle between regolith rocks

function roverCount() {

  return n;
}
function spawnRover(x, y) {

/* v4d: one robot per target — a robot's `targ` IS its reservation; it clears

function targReserved(r, t) {
  for (const o of robots) if (o !== r && o.targ === t) return true;
  return false;
}
function updateRobot(r, dt) {
  /* drop finished / invalid targets (flora harvested/napping, rubble repaired,
     packed-up seaports are the kid's job — not a repair) */
  if (r.targ && (r.targ.k ? (!r.targ.rubble || r.targ.packed) : (r.targ.gone || r.targ.sleepT > 0))) r.targ = null;
  if (!r.targ) {
    r.seekT = (r.seekT || 0) - dt;               // gentle rescan pace when idle
    if (r.seekT > 0) return;
    /* robots stay on their own island — never chase targets across water */
    const home = isleIdAt(Math.floor(r.x / TILE), Math.floor((r.y - GY0) / TILE));
    let bd = 1e9;
    for (const b of buildings) {                // rubble first — robots AND rovers love fixing (v6b)
      if (!b.rubble || b.packed) continue;
      if (home && isleIdAt(b.gx, b.gy) !== home) continue;
      if (targReserved(r, b)) continue;         // v4d: someone's already on it
      const s = B[b.k].size || 1;
      const d = Math.hypot(tX(b.gx) + s * 16 - r.x, tY(b.gy) + s * 16 - r.y);
      if (d < bd) { bd = d; r.targ = b; }
    }
    if (!r.targ) for (const f of flora) {
      if (f.gone || f.sleepT > 0) continue;     // v4d: napping treasure trees rest
      if (r.rover && f.type !== 'mrock' && f.type !== 'ice' &&
          f.type !== 'hem' && f.type !== 'frost') continue;   // v6b: rovers mine only
      if (home && isleIdAt(f.gx, f.gy) !== home) continue;
      if (targReserved(r, f)) continue;         // v4d: spread out, little buddies
      const d = Math.hypot(tX(f.gx) + 16 - r.x, tY(f.gy) + 24 - r.y);
      if (d < bd) { bd = d; r.targ = f; }
    }
    if (!r.targ) { r.seekT = 0.4; return; }
  }
  if (r.targ) {
    const s2 = r.targ.k ? (B[r.targ.k].size || 1) : 1;
    const tx2 = tX(r.targ.gx) + s2 * 16, ty2 = tY(r.targ.gy) + s2 * 16 + (r.targ.k ? 4 : 10);
    const d = Math.hypot(tx2 - r.x, ty2 - r.y);
    if (d > 26) {
      const nx = r.x + (tx2 - r.x) / d * r.sp * dt, ny = r.y + (ty2 - r.y) / d * r.sp * dt;
      if (isLandPx(nx, ny)) { r.x = nx; r.y = ny; }
      else if (isLandPx(nx, r.y)) r.x = nx;
      else if (isLandPx(r.x, ny)) r.y = ny;
      else r.targ = null;
      r.frame += dt * 6;
      if (r.rover) {                            // v6a: dust kicked up behind the wheels (red on Mars)
        r.dustT -= dt;
        if (r.dustT <= 0) {
          r.dustT = 0.18;
          spawnP(r.x + (Math.random() - 0.5) * 8, r.y + 2, (r.red ? SPR.puffRed : SPR.puffDark)[1],
                 { vx: (Math.random() - 0.5) * 14, vy: -6 - Math.random() * 6, g: -5, life: 0.5 });
        }
      }
    } else {
      r.cool -= dt;
      if (r.cool <= 0) {
        r.cool = 1.1;
        if (r.targ.k) repairWhack(r.targ);
        else harvestFlora(r.targ, r.x, r.y - 10);
      }
    }
  }
}
function updateDrake(dr, i, dt) {
  const owner = players[i % (players.length || 1)];  // both drakes follow players
  if (!owner) return;
  /* if their human sails away, drakes hover to the shore and wait (cute) */
  const ax = owner.boat ? owner.shoreX : owner.x, ay = owner.boat ? owner.shoreY : owner.y;
  const tx2 = ax + (i ? 26 : -26), ty2 = ay - 6;
  dr.x += (tx2 - dr.x) * Math.min(1, dt * 3);

function boardingPads() {
  if (travelCin()) return [];

    const s = B[b.k].size || 1;
    out.push({ b, ship, to, cx: tX(b.gx) + s * 16, cy: tY(b.gy) + s * 32 + 20 });
  };

  if (travel && travel.ship === 'clipper') {

    }

  }

      if (pad) zone(pad, 'rocket', 'moon');

    if (moonReturnDone || returnFueled) {         // survival arc: fuel first!
      const port = buildings.find(b => b.k === 'moonport');
      if (port) zone(port, 'rocket', 'earth');
    }
    if (cruiserStage >= 3 && cruiserAt === 'moon') {
      const sy = buildings.find(b => b.k === 'shipyard' && !b.rubble);
      if (sy) zone(sy, 'cruiser', 'mars');

  } else if (world === 'mars') {
    /* v7: the SURVEY BARGE waits beside the MARS SHIPYARD. Loaded + express
       unlocked → she flies the cargo straight home; otherwise → the belt! */
    if (bargeStage >= 3) {
      /* parked just far enough from the yard that ✕ AT the yard still
         means "upgrade", and ✕ AT the barge means "fly" */
      const my = buildings.find(b => b.k === 'marsyard' && !b.rubble);
      if (my) out.push({ b: my, ship: 'barge', to: (firstHaulDone && cargoTotal() > 0) ? 'earth' : 'scan',
                         cx: tX(my.gx) + 118, cy: tY(my.gy) + 74 });
    }
    /* kid-proof absolute: pre-fuel the cruiser waits at the LANDER and can
       ALWAYS fly home free — nobody strands on the red planet, ever */
    if (marsReturnDone || marsFueled) {
      const port = buildings.find(b => b.k === 'marsport');
      if (port) { zone(port, 'cruiser', 'moon'); return out; }
    }
    const l = buildings.find(b => b.k === 'marslander');
    if (l) zone(l, 'cruiser', 'moon');
  } else if (world === 'mission') {
    /* v7: home is the barge at the CARGO LOADER — always boardable */

    if (cl) out.push({ b: cl, ship: 'barge', to: 'mars', cx: tX(cl.gx) + 32, cy: tY(cl.gy) + 76 });
  }

/* ── THE SOLAR MAP — full-screen chooser: sun left, nine worlds on arcs,
   a comet cursor gliding between them. Baked once, lazily. ── */
let SOLAR_POS = null;
function bakeSolarBG() {
  if (SPR.solarBG) return;
  const [c, g] = C(W, H);
  const gr = g.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, '#04060f'); gr.addColorStop(0.55, '#080b1c'); gr.addColorStop(1, '#0d1226');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  for (let i = 0; i < 240; i++) {                // starfield (same language as the chart)
    g.fillStyle = i % 7 ? 'rgba(200,220,255,0.5)' : 'rgba(159,216,255,0.85)';
    g.fillRect((i * 211 + 43) % W, (i * 149 + 17) % H, i % 4 ? 2 : 3, i % 4 ? 2 : 3);
  }
  const neb = g.createRadialGradient(W * 0.72, 130, 20, W * 0.72, 130, 340);
  neb.addColorStop(0, 'rgba(120,80,220,0.12)'); neb.addColorStop(1, 'rgba(120,80,220,0)');
  g.fillStyle = neb; g.fillRect(W * 0.72 - 340, 0, 680, 480);
  /* THE SUN — huge at the left edge */
  const sy = H / 2 - 40;
  const halo = g.createRadialGradient(-30, sy, 30, -30, sy, 380);
  halo.addColorStop(0, 'rgba(255,240,180,0.95)'); halo.addColorStop(0.35, 'rgba(255,200,90,0.4)'); halo.addColorStop(1, 'rgba(255,200,90,0)');
  g.fillStyle = halo; g.fillRect(0, sy - 380, 400, 760);
  g.fillStyle = '#fff3b0'; g.beginPath(); g.arc(-30, sy, 118, 0, 6.3); g.fill();
  g.fillStyle = '#ffe27a'; g.beginPath(); g.arc(-30, sy, 104, 0, 6.3); g.fill();
  /* nine gentle orbit arcs + the worlds themselves */
  SOLAR_POS = [];
  const PBALL = [
    ['#b8825c', 17], ['#e8c894', 19], ['#4aa8c9', 20], ['#d05a36', 19],
    ['#d8b890', 28], ['#e0c088', 24], ['#9fe8ff', 21], ['#3a7bd5', 21], ['#c9b0a0', 12]];
  for (let i = 0; i < 9; i++) {
    const px = 140 + i * 127, py = sy + 26 + Math.sin(i * 1.1) * 128;
    const r = PBALL[i][1];
    g.strokeStyle = 'rgba(159,216,255,0.14)'; g.lineWidth = 2;
    g.beginPath(); g.ellipse(-30, sy, px + 30, (px + 30) * 0.52, 0, -0.85, 0.85); g.stroke();
    SOLAR_POS.push({ x: px, y: py, r });
  }
  for (let i = 0; i < 9; i++) {
    const { x: px, y: py, r } = SOLAR_POS[i];
    const gl = g.createRadialGradient(px, py, 2, px, py, r * 2.1);
    gl.addColorStop(0, PBALL[i][0]); gl.addColorStop(1, 'rgba(255,255,255,0)');
    g.globalAlpha = 0.4; g.fillStyle = gl; g.fillRect(px - r * 2.1, py - r * 2.1, r * 4.2, r * 4.2);
    g.globalAlpha = 1;
    if (i === 0) g.drawImage(SPR.ballMercury, px - r, py - r, r * 2, r * 2);
    else if (i === 1) g.drawImage(SPR.ballVenus, px - r, py - r, r * 2, r * 2);
    else if (i === 2) g.drawImage(SPR.earthBall, px - r, py - r, r * 2, r * 2);
    else if (i === 3) g.drawImage(SPR.ballMars, px - r, py - r, r * 2, r * 2);
    else if (i === 4) g.drawImage(SPR.ballJupiter, px - r, py - r, r * 2, r * 2);
    else {
      g.fillStyle = PBALL[i][0]; g.beginPath(); g.arc(px, py, r, 0, 6.3); g.fill();
      g.fillStyle = 'rgba(255,255,255,0.35)'; g.beginPath(); g.arc(px - r * 0.3, py - r * 0.3, r * 0.62, 0, 6.3); g.fill();
      g.fillStyle = 'rgba(20,16,30,0.4)'; g.beginPath(); g.arc(px + r * 0.45, py + r * 0.35, r * 0.9, 0, 6.3); g.fill();
      if (i === 5) {                             // Saturn's rings, of course
        g.strokeStyle = '#e8d8b0'; g.lineWidth = 4;
        g.beginPath(); g.ellipse(px, py, r * 1.8, r * 0.55, -0.3, 0, 6.3); g.stroke();
        g.strokeStyle = 'rgba(160,140,100,0.8)'; g.lineWidth = 1.6;
        g.beginPath(); g.ellipse(px, py, r * 1.45, r * 0.42, -0.3, 0, 6.3); g.stroke();
      }
      if (i === 6) {                             // Uranus rolls sideways
        g.strokeStyle = 'rgba(200,240,255,0.7)'; g.lineWidth = 2.4;
        g.beginPath(); g.ellipse(px, py, r * 0.5, r * 1.5, 0.3, 0, 6.3); g.stroke();
      }
      if (i === 7) {                             // Neptune's wind streak
        g.fillStyle = 'rgba(255,255,255,0.5)'; g.fillRect(px - r * 0.7, py - 3, r * 1.2, 3);
      }
      if (i === 8) {                             // Pluto's heart. Obviously.
        g.fillStyle = '#e8d8c8';
        g.beginPath(); g.arc(px - 2.6, py + 2, 3, 0, 6.3); g.arc(px + 2.6, py + 2, 3, 0, 6.3); g.fill();
        g.beginPath(); g.moveTo(px - 5.4, py + 3); g.lineTo(px, py + 9.4); g.lineTo(px + 5.4, py + 3); g.fill();
      }
    }
    /* the asteroid belt shimmer between Mars and Jupiter */
    if (i === 3) {
      g.fillStyle = 'rgba(216,196,154,0.8)';
      for (let k = 0; k < 26; k++) {
        const ba = -0.7 + (k / 26) * 1.4, br = px + 66 + (k * 37) % 22;
        g.fillRect(-30 + Math.cos(ba) * br, sy + Math.sin(ba) * br * 0.52, 2, 2);
      }
    }
  }
  otxtInto(g, 'THE NINE PLANETS', W / 2, 62, 34, '#ffd24a');
  SPR.solarBG = c;
}

/* board-and-go: choosing a world on the map IS the boarding call — the
   whole crew hops aboard and the countdown starts at the berth */
function startClipperTravel(dest) {
  closeInterior();
  const cb = clipperBerth();
  const site = cb ? cb.site : { gx: CX, gy: CYG, s: 1 };
  for (const p of players) {
    if (p.mode === 'cannon') unmanCannon(p);
    p.aboard = true; p.target = null; p.ghost = null; p.mode = 'walk'; p.boat = false; p.hop = null;
  }
  const wz = whizRoute(world, dest);
  travel = { phase: 'count', ship: 'clipper', from: world, to: dest, dir: 'clip',
             pad: cb ? cb.pad : null, srcSite: site, destPad: null, site: null,
             sBerthX: cb ? cb.x : tX(site.gx) + 32, dBerthX: 0,
             whiz: wz.bodies, whizDur: wz.dur,

/* the bodies between two worlds, in fly-by order (+ the belt's sparkle) */
function whizRoute(from, to) {
  const a = PLANET_ORD[from], b2 = PLANET_ORD[to];
  const lo = Math.min(a, b2), hi = Math.max(a, b2);
  const NAME = { venus: 'VENUS', earth: 'EARTH', mars: 'MARS', mercury: 'MERCURY', belt: 'THE ASTEROID BELT' };
  const COL = { venus: '#e8c894', earth: '#59a0e0', mars: '#ff8a66', mercury: '#c98a4a', belt: '#d8c49a' };
  const mid = [];
  for (const pk in PLANET_ORD) {
    const o = PLANET_ORD[pk];
    if (o > lo && o < hi) mid.push({ k: pk, o });
  }
  if (lo < 3.5 && hi > 3.5) mid.push({ k: 'belt', o: 3.5 });
  mid.sort((p2, q2) => p2.o - q2.o);
  if (b2 < a) mid.reverse();                     // inward: pass them sun-ward
  const bodies = mid.map((p2, i) => ({ k: p2.k, name: NAME[p2.k], col: COL[p2.k],
                                       t0: 0.5 + i * 1.15, t1: 1.6 + i * 1.15, i }));
  return { bodies, dur: Math.max(2.4, 1.6 + mid.length * 1.15 + 1.0) };
}

  for (let i = 0; i < 24; i++) {
    g.fillStyle = i % 5 ? 'rgba(200,215,255,0.5)' : 'rgba(159,216,255,0.8)';
    g.fillRect((rng2() * 146) | 0, (rng2() * 92) | 0, i % 3 ? 2 : 3, i % 3 ? 2 : 3);
  }
  const body = card.rare ? '#3a4468' : card.type === 'crystal' ? '#5c5470' : '#5c584e';
  const hi   = card.rare ? '#5a6a9a' : card.type === 'crystal' ? '#746a8a' : '#736d5c';
  const s0 = rng2() * 6.28, s1 = rng2() * 6.28;
  const cx3 = 75, cy3 = 48, rx = 40 + rng2() * 8, ry = 24 + rng2() * 6;
  g.fillStyle = body; g.beginPath();
  for (let a = 0; a <= 40; a++) {

    const wob = 1 + 0.14 * Math.sin(th * 3 + s0) + 0.09 * Math.sin(th * 5 + s1);
    const px2 = cx3 + Math.cos(th) * rx * wob, py2 = cy3 + Math.sin(th) * ry * wob;
    if (a) g.lineTo(px2, py2); else g.moveTo(px2, py2);
  }
  g.closePath(); g.fill();
  g.fillStyle = hi; g.beginPath(); g.ellipse(cx3 - 8, cy3 - 7, rx * 0.6, ry * 0.55, -0.3, 0, 6.3); g.fill();
  for (let i = 0; i < 4; i++) {                  // craters
    const a2 = rng2() * 6.28, rr2 = rng2() * 0.55 + 0.15;
    const px2 = cx3 + Math.cos(a2) * rx * rr2, py2 = cy3 + Math.sin(a2) * ry * rr2;
    g.fillStyle = 'rgba(20,20,28,0.5)'; g.beginPath(); g.ellipse(px2, py2, 5 + rng2() * 4, 3 + rng2() * 2.4, 0, 0, 6.3); g.fill();
  }
  /* resource sparkle dots in the type colour */
  g.fillStyle = card.rare ? '#7dffe0' : card.type === 'crystal' ? '#c99bff' : '#d8c49a';
  for (let i = 0; i < 7; i++) {
    const a2 = rng2() * 6.28, rr2 = rng2() * 0.7;
    g.fillRect(cx3 + Math.cos(a2) * rx * rr2 - 1.4, cy3 + Math.sin(a2) * ry * rr2 - 1.4, 3, 3);
  }
  if (card.rare) {                               // teal glyph glow on the vault rock
    const gl = g.createRadialGradient(cx3, cy3, 2, cx3, cy3, 22);
    gl.addColorStop(0, 'rgba(125,255,224,0.55)'); gl.addColorStop(1, 'rgba(125,255,224,0)');
    g.fillStyle = gl; g.fillRect(cx3 - 22, cy3 - 22, 44, 44);
    g.fillStyle = '#d8fff4'; g.fillRect(cx3 - 1.6, cy3 - 6, 3.2, 12); g.fillRect(cx3 - 6, cy3 - 1.6, 12, 3.2);
  }

}
function genScanCards() {

/* ── deposits burst into drifting CHUNKS (pooled — never allocated hot) ── */
function spawnChunk(x, y, resK, kick) {
  if (!exped) return;
  for (const ch of exped.chunks) {
    if (ch.on) continue;
    const a = Math.random() * 6.28;
    const sp = (kick || 1) * (26 + Math.random() * 30) * (exped.hazard === 'drift' ? 1.8 : 1);
    ch.on = true; ch.x = x; ch.y = y; ch.res = resK;
    ch.vx = Math.cos(a) * sp; ch.vy = Math.sin(a) * sp;
    return;
  }
}
function burstDeposit(f) {
  const cx2 = tX(f.gx) + 16, cy2 = tY(f.gy) + 8;
  const n = f.big ? 5 : 2 + ((Math.random() * 2) | 0);
  for (let i = 0; i < n; i++) spawnChunk(cx2, cy2, f.res);
  f.gone = true; f.hits = 0; f.regrowT = 99999;  // deposits never regrow — day trips!
  bgDirty = true;
  SFX.burst(); SFX.pop();
  addFloat(cx2, cy2 - 14, 'CHUNKS!', RES_COL[f.res]);
  for (let i = 0; i < 6; i++) spawnP(cx2, cy2, SPR.chip, { vy: -40, g: -10, life: 0.6 });
}
function vaultBurst(f) {
  const cx2 = tX(f.gx) + 16, cy2 = tY(f.gy) + 8;
  const n = 2 + ((Math.random() * 2) | 0);       // 2-3 ALIEN ALLOY chunks
  for (let i = 0; i < n; i++) spawnChunk(cx2, cy2, 'alloy');

  for (let i = 0; i < 10; i++) spawnP(cx2, cy2, SPR.sparkB[i % 2], { vy: -50, g: -8, life: 0.9 });

/* one cannon blast on a deposit: smalls burst, bigs + the vault crack 1/3 */
function depositBlast(f) {
  const cx2 = tX(f.gx) + 16, cy2 = tY(f.gy) + 8;
  if (f.type === 'vault') {
    f.hits++;

/* ── mission structures: paid in cargo chunks (banked first, then carried) ── */
function cargoAvail(r) {
  let n = cargo[r] || 0;
  for (const p of players) for (const ck of (p.carry || [])) if (ck === r) n++;
  return n;
}
function missionAfford(cost) {
  for (const r in cost) if (cargoAvail(r) < cost[r]) return false;
  return true;
}
function payMissionCost(cost) {
  for (const r in cost) {
    let need = cost[r];
    const fromBank = Math.min(need, cargo[r] || 0);
    cargo[r] -= fromBank; need -= fromBank;
    for (const p of players) {
      while (need > 0 && (p.carry || []).indexOf(r) >= 0) {
        p.carry.splice(p.carry.indexOf(r), 1); need--;
      }
    }
  }
}
function placeMissionB(k, gx, gy) {
  const cost = MB[k];
  if (!cost || !validAt(k, gx, gy) || !missionAfford(cost)) return false;

  payMissionCost(cost);

  addFloat(tX(gx) + 16, tY(gy) - 22, costStr, '#ffd24a');
  const b = addBuilding(k, gx, gy);
  if (k === 'minidrill') b.drillT = 5;
  if (k === 'boostbattery') {
    exped.boosts++;
    exped.timer += BOOST_SECS; exped.timerMax += BOOST_SECS;
    addFloat(tX(gx) + 16, tY(gy) - 36, '+' + BOOST_SECS + 's BATTERY!', '#7dffe0');
    SFX.power();
  }
  SFX.place();
  for (let i = 0; i < 8; i++)
    spawnP(tX(gx) + 16 + (Math.random() - 0.5) * 26, tY(gy) + 30, SPR.puff[1], { vy: -25, g: -10, life: 0.5 });
  return true;
}

/* ── JET HOP — pushing off a chunk edge scans 6 tiles (3 lanes) for land ── */
function tryJetHop(p, mx, my) {
  if (p.hop || p.stunT > 0) return;
  const m = Math.hypot(mx, my);
  if (!m) return;
  const dx = mx / m, dy = my / m;
  for (let i = 1; i <= 6; i++) {
    for (const lane of [0, -1, 1]) {
      const px2 = p.x + dx * 32 * i + (-dy) * 32 * lane;
      const py2 = p.y + dy * 32 * i + dx * 32 * lane;
      if (!isLandPx(px2, py2)) continue;
      const gx = Math.floor(px2 / TILE), gy = Math.floor((py2 - GY0) / TILE);
      if (occ[gy] && occ[gy][gx]) continue;      // never land ON a structure
      p.hop = { t: 0, dur: 0.4 + i * 0.05, x0: p.x, y0: p.y, x1: tX(gx) + 16, y1: tY(gy) + 16, bounce: false };
      p.target = null;
      SFX.jet();
      for (let j = 0; j < 3; j++)
        spawnP(p.x - dx * 6, p.y + 4, SPR.puffDark[j % 2], { vx: -dx * 30, vy: -dy * 30 - 8, g: -6, life: 0.4 });
      return;
    }
  }
  /* nothing to land on: a soft 0.25s bounce-back — never strands, no drama */
  p.hop = { t: 0, dur: 0.25, x0: p.x, y0: p.y, xm: p.x + dx * 15, ym: p.y + dy * 15, bounce: true };
  p.target = null;
  SFX.bounce();
}

/* ── the per-frame mission brain (timer, hazards, chunks, drills, banking) ── */
function updateMission(dt) {
  const q = exped;
  if (!q || !q.started) return;
  const cl = buildings.find(b => b.k === 'cargoloader');
  /* battery drains only while actually on the rock */
  if (!travel) {
    q.timer -= dt;
    if (!q.warned && q.timer <= q.timerMax * 0.25) {
      q.warned = true;
      banners.push({ title: 'BATTERY LOW!', sub: 'HEAD BACK TO THE SHIP — bank your chunks!', t: 0, dur: 3 });
      SFX.alarm();
    }
    if (q.timer <= 0) { q.timer = 0; startRescue(); return; }
  }
  /* chunks drift, bounce softly at the world edge, clamp for pickup */
  for (const ch of q.chunks) {
    if (!ch.on) continue;
    ch.x += ch.vx * dt; ch.y += ch.vy * dt;
    const fr = q.hazard === 'drift' ? 0.995 : 0.975;   // DRIFT FIELD: chase-fun
    ch.vx *= fr; ch.vy *= fr;
    if (ch.x < 24) { ch.x = 24; ch.vx = Math.abs(ch.vx) * 0.6; }
    if (ch.x > WORLD_W - 24) { ch.x = WORLD_W - 24; ch.vx = -Math.abs(ch.vx) * 0.6; }
    if (ch.y < GY0 + 24) { ch.y = GY0 + 24; ch.vy = Math.abs(ch.vy) * 0.6; }
    if (ch.y > WORLD_H - 24) { ch.y = WORLD_H - 24; ch.vy = -Math.abs(ch.vy) * 0.6; }
    /* pickup: forgiving radius, works mid-hop, 2 per pair of arms */
    for (const p of players) {
      if (p.aboard || (p.carry || []).length >= 2) continue;
      if (Math.hypot(ch.x - p.x, ch.y - p.y) < 26) {
        ch.on = false;
        p.carry = p.carry || [];
        p.carry.push(ch.res);
        addFloat(p.x, p.y - 40, 'GOT IT!', RES_COL[ch.res]);
        SFX.pop(); SFX.coin();
        break;
      }
    }
  }
  /* the beacon pickup (rare missions) */
  if (q.beacon) {
    q.beacon.t += dt;
    for (const p of players) {
      if (p.aboard || Math.hypot(q.beacon.x - p.x, q.beacon.y - p.y) >= 30) continue;
      q.beacon = null;
      beaconsFound++;
      banners.push({ title: 'ALIEN BEACON DISCOVERED!', sub: beaconsFound >= 3 ? 'The fragments hum together...' : 'Beacon ' + beaconsFound + ' — someone MADE this...', t: 0, dur: 4, legendary: true });
      SFX.legendary();
      fwShow = Math.max(fwShow, 3); fwT = 0;
      if (beaconsFound >= 3 && !mapAssembled) { mapAssembled = true; vignette = { t: 0, map: true }; }
      break;
    }
  }
  /* banking at the CARGO LOADER */
  if (cl) {
    const lx = tX(cl.gx) + 32, ly = tY(cl.gy) + 32;
    q.fullT -= dt;
    for (const p of players) {
      if (p.aboard || !(p.carry || []).length) continue;
      if (Math.hypot(lx - p.x, ly - p.y) > 56) continue;
      while (p.carry.length) {
        if (cargoTotal() >= bargeSlots()) {
          if (q.fullT <= 0) { q.fullT = 1.2; addFloat(lx, ly - 46, 'CARGO FULL!', '#ff9a8a'); SFX.cancel(); }
          break;
        }
        const r = p.carry.pop();
        cargo[r] = (cargo[r] || 0) + 1;
        addFloat(lx, ly - 130, '+1 CRATE (' + cargoTotal() + '/' + bargeSlots() + ')', RES_COL[r]);   // above the BOARD prompt
        SFX.thunk();
      }
    }
  }
  /* MINI DRILLS auto-crack the deposit beside them (flares pause them) */
  const flaring = q.flareA > 0.35;
  for (const b of buildings) {
    if (b.k !== 'minidrill' || flaring) continue;
    b.drillT = (b.drillT === undefined ? 5 : b.drillT) - dt;
    if (b.drillT > 0) continue;
    b.drillT = 6;
    let target = null;
    for (const f of flora) {
      if (f.gone || f.type !== 'dep') continue;
      if (Math.abs(f.gx - b.gx) <= 1 && Math.abs(f.gy - b.gy) <= 1) { target = f; break; }
    }
    if (!target) continue;
    target.hits++;
    target.shakeT = 0.3; bgDirty = true;
    SFX.mine();
    for (let i = 0; i < 3; i++) spawnP(tX(target.gx) + 16, tY(target.gy) + 10, SPR.chip, { life: 0.5 });
    if (target.hits >= 3) burstDeposit(target);
  }
  if (travel) return;                            // hazards nap during boarding/cinematics
  /* ── the ONE hazard of this mission ── */
  if (q.hazard === 'pebbles') {
    q.pebT -= dt;
    if (q.pebT <= 0) {
      q.pebT = 20 - q.stars * 2 + Math.random() * 6;
      let n = 1 + q.stars;
      for (const pb of q.pebbles) {
        if (pb.on || n <= 0) continue;
        /* aim near the players so the dodge game is real (but fair) */
        const pp = players[(Math.random() * players.length) | 0];
        for (let tr = 0; tr < 14; tr++) {
          const px2 = pp.x + (Math.random() - 0.5) * 300, py2 = pp.y + (Math.random() - 0.5) * 220;
          if (!isLandPx(px2, py2)) continue;
          pb.on = true; pb.x = px2; pb.y = py2; pb.warnT = 1.2; pb.fallT = 0.35;
          n--;
          break;
        }
        if (n <= 0) break;
      }
      if (q.pebbles.some(pb => pb.on)) { addFloat(players[0].x, players[0].y - 52, 'PEBBLES INCOMING!', '#ffd24a'); SFX.alarm(); }
    }
    for (const pb of q.pebbles) {
      if (!pb.on) continue;
      if (pb.warnT > 0) { pb.warnT -= dt; continue; }
      pb.fallT -= dt;
      if (pb.fallT > 0) continue;
      pb.on = false;                             // THUMP
      shakeAmt = Math.max(shakeAmt, 2);
      SFX.mine(); SFX.pop();
      for (let i = 0; i < 5; i++) spawnP(pb.x, pb.y, SPR.chip, { vy: -30, g: -8, life: 0.5 });
      for (const ch of q.chunks) {               // scatter loose chunks a little
        if (!ch.on || Math.hypot(ch.x - pb.x, ch.y - pb.y) > 46) continue;
        const a = Math.atan2(ch.y - pb.y, ch.x - pb.x);
        ch.vx += Math.cos(a) * 70; ch.vy += Math.sin(a) * 70;
      }
      for (const p of players) {                 // brief dizzy — zero damage, ever
        if (!p.aboard && !p.hop && Math.hypot(p.x - pb.x, p.y - pb.y) < 34) p.stunT = 0.6;
      }
    }
  } else if (q.hazard === 'crumble') {
    for (const cr of q.crumbles) {

    const tgy = clamp(Math.floor((targets[0].y - GY0) / TILE), 1, GH - 2);

}

/* ── recent-events ring buffer (persisted) ── */
function pushEvent(k) {
  recentEvents.push({ k, t: playtime });
  if (recentEvents.length > 8) recentEvents.shift();
}
function latestEvent() {
  for (let i = recentEvents.length - 1; i >= 0; i--)
    if (playtime - recentEvents[i].t < 180 && CONTEXT_LINES[recentEvents[i].k]) return recentEvents[i];
  return null;
}

/* ── interior sprites: mini resident avatars, the cat, speech bubble ── */

  /* resident avatar — same 12x16-unit language as the players; dirs [down, side] */
  const mkRes = (shirt, shirtD, hair, skin, o) => {
    o = o || {};
    const dirs = [];
    for (const d of [0, 2]) {
      dirs.push([0, 1, 2].map(f => S(12, 16, (g, P) => {

        P(6.6 + (step < 0 ? -0.8 : 0), 13, 2, 2.4, '#4a3018');
        P(3, 8 + ty * 0.6, 6, 5.4 - ty * 0.6, shirt);
        P(3, 8 + ty * 0.6, 1.4, 5.4 - ty * 0.6, shirtD);

  ctx.drawImage(SPR.dim, 0, 0);
  ctx.drawImage(I.room, IPX, IPY);
  if (I.flame) ctx.drawImage(SPR.flame[((T * 9) | 0) % 3], IPX + I.flame.x, IPY + I.flame.y, 20, 26);
  if (I.ding && I.dingF > 0) {
    ctx.globalAlpha = clamp(I.dingF, 0, 1);
    ctx.drawImage(SPR.lampGlow, IPX + I.ding.x - 15, IPY + I.ding.y - 15);
    otxt('DING!', IPX + I.ding.x, IPY + I.ding.y - 16, 13, '#ffd24a');
    ctx.globalAlpha = 1;
  }
  /* y-sorted actors (≤ 6 — reused list) */
  const L = I.drawList;
  L.length = 0;
  if (I.cat) L.push({ y: I.cat.y, cat: true });
  if (I.ball) L.push({ y: I.ball.y, ball: true });           // v7.2: the sky-park ball
  for (const r of I.residents) L.push({ y: r.y, r });
  for (const p of players) if (p.inside) L.push({ y: p.iy, p });
  L.sort((a, b2) => a.y - b2.y);
  for (const it of L) {
    if (it.cat) {
      ctx.drawImage(SPR.cat[((T * 2) | 0) % 2], IPX + I.cat.x - 24, IPY + I.cat.y - 28, 48, 36);
    } else if (it.ball) {
      ctx.drawImage(SPR.parkBall, IPX + I.ball.x - 10, IPY + I.ball.y - 14, 20, 20);
    } else if (it.r) {
      const r = it.r;
      const dirF = r.spr[r.side ? 1 : 0];
      const ay = r.alien ? Math.sin(T * 3 + r.x * 0.03) * 2 : 0;   // v7.2: aliens hover-bob, gently
      drawRoomActor(r.moving ? dirF[1 + ((r.frame | 0) % 2)] : dirF[0], r.x, r.y + ay, r.flip);
    } else {
      const p = it.p;
      const frames = SPR.av[p.pi][p.dir];
      drawRoomActor(p.moving ? frames[1 + ((p.frame | 0) % 2)] : frames[0], p.ix, p.iy, p.flip && p.dir === 2);
    }
  }
  /* hearts */
  for (const h of I.hearts) {
    if (!h.on) continue;
    ctx.globalAlpha = clamp(1.2 - h.t, 0, 1);
    ctx.drawImage(SPR.heart, IPX + h.x - 6, IPY + h.y - 6);
  }
  ctx.globalAlpha = 1;
  /* names + bubbles + prompts */
  otxt(roomTitle(I), W / 2, IPY + 36, 20, '#ffd24a');
  for (const r of I.residents)
    otxt(r.name, IPX + r.x, IPY + r.y - (r.small ? 58 : 66), 10, '#cfe8f4');
  for (const r of I.residents) {
    if (r.sayT <= 0 || !r.sayLines) continue;
    const bw = r.sayLines.w + 30, bh = r.sayLines.lines.length * 17 + 15;
    const bx = clamp(IPX + r.x - bw / 2, IPX + 8, IPX + IPW - 8 - bw);
    const by = IPY + r.y - 70 - bh;
    ctx.drawImage(SPR.bubP, 0, 0, 14, 44, bx, by, 14, bh);
    ctx.drawImage(SPR.bubP, 14, 0, 92, 44, bx + 14, by, bw - 28, bh);
    ctx.drawImage(SPR.bubP, 106, 0, 14, 44, bx + bw - 14, by, 14, bh);
    ctx.drawImage(SPR.bubTail, IPX + r.x - 6, by + bh - 3);
    for (let i = 0; i < r.sayLines.lines.length; i++)
      txt(r.sayLines.lines[i], bx + bw / 2, by + 19 + i * 17, 13, '#22303c', 'center');
  }
  const dm = I.door;
  if (dm) otxt('○ GO OUTSIDE', IPX + dm.x + dm.w / 2, IPY + dm.y - 8, 12, '#ffd1a1');
  const bob2 = Math.sin(T * 4) * 2;
  /* v7.2: the SKY LIFT — sliding doors mid-ride, call arrows otherwise */
  if (I.lift) {
    const lcx = IPX + LFX + LFW / 2;
    if (I.ride) {
      const f = I.ride.t < 0.42 ? clamp(I.ride.t / 0.36, 0, 1) : clamp(1 - (I.ride.t - 0.5) / 0.4, 0, 1);
      const w2 = Math.round(LFW / 2 * f);
      if (w2 > 0) {                              // baked panels, source-cropped — 2 blits
        ctx.drawImage(SPR.liftDoorL, 52 - w2, 0, w2, 98, IPX + LFX, IPY + 22, w2, IWALL - 30);
        ctx.drawImage(SPR.liftDoorR, 0, 0, w2, 98, IPX + LFX + LFW - w2, IPY + 22, w2, IWALL - 30);
      }
    } else {
      if (I.fl < I.nf - 1) otxt('▲', IPX + LFX + LFW + 28, IPY + 62 + bob2, 17, '#7dff9a');
      if (I.fl > 0) otxt('▼', IPX + LFX + LFW + 28, IPY + 100 - bob2, 17, '#7dff9a');
      for (const p of players) {
        if (!p.inside || !inLiftZone(p)) continue;
        otxt(I.fl === 0 ? '↑ RIDE UP' : I.fl === I.nf - 1 ? '↓ RIDE DOWN' : '↑↓ RIDE THE LIFT',
             lcx, IPY + IWALL + 76, 12, '#7dffe0');
        break;
      }
    }
  }
  if (I.hint) otxt(I.hint.str, I.lift ? IPX + LFX + LFW / 2 : W / 2, IPY + IWALL + 98, 14, I.hint.color);
  if (I.chart && mapAssembled) {                 // the finished chart gets a wandering sparkle
    ctx.globalAlpha = 0.35 + 0.3 * Math.sin(T * 2.6);
    ctx.drawImage(SPR.spark[((T * 3) | 0) % 2], IPX + I.chart.x + 30 + ((T * 26) % (I.chart.w - 60)), IPY + I.chart.y + 14 + (((T * 26) / 60 | 0) * 37 % 60));
    ctx.globalAlpha = 1;
  }
  for (const p of players) {
    if (!p.inside) continue;
    if (players.length > 1) otxt('P' + (p.pi + 1), IPX + p.ix, IPY + p.iy - 66, 10, p.pi ? '#ff9a8a' : '#8fd4ff');
    if (I.cat && Math.hypot(I.cat.x - p.ix, I.cat.y - p.iy) < 52) {
      otxt('✕ PET THE CAT', IPX + I.cat.x, IPY + I.cat.y - 38 + bob2, 13, '#7dff9a');
      continue;
    }
    let bst = null, bd = 58;
    for (const r of I.residents) {
      const d = Math.hypot(r.x - p.ix, r.y - p.iy);
      if (d < bd) { bd = d; bst = r; }
    }
    if (bst && bst.sayT <= 0) {
      const cookie = bst.baker && cookieDay !== new Date().toDateString();
      otxt(cookie ? '✕ COOKIE!' : '✕ SAY HI!', IPX + bst.x, IPY + bst.y - 76 + bob2, 13, cookie ? '#ffd24a' : '#7dff9a');
    }
  }
}

function nearFlora(p) {

    const d = Math.hypot(tX(f.gx) + 16 - p.x, tY(f.gy) + 22 - p.y);

function doAction(p) {

  if (!p.aboard) for (const bp of boardingPads()) {
    if (travel && travel.pad !== bp.b) continue;
    if (Math.hypot(bp.cx - p.x, bp.cy - p.y) < 78) { boardTravel(p, bp); return; }
  }
  if (world === 'moon') {
    if (moonStage() === 3 && nearMoonPortB(p)) { tryFuel(p); return; }   // ✕ at the port = fuel up
    const rb2 = nearRubble(p);
    if (rb2) { repairWhack(rb2); return; }
    const ob = nearKindB(p, 'observatory', 60);  // v6a: ✕ at the telescope = SPOT MARS
    if (ob) { openVignette(); return; }
    const sy2 = nearKindB(p, 'shipyard', 88);    // v6a: ✕ at the shipyard = fund the cruiser
    if (sy2) { fundCruiser(p, sy2); return; }
    const cn2 = nearCannon(p);                   // v4c: ✕ mans a pop cannon (moon too)
    if (cn2) { manCannon(p, cn2); SFX.confirm(); return; }
    const dr2 = nearDoorB(p);                    // v5b: ✕ at a moon-dome door = go inside
    if (dr2) { enterInterior(p, dr2); return; }

    const cb8 = clipperBerth();
    if (cb8 && Math.hypot(cb8.x - p.x, cb8.y - p.y) < 84) { openSolarMap('clipper'); return; }
    const mg8 = nearMega(p);                     // ✕ at a rising structure = deliver
    if (mg8) { feedMega(p, mg8); return; }
    const cn8 = nearCannon(p);
    if (cn8) { manCannon(p, cn8); SFX.confirm(); return; }
    const dr8 = nearDoorB(p);                    // completed structures welcome visitors
    if (dr8) { enterInterior(p, dr8); return; }

    if (rb3) { repairWhack(rb3); return; }
    /* v8a: the clipper parks beside the port when she followed you here */
    if (clipperStage >= 3 && clipperAt === 'mars') {
      const cbM = clipperBerth();
      if (cbM && Math.hypot(cbM.x - p.x, cbM.y - p.y) < 80) { openSolarMap('clipper'); return; }
    }
    const my = nearKindB(p, 'marsyard', 88);     // v7: tease → barge funding → hold upgrade
    if (my) {
      if (!marsBaseDone) { addFloat(p.x, p.y - 44, 'THE BELT AWAITS — SOMEDAY!', '#ffd24a'); SFX.ding(); return; }
      if (bargeStage < 3) { fundBarge(p, my); return; }
      if (expeditionsDone >= 1 && !bargeUpgraded) { tryBargeUpgrade(p); return; }
      addFloat(p.x, p.y - 44, 'BOARD THE BARGE TO SCAN THE BELT!', '#7dffe0'); SFX.ding();
      return;
    }
    const cn3 = nearCannon(p);                   // pop cannons vs dust devils
    if (cn3) { manCannon(p, cn3); SFX.confirm(); return; }
    const dr3 = nearDoorB(p);                    // ✕ at a hab-dome door = go inside
    if (dr3) { enterInterior(p, dr3); return; }
    const f3 = nearFlora(p);
    if (f3) harvestFlora(f3, p.x, p.y);
    return;
  }
  if (world === 'mission') {                     // v7 — out on a rock in the belt
    const cn4 = nearCannon(p);                   // cannons crack the BIG deposits
    if (cn4) { manCannon(p, cn4); SFX.confirm(); return; }
    const f4 = nearFlora(p);
    if (f4) harvestFlora(f4, p.x, p.y);
    return;
  }
  if (crate && Math.hypot(tX(crate.gx) + 16 - p.x, tY(crate.gy) + 12 - p.y) < 52) { openCrate(); return; }
  const rb = nearRubble(p);
  if (rb) { repairWhack(rb); return; }
  /* v8a: the harbor-side gantry — fund the STAR CLIPPER, then ✕ = the map */
  const cbE = clipperBerth();
  if (cbE && Math.hypot(cbE.x - p.x, cbE.y - p.y) < 84) {
    if (clipperStage < 3) { fundClipper(p, cbE.pad); return; }
    if (clipperAt === 'earth') { openSolarMap('clipper'); return; }
    addFloat(p.x, p.y - 44, "SHE'S AT " + clipperAt.toUpperCase() + '!', '#ffd24a');
    SFX.ding();
    return;
  }
  const mg = nearMega(p);                        // v7: ✕ at a rising megastructure = deliver
  if (mg) { feedMega(p, mg); return; }
  const cn = nearCannon(p);                      // v4c: ✕ mans a pop cannon
  if (cn) { manCannon(p, cn); SFX.confirm(); return; }
  const sp = nearSeaport(p);
  if (sp && boardBoat(p, sp)) return;           // ✕ by the dock = set sail!
  if (tryBoardMoor(p)) return;                  // ✕ by your moored dinghy = sail on!
  const dr = nearDoorB(p);                      // v5b: ✕ at a door = go inside!
  if (dr) { enterInterior(p, dr); return; }

  if (f) harvestFlora(f, p.x, p.y);
}
function menuItems() {
  if (world === 'mission') {                     // v7: the mission kit replaces the strip
    return [{ k: 'minidrill', mission: true, grp: 'tools' },
            { k: 'popcannon', mission: true, grp: 'tools' },
            { k: 'boostbattery', mission: true, grp: 'power' }];
  }
  const pool = [];
  for (const k in B) {
    const d = B[k];
    if (d.special || d.age > age) continue;
    if (!d.both && bHome(k) !== world) continue;    // v6b: each world builds its own kinds (v4c: `both` = anywhere)
    if (d.once && cnt(k) > 0) continue;         // one MOON PORT is plenty
    if (d.need && !d.need.every(n => cnt(n) > 0)) continue;   // star gate: needs the moon trio
    if (d.wonder && (cnt(k) > 0 || legends)) continue;        // wonders build exactly once
    if (d.needLegends && !legends) continue;    // v6a: OBSERVATORY unlocks with the Star Gate
    if (d.needMars && !marsSpotted) continue;   // v6a: SHIPYARD unlocks after SPOT MARS
    if (d.max && cnt(k) >= d.max) continue;     // v6a: rover garages cap at 3
    if (d.needAstro && !astroSeen()) continue;  // v7: REFINERY waits for the first haul
    if (d.grp === 'mega' && !starsteelSeen()) continue;   // v7: megas wait for starsteel
    pool.push({ k, grp: d.grp || 'tools' });
  }
  /* v5a: the strip is grouped by section (divider posts; L1/R1 hop) */
  const items = [];
  for (const g of BUILD_GRPS) for (const it of pool) if (it.grp === g) items.push(it);
  if (world === 'earth' && age >= 5 && cnt('launchpad') > 0 && !rocketSeq && !travel) items.push({ rocket: true, grp: 'tools' });
  if (world === 'earth' && age >= 7 && cnt('launchpad') > 0 && !moonRocketBought && !travel) items.push({ moonrocket: true, grp: 'tools' });
  items.push({ remove: true, grp: 'tools' });
  return items;
}
/* v5a: the DECORATE strip (□ toggles while the menu is open) */
function decorItems() {
  const items = [];
  for (const g of DECOR_GRPS) for (const k in D) if (D[k].grp === g) items.push({ k, decor: true, grp: g });
  items.push({ remove: true, grp: 'golden' });

}
const stripItems = p => (p && p.strip === 'decor' && world !== 'mission') ? decorItems() : menuItems();   // v7: no decor runs to the belt
function stripSections(items) {                  // start index of each group
  const secs = [];
  for (let i = 0; i < items.length; i++)
    if (!i || items[i].grp !== items[i - 1].grp) secs.push(i);
  return secs;
}
function hopSection(p, dir) {                    // L1/R1: jump between dividers
  const items = stripItems(p);
  const secs = stripSections(items);
  let cur = 0;
  for (let i = 0; i < secs.length; i++) if (secs[i] <= p.menuI) cur = i;
  p.menuI = secs[(cur + dir + secs.length) % secs.length];
}
function updatePlayer(p, dt) {
  if (p.inside) { updateInsidePlayer(p, dt); return; }   // v5b: room-space movement
  /* v7: mid-JET-HOP — precomputed tween, input ignored until touchdown */
  if (p.hop) {
    const h = p.hop;
    h.t += dt;
    const f = clamp(h.t / h.dur, 0, 1);
    if (h.bounce) {                              // out-and-back: no land in reach
      const ff = f < 0.5 ? f * 2 : (1 - f) * 2;
      p.x = h.x0 + (h.xm - h.x0) * ff; p.y = h.y0 + (h.ym - h.y0) * ff;
      p.hopH = Math.sin(f * Math.PI) * 8;
    } else {
      p.x = h.x0 + (h.x1 - h.x0) * f; p.y = h.y0 + (h.y1 - h.y0) * f;
      p.hopH = Math.sin(f * Math.PI) * 26;
      p.jetT = (p.jetT || 0) - dt;
      if (p.jetT <= 0) {
        p.jetT = 0.08;
        spawnP(p.x, p.y + 4 - p.hopH * 0.4, SPR.puffDark[(Math.random() * 2) | 0],
               { vx: (Math.random() - 0.5) * 20, vy: 14, g: -6, life: 0.35 });
      }
    }
    if (f >= 1) { p.hop = null; p.hopH = 0; }
    p.frame += dt * 7;
    return;
  }
  if (p.stunT > 0) { p.stunT -= dt; p.frame = 0; return; }   // v7: brief dizzy — just stars
  const v = moveVec(p.pi);
  const inMenu = p.mode === 'menu' || p.mode === 'boatmenu' || p.mode === 'cannon';
  let mx = 0, my = 0;
  if (!inMenu) { mx = v.dx; my = v.dy; }
  if ((mx || my)) { p.target = null; p.ghost = null; p.enterB = null; }
  else if (p.target) {
    const d = Math.hypot(p.target.x - p.x, p.target.y - p.y);
    if (d < 6) {
      p.target = null;
      if (p.enterB) {                            // v5b touch: tapped a door — step in on arrival
        const eb = p.enterB;
        p.enterB = null;
        if (nearDoorB(p) === eb) enterInterior(p, eb);
        else if (B[eb.k].mega && !megaDone(eb)) enterInterior(p, eb);   // v7.2: floats STILL BUILDING!
      }
    }
    else { mx = (p.target.x - p.x) / d; my = (p.target.y - p.y) / d; }
  }
  p.moving = !!(mx || my);
  if (p.moving) {
    let spd = p.boat ? 180 : 150;               // boats feel like walking +20%
    if (!p.boat) {                              // v5a: paths give a springy +15%
      const pd = decorAt(Math.floor(p.x / TILE), Math.floor((p.y - GY0) / TILE));
      if (pd && D[pd.k].path) spd *= 1.15;
    }
    const sp = spd * dt;
    let nx = clamp(p.x + mx * sp, 8, WORLD_W - 8), ny = clamp(p.y + my * sp, GY0 + 8, WORLD_H - 8);
    /* Overcooked-style leash: nobody may leave the shared screen */
    if (camFollowing()) {
      nx = clamp(nx, camX + 14, camX + W - 14);
      ny = clamp(ny, camY + 14, camY + H - 14);
    }
    const pass = p.boat ? isWaterPx : isLandPx;
    /* v7: the axis-slide fallback only counts when that axis actually moves —
       otherwise a straight push off a cliff "slid" zero pixels forever and
       the jet hop never fired */
    if (pass(nx, ny)) { p.x = nx; p.y = ny; }
    else if (mx && pass(nx, p.y)) { p.x = nx; p.target = null; }
    else if (my && pass(p.x, ny)) { p.y = ny; p.target = null; }
    else {
      p.target = null;
      /* v7: on a mission, pushing into space = JET HOP to the next chunk */
      if (world === 'mission' && !p.boat) tryJetHop(p, mx, my);
    }
    p.frame += dt * 7;
    if (Math.abs(mx) > Math.abs(my)) { p.dir = 2; p.flip = mx < 0; }
    else p.dir = my < 0 ? 1 : 0;
    if (p.boat) {                               // foamy wake trail
      p.wakeT -= dt;
      if (p.wakeT <= 0) {
        p.wakeT = 0.09;
        spawnP(p.x - mx * 14 + (Math.random() - 0.5) * 8, p.y - my * 14 + 8,
               SPR.wake, { vx: -mx * 26, vy: -my * 26 - 3, g: 0, life: 0.75 });
      }
    } else if (world !== 'earth') {             // v4b/v6b: dust puffs off every step (red on Mars)
      p.dustT -= dt;
      if (p.dustT <= 0) {
        p.dustT = 0.16;
        spawnP(p.x - mx * 8 + (Math.random() - 0.5) * 6, p.y + 2,
               (world === 'mars' ? SPR.puffRed : world === 'jupiter' ? SPR.puff : SPR.puffDark)[1],
               { vx: -mx * 18, vy: -8 - Math.random() * 8, g: -6, life: 0.5 });
      }
    }
  } else p.frame = 0;
}
function moveVec(pi) {
  let dx = 0, dy = 0;
  if (PADS && PADS[pi] && PADS[pi].connected) {
    const pd = PADS[pi];
    dx += pd.axis('lx'); dy += pd.axis('ly');
    if (pd.button('left')) dx -= 1;
    if (pd.button('right')) dx += 1;
    if (pd.button('up')) dy -= 1;
    if (pd.button('down')) dy += 1;
