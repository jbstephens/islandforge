      disaster: disaster ? { type: disaster.type, phase: disaster.phase,
                             targets: disaster.targets.map(t => ({ gx: t.b.gx, gy: t.b.gy, x: t.x, y: t.y,
                                                                   done: t.done, defended: !!t.defended })) } : null,
      /* v4c */
      meteorsBlocked,
      ballsLive: balls.filter(b => b.on).length,
      impact: lastImpact,
      rubble: buildings.filter(b => b.rubble).map(b => ({ k: b.k, gx: b.gx, gy: b.gy, repair: b.repair || 0, packed: !!b.packed })),
      /* v4d */
      costPill: pillRect && T - pillT < 0.5 ? Object.assign({}, pillRect) : null,
      moorE: players[0] && players[0].moorE ? { x: players[0].moorE.x, y: players[0].moorE.y } : null,
      /* v4b */
      wld: world,
      moon: { bought: moonRocketBought, arrived: moonArrived, returned: moonReturnDone, fueled: returnFueled },
      travel: travel ? { phase: travel.phase, dir: travel.dir, n: travel.n } : null,
      aboard: players.map(p => !!p.aboard),
      boardZone: !!boardingPad(),
      moonStage: moonStage(),
      otherBuildings: (() => {
        let out = [];
        for (const o of parked.values()) out = out.concat(o.buildings.map(b => b.k));
        return out;
      })(),
      allBuildings: allB().map(b => b.k),
      life: Object.assign({}, life),
      camFollow: camFollowing(),
      gate: gateSeq ? gateSeq.phase : null,
      pauseOpts: paused ? pauseOptions() : null,
      confirmPrestige: confirmPrestige ? { yes: confirmPrestige.yes } : null,
      menuKey: sel ? (sel.k || (sel.rocket && 'rocket') || (sel.moonrocket && 'moonrocket') || (sel.remove && 'remove') || null) : null,
      p2menuKey: (() => {
        const p = players[1];
        if (!p || p.mode !== 'menu') return null;
        const it = stripItems(p), s2 = it[clamp(p.menuI, 0, it.length - 1)];
        return s2 ? (s2.k || (s2.rocket && 'rocket') || (s2.moonrocket && 'moonrocket') || (s2.remove && 'remove') || null) : null;
      })(),
      /* v5a */
      wires: wires.length,
      poles: cnt('pole'),
      plugged: buildings.filter(b => b.idle === 'plug').map(b => [b.k, b.gx, b.gy]),
      lowPower: buildings.filter(b => b.idle === 'power').map(b => [b.k, b.gx, b.gy]),
      conn: buildings.filter(b => B[b.k].needPower).map(b => [b.k, b.gx, b.gy, !!b.conn]),
      strip: players[0] ? players[0].strip : null,
      p2strip: players[1] ? players[1].strip : null,
      stripSection: (() => {
        const p = players[0];
        if (!p || p.mode !== 'menu') return -1;
        const it = stripItems(p), secs = stripSections(it);
        let cur = 0;
        for (let i = 0; i < secs.length; i++) if (secs[i] <= p.menuI) cur = i;
        return cur;
      })(),
      decorCount: decor.length,
      decorList: decor.map(t => [t.k, t.gx, t.gy]),
      pathsLaid, goldenPlaced,
      /* v5b */
      interior: interior ? { kind: interior.kind, gx: interior.b.gx, gy: interior.b.gy,
                             fl: interior.fl || 0, floors: interior.nf || 1 } : null,
      inside: players.map(p => !!p.inside),
      insideCount, residentsGreeted, catPets, cookieDay,
      liftRides, starDeckSeen,                   // v7.2
      slot: curSlot,
      floatsLive: floats.filter(f => f.on).map(f => f.str),
      nearDoor: players[0] && !players[0].inside ? !!nearDoorB(players[0]) : false,
      /* v6a */
      seed,
      marsSpotted, cruiserStage,
      vignette: !!vignette,
      rovers: roverCount(),
      fuelSeen: fuelSeen(),
      /* v6b */
      mars: { arrived: marsArrived, returned: marsReturnDone, fueled: marsFueled, baseDone: marsBaseDone },
      marsStage: marsStage(),
      marsSeen: marsSeen(),
      devilsTamed,
      cruiserAt,
      zones: boardingPads().map(z => ({ ship: z.ship, to: z.to, kind: z.b.k, cx: z.cx, cy: z.cy })),
      travelShip: travel ? travel.ship : null,
      hudVis: (() => {
        const lunarSeen2 = moonArrived || res.regolith > 0 || res.ice > 0 || res.he3 > 0;
        return RES_LIST.filter(r => RES_AGE[r] <= age && !(LUNAR[r] && !lunarSeen2) &&
          !(MARTIAN[r] && !marsSeen()) && !(ASTRO[r] && !astroSeen()) &&
          !(r === 'alloy' && !((res.alloy || 0) > 0 || (life.alloy || 0) > 0)) &&
          !(r === 'fuel' && !fuelSeen()) &&
          !(PLANET_RES[r] && !planetResSeen(r)));
      })(),
      /* ── v7 ── */
      bargeStage, bargeUpgraded,
      expedition: exped ? { active: world === 'mission', timer: exped.timer, timerMax: exped.timerMax,
        cargo: Object.assign({}, cargo), slots: bargeSlots(), hazard: exped.hazard,
        type: exped.type, stars: exped.stars, template: exped.tmpl, rare: exped.rare,
        boosts: exped.boosts, warned: exped.warned,
        chunks: exped.chunks.filter(c => c.on).length,
        deposits: flora.filter(f => (f.type === 'dep' || f.type === 'vault') && !f.gone).length,
        beacon: !!exped.beacon } : null,
      scanScreen: scanScr ? { open: true, sel: scanScr.sel,
        cards: scanScr.cards.map(c => ({ type: c.type, stars: c.stars, hazard: c.hazard, rare: !!c.rare, tmpl: c.tmpl })) } : null,
      cargoGlobal: Object.assign({}, cargo),
      cargoTotal: cargoTotal(),
      firstHaulDone,
      expressReady: firstHaulDone && cargoTotal() > 0,
      expedCounter, lastRareAt, expeditionsDone,
      beaconsFound, mapAssembled,
      megastructures: allB().filter(b => B[b.k].mega).map(b => ({ k: b.k, gx: b.gx, gy: b.gy,
        stage: b.stage || 0, max: megaMax(b.k), complete: megaDone(b) })),
      /* v8a */
      clipperStage, clipperAt,
      planetsVisited: Object.assign({}, planetsVisited),
      solarMapOpen: !!solarMap,
      solarSel: solarMap ? solarMap.sel : -1,
      planetWorlds: ['mercury', 'jupiter'].filter(pk => world === pk || parked.has(pk)),
      travelWhiz: travel && travel.whiz ? travel.whiz.map(w2 => w2.k) : null,
      mercMegas: planetMegaCnt('mercury'), jupMegas: planetMegaCnt('jupiter'),
      hop: players.map(p => !!p.hop),
      hopH: players.map(p => p.hopH || 0),
      carry: players.map(p => (p.carry || []).slice()),
      stun: players.map(p => (p.stunT || 0) > 0),
      missionStrip: world === 'mission' ? menuItems().map(it => it.k) : null,
      unloadFx: unloadFx > 0,
    };
  },
  /* ── v5a hooks ── */
  decorPlace(k, gx, gy) { return placeDecor(k, gx, gy); },
  decorRemove(gx, gy) { const it = decorAt(gx, gy); return it ? removeDecor(it) : false; },
  decorInfo() { return decor.map(t => ({ k: t.k, gx: t.gx, gy: t.gy,
    mask: (D[t.k].path || D[t.k].conn) ? decorMask(t) : -1 })); },
  wireUp() {                                     // migration-style auto-poling, every world
    let n = autoWirePoles();
    for (const nm of ['earth', 'moon', 'mars'])
      if (nm !== world) n += inWorld(nm, autoWirePoles);
    return n;
  },
  gridInfo() {
    return { wires: wires.length, poles: cnt('pole'),
             plugged: buildings.filter(b => b.idle === 'plug').length,
             conn: buildings.filter(b => B[b.k].needPower && b.conn).length };
  },
  /* ── v5b hooks — walkable interiors ── */
  enterHouse(gx, gy, pi) {                       // teleport to the door + enter through the player path
    const p = players[pi || 0];
    const b2 = occ[gy] && occ[gy][gx];
    if (!p || !b2 || !ENTERABLE[b2.k]) return false;
    const s = B[b2.k].size || 1;
    p.x = tX(b2.gx) + s * 16; p.y = tY(b2.gy) + s * 32 + 12;
    p.target = null; p.boat = false;
    return enterInterior(p, b2) ? interior.kind : false;
  },
  firstCabin() {
    const b = firstHomeCabin();
    return b ? { gx: b.gx, gy: b.gy } : null;
  },
  interiorInfo() {
    if (!interior) return null;
    return { kind: interior.kind, panel: { x: IPX, y: IPY, w: IPW, h: IPH },
             door: interior.door ? Object.assign({}, interior.door) : null,   // v7.2: upstairs has none
             solids: interior.solids.map(s => Object.assign({}, s)),
             spots: interior.spots.length,
             cat: interior.cat ? { x: interior.cat.x, y: interior.cat.y } : null,
             hearts: interior.hearts.filter(h => h.on).length,
             residents: interior.residents.map(r => ({ name: r.name, x: Math.round(r.x), y: Math.round(r.y),
               baker: !!r.baker, greeted: !!r.greeted, say: r.sayT > 0 ? r.say : null })),
             players: players.map(p => p.inside ? { x: Math.round(p.ix), y: Math.round(p.iy) } : null) };
  },
  teleInside(pi, x, y) {
    const p = players[pi || 0];
    if (!p || !p.inside) return false;
    p.ix = x; p.iy = y; p.itarget = null;
    return true;
  },
  talkToName(name, pi) {                         // stand by the named resident and say hi
    const p = players[pi || 0];
    if (!p || !p.inside || !interior) return null;
    const r = interior.residents.find(r2 => r2.name === name) || interior.residents[0];
    if (!r) return null;
    p.ix = clamp(r.x + 8, 42, IPW - 42); p.iy = clamp(r.y + 20, IWALL + 16, IPH - 22); p.itarget = null;
    return talkToResident(p, r);
  },
  petTheCat(pi) {
    const p = players[pi || 0];
    if (!p || !p.inside || !interior || !interior.cat) return -1;
    p.ix = interior.cat.x; p.iy = clamp(interior.cat.y + 24, IWALL + 16, IPH - 22);
    interactInside(p);
    return catPets;
  },
  exitHouse(pi) {
    const p = players[pi || 0];
    if (!p || !p.inside) return false;
    exitInterior(p);
    return true;
  },
  events() { return recentEvents.map(e => e.k); },
  addEvent(k) { pushEvent(k); return recentEvents.length; },
  setCookieDay(v) { cookieDay = v || ''; },
  roomBlocked(x, y) { return interior ? iBlocked(x, y) : null; },
  /* ── v7.2 hooks — floors, the sky lift, the star deck ── */
  floorInfo() {
    if (!interior) return null;
    return { fl: interior.fl || 0,
             floors: interior.nf || 1,
             title: interior.floors ? interior.title : null,
             lift: interior.lift ? Object.assign({}, interior.lift) : null,
             ride: interior.ride ? { t: interior.ride.t, to: interior.ride.to, swapped: interior.ride.swapped } : null,
             hint: interior.hint ? interior.hint.str : null,
             door: !!interior.door,
             ball: interior.ball ? { x: Math.round(interior.ball.x), y: Math.round(interior.ball.y) } : null,
             chartDots: interior.chart ? (interior.floors[interior.fl].chartDots || 0) : null,
             aliens: interior.residents.filter(r => r.alien).length,
             kids: interior.residents.filter(r => r.kid).length,
             residents: interior.residents.map(r => ({ name: r.name, alien: !!r.alien, kid: !!r.kid,
                                                       say: r.sayT > 0 ? r.say : null })),
             inZone: players.map(q => q.inside ? inLiftZone(q) : null) };
  },
  roomInfo() {                                   // v8a: which room + who says what
    if (!interior) return null;
    return { kind: interior.kind, title: roomTitle(interior),
             chart: interior.chart ? Object.assign({}, interior.chart) : null,
             residents: interior.residents.map(r => ({ name: r.name, poolN: r.pool.length,
               hasDais: r.pool.some(l => /Reserved for something wonderful/.test(l)),
               sample: r.pool[0] })) };
  },
  liftPush(dir, pi) {                            // the real push path, from wherever P stands
    const p = players[pi || 0];
    if (!p || !p.inside || !interior || !interior.lift) return false;
    return tryLift(p, dir);
  },
  intoLift(pi) {                                 // park one player in the stand-here zone
    const p = players[pi || 0];
    if (!p || !p.inside || !interior || !interior.lift) return false;
    p.ix = interior.lift.x + interior.lift.w / 2 + ((pi || 0) ? 20 : -8);
    p.iy = IWALL + 32; p.itarget = null;
    return true;
  },
  fastLift() {                                   // ride the whole doors-ding-doors beat
    for (let i = 0; i < 60 && interior && interior.ride; i++) updateInterior(0.05);
    return interior ? (interior.fl || 0) : -1;
  },
  setBeacons(n, m) { beaconsFound = n | 0; mapAssembled = !!m; return beaconsFound; },
  /* ── v6a hooks — the Moon Expansion ── */
  forceSeed(n) { forcedSeed = n; },              // pin the NEXT new game's seed (name variety)
  setGoalI(n) { goalI = n; return goalI; },
  goalList() { return GOALS.map(g => g.t); },
  menuKeys() {                                   // the ACTIVE world's build strip, by key
    return menuItems().map(it => it.k || (it.rocket && 'rocket') ||
                                 (it.moonrocket && 'moonrocket') || (it.remove && 'remove') || null);
  },
  gotoKind(k) {                                  // park P1 right at a building of kind k
    const b = buildings.find(b2 => b2.k === k && !b2.rubble);
    if (!b || !players[0]) return false;
    const s = B[k].size || 1;
    players[0].x = tX(b.gx) + s * 16; players[0].y = tY(b.gy) + s * 32 + 10;
    players[0].target = null; players[0].boat = false;
    updateCamera(0, true);
    return true;
  },
  cruiserInfo() {
    return { stage: cruiserStage, mars: marsSpotted,
             next: cruiserStage < 3 ? Object.assign({}, CRUISER_STAGES[cruiserStage]) : null };
  },
  roversInfo() {
    return robots.filter(r => r.rover).map(r => ({ x: Math.round(r.x), y: Math.round(r.y),
      targ: r.targ ? (r.targ.k ? { b: r.targ.k, gx: r.targ.gx, gy: r.targ.gy }
                               : { f: r.targ.type, gx: r.targ.gx, gy: r.targ.gy }) : null }));
  },
  closeVignette() { if (vignette) closeVignette(); return !vignette; },
  /* ── v6b hooks — MARS ── */
  marsInfo() {
    return inWorld('mars', () => {
      let land = 0;
      for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) if (isLand(gx, gy)) land++;
      return { gw: GW, gh: GH, land,
               lander: buildings.some(b => b.k === 'marslander'),
               port: buildings.some(b => b.k === 'marsport'),
               buildings: buildings.map(b => b.k),
               hems: flora.filter(f => f.type === 'hem' && !f.gone).length,
               frosts: flora.filter(f => f.type === 'frost' && !f.gone).length };
    });
  },
  marsFuelCost() { return MARS_FUEL_COST; },
  gotoShip(ship, pi) {                           // park P1/P2 at a specific boarding zone
    const z = boardingPads().find(z2 => z2.ship === ship);
    if (!z) return false;
    const p = players[pi || 0];
    if (!p) return false;
    p.x = z.cx; p.y = z.cy; p.target = null; p.boat = false;
    updateCamera(0, true);
    return true;
  },
  marsLines() {                                  // resident-line coverage (v6b assertions)
    return { milo: RES_POOLS.milo.filter(l => /mars/i.test(l)).length,
             chip: RES_POOLS.chip.filter(l => /mars|dust devil/i.test(l)).length,
             marsonaut: RES_POOLS.marsonaut.length,
             context: /MARS/.test(CONTEXT_LINES.marstrip) };
  },
  /* ── v7 hooks — THE ASTEROID RUSH. Fast-forward time/cinematics, but the
     actions themselves always walk the REAL code paths. ── */
  forceScanRare() { forceRare = true; },
  grantCargo(o) {                                // stock the hold (capped at the slots)
    for (const k in o) cargo[k] = (cargo[k] || 0) + o[k];
    return Object.assign({}, cargo);
  },
  bestShotFrom(gx, gy, x, y) {                   // can a cannon HERE reach THERE?
    let bestD = 1e9;
    for (let ang = 15; ang <= 165; ang += 15) for (let pow = 0; pow < 3; pow++) {
      const e = simShot({ gx, gy }, ang, pow);
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < bestD) bestD = d;
    }
    return bestD;
  },
  startExpedition(cardIndex) {                   // real board → scan → choose → land
    const z = boardingPads().find(z2 => z2.ship === 'barge' && z2.to === 'scan');
    if (!z) return false;
    for (const p of players) { p.x = z.cx; p.y = z.cy; p.target = null; p.boat = false; }
    for (const p of players) doAction(p);        // the true boarding path
    for (let k = 0; k < 200 && travel && travel.phase !== 'scan'; k++) updateTravel(0.1);
    if (!travel || travel.phase !== 'scan' || !scanScr) return false;
    if (cardIndex !== undefined) { scanScr.sel = clamp(cardIndex, 0, 2); confirmScan(); }
    else return 'scan';                          // leave the screen open for input tests
    for (let k = 0; k < 200 && travel; k++) updateTravel(0.1);
    return world === 'mission';
  },
  fastMission(sec) {                             // drain the battery — rescue fires naturally
    if (!exped) return false;
    exped.timer -= sec;
    return exped.timer;
  },
  fastChunks() {                                 // settle all drifting chunks (skip the drift)
    if (!exped) return 0;
    for (const ch of exped.chunks) if (ch.on) { ch.vx = 0; ch.vy = 0; }
    return exped.chunks.filter(c => c.on).length;
  },
  depositsInfo() {
    return flora.filter(f => f.type === 'dep' || f.type === 'vault').map(f => ({
      type: f.type, res: f.res || 'alloy', big: !!f.big, gx: f.gx, gy: f.gy,
      x: tX(f.gx) + 16, y: tY(f.gy) + 20, hits: f.hits, gone: !!f.gone }));
  },
  chunksInfo() {
    if (!exped) return [];
    return exped.chunks.filter(c => c.on).map(c => ({ res: c.res, x: Math.round(c.x), y: Math.round(c.y) }));
  },
  beaconInfo() { return exped && exped.beacon ? { x: exped.beacon.x, y: exped.beacon.y } : null; },
  crumblesInfo() { return exped ? exped.crumbles.map(c => ({ gx: c.gx, gy: c.gy, t: c.t, gone: c.goneT > 0 })) : []; },
  pebblesInfo() { return exped ? exped.pebbles.filter(p => p.on).map(p => ({ x: p.x, y: p.y, warnT: p.warnT })) : []; },
  endMissionBoard() {                            // teleport everyone to the barge + board
    if (world !== 'mission') return false;
    const z = boardingPads().find(z2 => z2.ship === 'barge');
    if (!z) return false;
    for (const p of players) { p.x = z.cx; p.y = z.cy; p.target = null; p.hop = null; p.hopH = 0; p.stunT = 0; }
    for (const p of players) doAction(p);
    return players.every(p => p.aboard);
  },
  fastVignette() { if (vignette) vignette.t = 99; return !!vignette; },
  updateMissionN(n) { for (let i = 0; i < (n || 1); i++) updateMission(0.1); },
  bargeCosts() { return { stages: BARGE_STAGES, upgrade: BARGE_UPGRADE_COST, mb: MB }; },
  megaInfo(k) { return { found: B[k].cost, feeds: MEGA[k].feeds }; },
  feedMegaAt(gx, gy) {                           // stand at the site + real feed path
    const b = occ[gy] && occ[gy][gx];
    if (!b || !B[b.k].mega || !players[0]) return false;
    const s = B[b.k].size || 1;
    players[0].x = tX(b.gx) + s * 16; players[0].y = tY(b.gy) + s * 32 + 12;
    players[0].target = null;
    doAction(players[0]);
    return b.stage || 0;
  },
};

/* ───── boot ───── */
initSprites();
initDecorSprites();                             // v5a: paths, garden, showpieces, gold
initInteriorSprites();                          // v5b: residents, the cat, speech bubbles
extraSprites();
parked.set('moon', mkWorldBundle('moon', MGW, MGH));   // the worlds wait in the wings
parked.set('mars', mkWorldBundle('mars', RGW, RGH));   // v6b: the Planet Pattern
loadSlotSummaries();
document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
addEventListener('pagehide', () => saveGame());
requestAnimationFrame(loop);
</script>
</body>
</html>
