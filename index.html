<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════════
   ISLAND FORGE — Stephens Arcade
   Kid-friendly incremental island builder. One file, zero assets:
   every sprite is baked into offscreen canvases at load, all audio is
   WebAudio synth. Per-frame hot path is drawImage + transforms only —
   all static content (ocean, land, pipes, buildings, trees) lives in ONE
   background canvas rebuilt only when the island changes.
   ═══════════════════════════════════════════════════════════════════════ */

const W = 1280, H = 720, TILE = 32, GW = 40, GH = 22, GY0 = 8;
const CX = 20, CYG = 11;                       // island centre in grid coords
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
addEventListener('resize', fit); fit();

/* ───── tiny utils ───── */
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
function mulberry(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash2(x, y) {
  let h = (x * 374761393 + y * 668265263) ^ ((x + 7) * (y + 13) * 1274126177);
  h = (h ^ (h >>> 13)) >>> 0;
  return (h % 1024) / 1024;
}
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K';
  return '' + n;
}
const tX = gx => gx * TILE, tY = gy => GY0 + gy * TILE;

/* ───── storage ───── */
const SLOT_KEY = i => 'islandforge_slot' + i;
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch (e) {} }
let best = parseInt(lsGet('islandforge_best') || '0', 10) || 0;
let muted = lsGet('islandforge_mute') === '1';

/* ───── audio (all synthesized, context created lazily on first gesture) ───── */
let actx = null, musNext = 0, chordI = 0;
function ensureAudio() {
  if (!actx) {
    const A = window.AudioContext || window.webkitAudioContext;
    if (A) { actx = new A(); musNext = actx.currentTime + 0.4; }
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol, sweepTo) {
  if (!actx || muted) return;
  const t0 = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, sweepTo), t0 + dur);
  g.gain.setValueAtTime(vol || 0.06, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur, peak, lp0, lp1) {
  if (!actx || muted) return;
  const t0 = actx.currentTime, sr = actx.sampleRate;
  const buf = actx.createBuffer(1, Math.floor(sr * dur), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length * 0.5);
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(lp0, t0);
  f.frequency.exponentialRampToValueAtTime(Math.max(30, lp1), t0 + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(f).connect(g).connect(actx.destination);
  src.start(t0); src.stop(t0 + dur + 0.05);
}
let lastTickSnd = 0;
const SFX = {
  ui:       () => blip(520, 0.05, 'square', 0.04, 640),
  confirm:  () => { blip(660, 0.07, 'triangle', 0.07); setTimeout(() => blip(990, 0.09, 'triangle', 0.07), 60); },
  cancel:   () => blip(330, 0.09, 'square', 0.05, 200),
  chop:     () => { noiseBurst(0.07, 0.12, 1600, 500); blip(190, 0.06, 'square', 0.07, 120); },
  mine:     () => { noiseBurst(0.06, 0.12, 2600, 900); blip(560, 0.05, 'square', 0.05, 340); },
  place:    () => { blip(240, 0.1, 'triangle', 0.09, 480); noiseBurst(0.1, 0.08, 900, 300); },
  remove:   () => { noiseBurst(0.14, 0.1, 1200, 200); blip(300, 0.12, 'square', 0.05, 90); },
  coin:     () => { const t = performance.now(); if (t - lastTickSnd < 120) return; lastTickSnd = t;
                    blip(880, 0.05, 'triangle', 0.045, 1320); },
  pop:      () => blip(500, 0.08, 'sine', 0.08, 900),
  fanfare:  () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.22, 'triangle', 0.09), i * 130)); },
  legendary:() => { [660, 880, 1100, 1320, 1760].forEach((f, i) => setTimeout(() => blip(f, 0.18, 'triangle', 0.08), i * 90)); },
  crate:    () => { blip(200, 0.1, 'square', 0.07, 400); setTimeout(() => blip(400, 0.12, 'square', 0.06, 800), 90); },
  hungry:   () => blip(420, 0.12, 'sine', 0.05, 300),
  power:    () => { [440, 660, 880].forEach((f, i) => setTimeout(() => blip(f, 0.14, 'sawtooth', 0.05, f * 1.4), i * 70)); },
  count:    () => blip(700, 0.14, 'square', 0.08),
  rumble:   () => { noiseBurst(2.8, 0.26, 400, 60); blip(60, 2.6, 'sawtooth', 0.14, 30); },
  firework: () => { noiseBurst(0.25, 0.12, 2400, 200); blip(1200, 0.2, 'triangle', 0.04, 300); },
  hatch:    () => { [520, 700, 940].forEach((f, i) => setTimeout(() => blip(f, 0.1, 'sine', 0.07), i * 80)); },
};
/* cozy ambient loop — soft pad chords + pentatonic plucks, scheduled ahead */
const CHORDS = [[130.8, 196, 329.6], [110, 164.8, 261.6], [87.3, 130.8, 220], [98, 146.8, 246.9]];
const PENTA = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
function musicTick() {
  if (!actx || muted) return;
  const now = actx.currentTime;
  if (musNext < now - 4) musNext = now + 0.1;
  while (musNext < now + 0.5) {
    const t0 = musNext, ch = CHORDS[chordI % CHORDS.length]; chordI++;
    for (const f of ch) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.02, t0 + 0.8);
      g.gain.linearRampToValueAtTime(0.0001, t0 + 3.1);
      o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0 + 3.2);
    }
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.35) continue;
      const t1 = t0 + i * 0.8 + (Math.random() < 0.3 ? 0.4 : 0);
      const f = PENTA[(Math.random() * PENTA.length) | 0];
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t1);
      g.gain.linearRampToValueAtTime(0.035, t1 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t1 + 0.7);
      o.connect(g).connect(actx.destination); o.start(t1); o.stop(t1 + 0.75);
    }
    musNext += 3.2;
  }
}

/* ───── resources & buildings data (ALL balance lives here) ───── */
const RES_LIST = ['wood', 'stone', 'food', 'ore', 'metal', 'parts', 'power', 'science'];
const RES_AGE  = { wood: 1, stone: 1, food: 2, ore: 3, metal: 3, parts: 3, power: 4, science: 5 };
const RES_COL  = { wood: '#e0a35c', stone: '#c2cbd4', food: '#ff8f6b', ore: '#a99bf0',
                   metal: '#e8eef4', parts: '#ffd24a', power: '#59e0ff', science: '#7dff9a', pop: '#ffd1a1' };
const AGE_NAMES = [null, 'CAMPFIRE', 'FARMING', 'INDUSTRY', 'ELECTRICITY', 'SCIENCE'];
const AGE_SUBS  = [null, 'Chop wood, build cabins!', 'Grow food for your people!',
                   'Dig ore, forge metal!', 'Light up the island!', 'Reach for the stars!'];

const B = {
  campfire:  { name: 'CAMPFIRE',  age: 1, size: 1, cost: {}, special: true },
  lumberhut: { name: 'LUMBER HUT', age: 1, size: 1, cost: { wood: 8 },             prod: { wood: 1 },   pipe: ['campfire'] },
  quarry:    { name: 'QUARRY',     age: 1, size: 1, cost: { wood: 10, stone: 4 },  prod: { stone: 0.8 },pipe: ['lumberhut', 'campfire'] },
  cabin:     { name: 'CABIN',      age: 1, size: 1, cost: { wood: 14, stone: 8 },  pop: 4,              pipe: ['campfire'] },
  farm:      { name: 'FARM',       age: 2, size: 1, cost: { wood: 18 },            prod: { food: 1.2 }, pipe: ['cabin', 'campfire'] },
  well:      { name: 'WELL',       age: 2, size: 1, cost: { stone: 20 },           aura: true,          pipe: ['farm', 'cabin'] },
  bakery:    { name: 'BAKERY',     age: 2, size: 1, cost: { wood: 25, stone: 15 }, cons: { food: 0.4 }, prod: { food: 1.6 }, pipe: ['farm'] },
  mine:      { name: 'MINE',       age: 3, size: 1, cost: { wood: 30, stone: 25 }, prod: { ore: 1 },    pipe: ['quarry', 'campfire'] },

  factory:   { name: 'FACTORY',    age: 3, size: 2, cost: { stone: 30, metal: 15 },cons: { metal: 0.3 },prod: { parts: 0.25 }, pipe: ['smelter', 'mine'] },
  windmill:  { name: 'WINDMILL',   age: 4, size: 1, cost: { wood: 40, metal: 10 }, prod: { power: 4 },  wire: true },

  lab:       { name: 'LAB',        age: 5, size: 1, cost: { metal: 30, parts: 15 },prod: { science: 0.6 }, needPower: 3, wire: true },
  roboshed:  { name: 'ROBO HELPER',age: 5, size: 1, cost: { metal: 20, parts: 12 },robot: true,         needPower: 1, wire: true },
  launchpad: { name: 'LAUNCH PAD', age: 5, size: 2, cost: { stone: 40, metal: 60, parts: 30 }, needPower: 4, wire: true },
  giantmill: { name: 'GIANT WINDMILL', age: 4, size: 1, cost: {}, prod: { power: 12 }, wire: true, special: true },
  statue:    { name: 'GOLD STATUE', age: 5, size: 1, cost: {}, special: true },
};
const ROCKET_COST = { metal: 150, parts: 80, science: 40 };
const REQ_NEXT = {
  1: { text: 'BUILD 3 CABINS · REACH 12 POP',
       prog: () => Math.min(cnt('cabin') / 3, pop / 12),
       ok:   () => cnt('cabin') >= 3 && pop >= 12 },
  2: { text: 'REACH 30 POP · KEEP FOOD RISING',
       prog: () => Math.min(pop / 30, (rates.food || 0) > 0 ? 1 : 0.6),
       ok:   () => pop >= 30 && (rates.food || 0) > 0 },
  3: { text: 'FORGE 80 METAL + PARTS',
       prog: () => Math.min(1, (life.metal + life.parts) / 80),
       ok:   () => life.metal + life.parts >= 80 },
  4: { text: 'MAKE 8 POWER · REACH 60 POP',
       prog: () => Math.min(powerInc / 8, pop / 60),
       ok:   () => powerInc >= 8 && pop >= 60 },
};

/* ───── global game state ───── */
let T = 0;                                    // global animation clock (s)
let scene = 'title';                          // title | name | play
let slotSel = 0, slots = [null, null, null], curSlot = 0;
let nameSt = null;                            // { slot, name, r, c }
let confirmErase = null;                      // { slot, yes }
let modal = null;                             // { title, lines[] }
let banners = [];                             // [{ title, sub, t, dur, legendary }]
let paused = false, pauseOwner = 0, pauseIdx = 0, statsOpen = false;

let age = 1, seed = 1, islandName = 'ISLE', legends = false, rocketDone = false;
let res = {}, life = { metal: 0, parts: 0 };
let pop = 2, popF = 2, hungry = false, firstPowerDone = false;
let powerInc = 0, powerDem = 0, islandPowered = false;
let rates = {};
let buildings = [], seqN = 1, occ = [];
let flora = [];
let pipes = [], anims = [];
let crate = null, crateT = 300;
let robots = [], drake = null, egg = null;
let rocketSeq = null;
let players = [];
let playtime = 0, autosaveT = 0, simAcc = 0;
let landAge = [], coast = [];
let bgDirty = false, terrainDirty = false;
let shakeAmt = 0;
let landSalt = [0, 0, 0];

/* ═══════════════════════════════════════════════════════════════════════
   SPRITE ATLAS — everything baked once at load. P() draws chunky 2x
   "16px art" pixels; gradients/ellipses are fine HERE (load time only).
   ═══════════════════════════════════════════════════════════════════════ */
const SPR = {};
function C(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d'); g.imageSmoothingEnabled = false;
  return [c, g];
}
function S(w, h, fn) {          // w,h in art units (1 unit = 2px)
  const [c, g] = C(w * 2, h * 2);
  const P = (x, y, ww, hh, col) => { g.fillStyle = col; g.fillRect(Math.round(x * 2), Math.round(y * 2), Math.round(ww * 2), Math.round(hh * 2)); };
  fn(g, P);
  return c;
}
function rr(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
function shad(g, cx, cy, rx, ry) {
  g.fillStyle = 'rgba(15,40,30,0.28)';
  g.beginPath(); g.ellipse(cx, cy, rx, ry, 0, 0, 6.3); g.fill();
}
function glowDot(r, col) {      // baked radial glow sprite
  const [c, g] = C(r * 2, r * 2);
  const gr = g.createRadialGradient(r, r, 1, r, r, r);
  gr.addColorStop(0, col); gr.addColorStop(0.5, col.slice(0, 7) + '88'); gr.addColorStop(1, col.slice(0, 7) + '00');
  g.fillStyle = gr; g.fillRect(0, 0, r * 2, r * 2);
  return c;
}

function initSprites() {
  /* terrain tiles (16 units = 32px) */
  /* 5 grass shades, dark→light, picked by smooth noise for mottled patches */
  const GRASS_BASE = ['#4c9c45', '#52a64a', '#57b04f', '#5cb954', '#62c15a'];
  const GRASS_DARK = ['#438c3d', '#489642', '#4da046', '#52a94b', '#57b250'];
  const GRASS_LITE = ['#57ad4f', '#5db755', '#63c159', '#68c95f', '#6ed165'];
  SPR.grass = [0, 1, 2, 3, 4].map(v => S(16, 16, (g, P) => {
    P(0, 0, 16, 16, GRASS_BASE[v]);
    for (let i = 0; i < 16; i++) {
      const x = (i * 7 + v * 5) % 16, y = (i * 11 + v * 3 + 2) % 16;
      P(x, y, 1, 1, i % 3 ? GRASS_DARK[v] : GRASS_LITE[v]);
    }
    if (v >= 3) { P((v * 3) % 12 + 2, (v * 5) % 12 + 2, 1, 2, '#7ed07a'); }
  }));
  /* tiny decor stamped on some grass tiles during the terrain bake */
  SPR.flower = ['#ffd1e0', '#f6e97e', '#fefefe', '#ffb28a'].map(c => S(3, 3, (g, P) => {
    P(1, 0, 1, 3, c); P(0, 1, 3, 1, c); P(1, 1, 1, 1, '#f5c542');
  }));
  SPR.pebble = S(3, 2, (g, P) => { P(0, 0.6, 3, 1.4, '#9aa2ab'); P(0.6, 0, 1.8, 1, '#b8bfc7'); });
  SPR.tuft = S(4, 3, (g, P) => { P(0, 1, 1, 2, '#7ed07a'); P(1.5, 0, 1, 3, '#8ed88a'); P(3, 1, 1, 2, '#7ed07a'); });
  SPR.sand = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#ecd794');
    for (let i = 0; i < 12; i++) P((i * 5 + 3) % 16, (i * 7 + 1) % 16, 1, 1, i % 2 ? '#dbc27b' : '#f7e8b4');
  });
  SPR.shallow = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#3f97c9');
    for (let i = 0; i < 6; i++) P((i * 6 + 2) % 15, (i * 9 + 4) % 15, 2, 1, '#57aad6');
  });
  SPR.foam = [0, 1].map(v => S(16, 16, (g, P) => {
    for (let i = 0; i < 5; i++) P((i * 4 + v * 2 + 1) % 14, (i * 6 + v * 5 + 2) % 14, 2, 1, 'rgba(230,248,255,0.85)');
  }));

  /* trees & rocks — bottom-anchored, 16x22 units (32x44 px) */
  const mkTree = (stage, golden) => S(16, 22, (g, P) => {
    shad(g, 16, 40, 10 - stage * 2, 3.5);
    const tD = golden ? '#9a7328' : '#6e4023', tL = golden ? '#b98d38' : '#8a5530';
    const c1 = golden ? '#a37a10' : '#2c7a3a', c2 = golden ? '#dda428' : '#3a9a49', c3 = golden ? '#f4cc4e' : '#54bd62';
    if (stage === 0) {
      P(7, 13, 2, 8, tD); P(7, 13, 1, 8, tL);
      P(2, 8, 12, 6, c1);
      P(3, 4, 10, 6, c2);
      P(5, 2, 6, 4, c2);
      P(5, 3, 5, 3, c3); P(4, 6, 4, 3, c3);
      P(6, 2, 2, 1, golden ? '#fff7c9' : '#8ed88a');
      if (golden) { P(4, 9, 1, 1, '#fff7c9'); P(11, 6, 1, 1, '#fff7c9'); P(9, 11, 1, 1, '#fff7c9'); }
      else { P(4, 10, 1, 1, '#e85f5f'); P(10, 6, 1, 1, '#e85f5f'); P(11, 11, 1, 1, '#e85f5f'); }
    } else if (stage === 1) {
      P(7, 13, 2, 8, tD); P(7, 13, 1, 8, tL);
      P(4, 9, 8, 5, c1);
      P(5, 6, 6, 5, c2);

/* ═══════════════════════════════════════════════════════════════════════
   WORLD — organic island mask per age, terrain layer, static bg layer,
   decorative auto-pipes. Terrain/bg are rebuilt ONLY on island changes.
   ═══════════════════════════════════════════════════════════════════════ */
const [terrainC, tg] = C(W, H);
const [bgC, bgg] = C(W, H);
const RX = [0, 6.4, 8.6, 10.8, 13.2, 15.4];
const RY = [0, 4.8, 6.2, 7.6, 8.8, 10.0];

function genIsland(sd) {
  seed = sd;
  const rng = mulberry(sd);
  landSalt = [rng() * 6.28, rng() * 6.28, rng() * 6.28];
  landAge = [];
  for (let gy = 0; gy < GH; gy++) {
    landAge[gy] = [];
    for (let gx = 0; gx < GW; gx++) {
      let a = 0;
      if (gx >= 1 && gx < GW - 1 && gy >= 1 && gy < GH - 1) {
        for (let k = 1; k <= 5; k++) {
          const dx = (gx - CX) / RX[k], dy = (gy - CYG) / RY[k];
          const r = Math.hypot(dx, dy);
          const ang = Math.atan2(dy, dx);
          const wob = 1 + 0.13 * Math.sin(ang * 3 + landSalt[0]) + 0.09 * Math.sin(ang * 5 + landSalt[1]) + 0.05 * Math.sin(ang * 7 + landSalt[2]);
          if (r < wob * 0.82 || (k === 1 && Math.hypot(gx - CX, gy - CYG) < 2.2)) { a = k; break; }
        }
      }
      landAge[gy][gx] = a;
    }
  }
  occ = [];
  for (let gy = 0; gy < GH; gy++) { occ[gy] = []; for (let gx = 0; gx < GW; gx++) occ[gy][gx] = null; }
}
const isLand = (gx, gy) => gx >= 0 && gy >= 0 && gx < GW && gy < GH && landAge[gy][gx] > 0 && landAge[gy][gx] <= age;
const isLandPx = (x, y) => isLand(Math.floor(x / TILE), Math.floor((y - GY0) / TILE));
function sandAt(gx, gy) {
  return isLand(gx, gy) && (!isLand(gx - 1, gy) || !isLand(gx + 1, gy) || !isLand(gx, gy - 1) || !isLand(gx, gy + 1));
}
function floraAt(gx, gy) {
  for (const f of flora) if (!f.gone && f.gx === gx && f.gy === gy) return f;
  return null;
}
function tileBuildable(gx, gy) {
  return isLand(gx, gy) && !occ[gy][gx] && !floraAt(gx, gy) && !(crate && crate.gx === gx && crate.gy === gy);
}
function scatterFlora(forAge) {
  const rng = mulberry(seed * 7 + forAge * 131);
  const free = [];
  let trees = 0, rocks = 0;
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (landAge[gy][gx] !== forAge) continue;
    if (sandAt(gx, gy)) continue;
    if (Math.hypot(gx - CX, gy - CYG) < 2.5) continue;
    if (occ[gy][gx] || floraAt(gx, gy)) continue;
    const r = rng();
    if (r < 0.12) { flora.push({ type: 'tree', gx, gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false }); trees++; }
    else if (r < 0.17) { flora.push({ type: 'rock', gx, gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false }); rocks++; }
    else free.push({ gx, gy });
  }
  /* kid-proof guarantee — a starting island MUST have enough to chop */
  const needT = (forAge === 1 ? 5 : 2) - trees, needR = (forAge === 1 ? 3 : 1) - rocks;
  for (let i = free.length - 1; i > 0; i--) {
    const j = (rng() * (i + 1)) | 0;
    const tmp = free[i]; free[i] = free[j]; free[j] = tmp;
  }
  for (let i = 0; i < needT && free.length; i++) {
    const t = free.pop();
    flora.push({ type: 'tree', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
  }
  for (let i = 0; i < needR && free.length; i++) {
    const t = free.pop();
    flora.push({ type: 'rock', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
  }
}

/* ── pipes (purely decorative) ── */
function pipeAnchor(b) {
  const s = B[b.k].size || 1;
  return { x: tX(b.gx) + s * 16, y: tY(b.gy) + s * 16 };
}
function nearestOf(kinds, b, before) {
  let bst = null, bd = 1e9;
  for (const o of buildings) {
    if (o === b) continue;
    if (before && o.seq >= b.seq) continue;
    let match = false;
    for (const k of kinds) if (o.k === k || (k === '@power' && B[o.k].wire && (B[o.k].prod || {}).power)) match = true;
    if (!match) continue;
    const d = Math.hypot(o.gx - b.gx, o.gy - b.gy);
    if (d < bd) { bd = d; bst = o; }
  }
  return bst;
}
function recomputePipes() {
  pipes = [];
  const sorted = buildings.slice().sort((a, b2) => a.seq - b2.seq);
  for (const b of sorted) {
    const def = B[b.k];
    if (def.special && b.k !== 'giantmill' && b.k !== 'statue') continue;
    let target = null, power = false;
    if (def.wire) {
      target = nearestOf(['@power'], b, true);
      power = !!target;
      if (!target) target = nearestOf(def.pipe || ['factory', 'smelter', 'campfire'], b, true) || nearestOf(['campfire'], b, false);
    } else if (b.k === 'statue') {
      target = nearestOf(['campfire'], b, false);
    } else if (def.pipe) {
      for (const kind of def.pipe) { target = nearestOf([kind], b, true); if (target) break; }
      if (!target) target = nearestOf(['campfire'], b, false);
    }
    if (!target) continue;
    const a = pipeAnchor(b), c = pipeAnchor(target);
    let pts;
    if (Math.abs(c.x - a.x) > Math.abs(c.y - a.y)) pts = [a, { x: c.x, y: a.y }, c];
    else pts = [a, { x: a.x, y: c.y }, c];
    let len = 0;
    for (let i = 1; i < pts.length; i++) len += Math.abs(pts[i].x - pts[i - 1].x) + Math.abs(pts[i].y - pts[i - 1].y);
    if (len < 8) continue;
    pipes.push({ pts, len, power });
  }
  terrainDirty = true;
}
function drawPipes(g) {
  for (const p of pipes) {
    g.lineJoin = 'round'; g.lineCap = 'round';
    g.strokeStyle = p.power ? '#24445a' : '#6a4f2e'; g.lineWidth = 7;
    g.beginPath(); g.moveTo(p.pts[0].x, p.pts[0].y);
    for (let i = 1; i < p.pts.length; i++) g.lineTo(p.pts[i].x, p.pts[i].y);
    g.stroke();
    g.strokeStyle = p.power ? '#3f9cc4' : '#c98f4e'; g.lineWidth = 3;
    g.stroke();
    for (const q of p.pts) {
      g.fillStyle = p.power ? '#2c586e' : '#7a5a33';
      g.beginPath(); g.arc(q.x, q.y, 5, 0, 6.3); g.fill();
      g.fillStyle = p.power ? '#5fc4e8' : '#e0aa62';
      g.beginPath(); g.arc(q.x, q.y, 2, 0, 6.3); g.fill();
    }
  }
}
function pipePos(p, d) {
  for (let i = 1; i < p.pts.length; i++) {
    const sl = Math.abs(p.pts[i].x - p.pts[i - 1].x) + Math.abs(p.pts[i].y - p.pts[i - 1].y);
    if (d <= sl) {
      const f = sl ? d / sl : 0;
      return { x: p.pts[i - 1].x + (p.pts[i].x - p.pts[i - 1].x) * f,
               y: p.pts[i - 1].y + (p.pts[i].y - p.pts[i - 1].y) * f };
    }
    d -= sl;
  }
  return p.pts[p.pts.length - 1];
}

function rebuildTerrain() {
  terrainDirty = false;
  const gr = tg.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, '#2b7db8'); gr.addColorStop(1, '#175a92');
  tg.fillStyle = gr; tg.fillRect(0, 0, W, H);
  /* soft turquoise halo under the island so it sits IN the water */
  const halo = tg.createRadialGradient(CX * TILE + 16, tY(CYG) + 16, 60, CX * TILE + 16, tY(CYG) + 16, 460);
  halo.addColorStop(0, 'rgba(120,215,255,0.13)'); halo.addColorStop(1, 'rgba(120,215,255,0)');
  tg.fillStyle = halo; tg.fillRect(0, 0, W, H);
  tg.fillStyle = 'rgba(10,50,90,0.25)';
  for (let i = 0; i < 90; i++) {
    const x = (i * 211 + 40) % W, y = (i * 127 + 60) % H;
    if (!isLandPx(x, y)) tg.fillRect(x, y, 26, 3);
  }
  tg.fillStyle = 'rgba(200,235,255,0.14)';
  for (let i = 0; i < 60; i++) {
    const x = (i * 173 + 90) % W, y = (i * 149 + 20) % H;
    if (!isLandPx(x, y)) tg.fillRect(x, y, 14, 2);
  }
  const nearLandR = (gx, gy, r) => {
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++)
      if (isLand(gx + dx, gy + dy)) return true;
    return false;
  };
  coast = [];
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (isLand(gx, gy)) continue;
    if (nearLandR(gx, gy, 1)) {
      tg.drawImage(SPR.shallow, tX(gx), tY(gy));
      tg.drawImage(SPR.foam[(gx + gy) % 2], tX(gx), tY(gy));
      coast.push({ x: tX(gx) + 16, y: tY(gy) + 16 });
    } else if (nearLandR(gx, gy, 2)) {
      tg.globalAlpha = 0.4;                       // second, fainter shallow ring
      tg.drawImage(SPR.shallow, tX(gx), tY(gy));
      tg.globalAlpha = 1;
    }
  }
  /* land tiles: mottled grass via smooth value noise + beach sand */
  const vn = (x, y, sx, sy) => {
    const fx = x / sx, fy = y / sy;
    const x0 = Math.floor(fx), y0 = Math.floor(fy);
    const sm = t => t * t * (3 - 2 * t);
    const u = sm(fx - x0), v = sm(fy - y0);
    const h = (a, b) => hash2(a * 13 + 7, b * 17 + 3);
    return (h(x0, y0) * (1 - u) + h(x0 + 1, y0) * u) * (1 - v)
         + (h(x0, y0 + 1) * (1 - u) + h(x0 + 1, y0 + 1) * u) * v;
  };
  const mots = (gx, gy) => vn(gx, gy, 5, 4) * 0.65 + vn(gx + 31, gy + 17, 2, 2) * 0.35;
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (!isLand(gx, gy)) continue;
    const x = tX(gx), y = tY(gy);
    if (sandAt(gx, gy)) {
      tg.drawImage(SPR.sand, x, y);
      /* wet edge on each water-facing side */
      tg.fillStyle = 'rgba(150,115,60,0.4)';
      if (!isLand(gx, gy + 1)) tg.fillRect(x, y + 27, 32, 5);
      if (!isLand(gx, gy - 1)) tg.fillRect(x, y, 32, 4);
      if (!isLand(gx - 1, gy)) tg.fillRect(x, y, 4, 32);
      if (!isLand(gx + 1, gy)) tg.fillRect(x + 28, y, 4, 32);
    } else {
      tg.drawImage(SPR.grass[Math.min(4, Math.floor(mots(gx, gy) * 5))], x, y);
      /* occasional flowers / pebbles / tufts (deterministic per tile) */
      const d = hash2(gx * 3 + 1, gy * 5 + 2);
      const ox = 4 + Math.floor(hash2(gx + 9, gy + 4) * 18), oy = 4 + Math.floor(hash2(gx + 2, gy + 11) * 18);
      if (d < 0.06) tg.drawImage(SPR.flower[Math.floor(d * 66) % 4], x + ox, y + oy);
      else if (d < 0.09) tg.drawImage(SPR.pebble, x + ox, y + oy);
      else if (d < 0.16) tg.drawImage(SPR.tuft, x + ox, y + oy);
    }
  }
  /* south-facing cliff lip: the island reads as raised out of the sea */
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (!isLand(gx, gy) || isLand(gx, gy + 1)) continue;
    const x = tX(gx), y = tY(gy);
    tg.fillStyle = '#c9a568'; tg.fillRect(x, y + 26, 32, 4);
    tg.fillStyle = '#8a6538'; tg.fillRect(x, y + 30, 32, 2);
  }
  drawPipes(tg);
  bgDirty = true;
}
function rebuildBG() {
  bgDirty = false;
  bgg.drawImage(terrainC, 0, 0);
  const items = [];
  for (const f of flora) if (!f.gone && f.shakeT <= 0) items.push({ y: tY(f.gy) + 32, f });
  for (const b of buildings) items.push({ y: tY(b.gy) + (B[b.k].size || 1) * 32, b });
  items.sort((a, b2) => a.y - b2.y);

    else drawBuilding(bgg, it.b);
  }
}
function floraSprite(f) {
  if (f.type === 'tree') return (f.golden ? SPR.gold : SPR.tree)[Math.min(f.hits, 2)];
  return SPR.rock[Math.min(f.hits, 2)];
}
function drawFlora(g, f, shake) {

  g.drawImage(s, tX(f.gx) + ox, tY(f.gy) + 32 - s.height);
}
function drawBuilding(g, b) {
  const lit = islandPowered && b.k !== 'campfire';
  const s = (lit ? SPR.bLit : SPR.b)[b.k];
  g.drawImage(s, tX(b.gx), tY(b.gy) + (B[b.k].size || 1) * 32 - s.height);

/* ── animated overlay registry (rebuilt when buildings change) ── */

                       anims.push({ t: 'smoke', x: x + 51, y: y - 26, b, cool: Math.random() });
                       anims.push({ t: 'smoke', x: x + 60, y: y - 22, b, cool: Math.random() }); break;

      case 'windmill': anims.push({ t: 'blades', x: x + 16, y: y - 3, b, sp: 1.6 + Math.random() * 0.5 }); break;
      case 'giantmill':anims.push({ t: 'bladesBig', x: x + 20, y: y - 14, b, sp: 1.1 }); break;
      case 'solar':    anims.push({ t: 'glint', x: x + 6, y: y + 6, b, cool: Math.random() * 4 }); break;
      case 'battery':  anims.push({ t: 'bglow', x: x + 16, y: y + 6, b }); break;
      case 'lab':      anims.push({ t: 'bubbles', x: x + 9, y: y + 8, b, cool: Math.random() }); break;
      case 'well':     anims.push({ t: 'aura', x: x + 16, y: y + 8, b, cool: Math.random() }); break;
      case 'statue':   anims.push({ t: 'aura', x: x + 16, y: y + 2, b, cool: Math.random(), gold: true }); break;
    }

}

/* ═══════════════════════════════════════════════════════════════════════
   POOLS — particles / floaty texts / pipe dots (no per-frame allocation:
   fixed arrays, dead slots recycled).
   ═══════════════════════════════════════════════════════════════════════ */
const P_MAX = 96, parts = [];
for (let i = 0; i < P_MAX; i++) parts.push({ on: false });
function spawnP(x, y, spr, o) {
  o = o || {};
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (p.on) continue;
    p.on = true; p.x = x; p.y = y; p.spr = spr;
    p.vx = o.vx !== undefined ? o.vx : (Math.random() - 0.5) * 60;
    p.vy = o.vy !== undefined ? o.vy : -40 - Math.random() * 40;
    p.g = o.g !== undefined ? o.g : 140;
    p.life = o.life || 0.7; p.t = 0;
    p.fade = o.fade !== false;
    p.tx = o.tx !== undefined ? o.tx : null;   // homing target (HUD pops)
    p.ty = o.ty !== undefined ? o.ty : null;
    p.sp = 150;
    return p;
  }
  return null;
}
const F_MAX = 14, floats = [];
for (let i = 0; i < F_MAX; i++) floats.push({ on: false });
function addFloat(x, y, str, color, icon) {
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (f.on) continue;
    f.on = true; f.x = x; f.y = y; f.str = str; f.color = color || '#fff';
    f.icon = icon || null; f.t = 0;
    return;
  }
}
const D_MAX = 22, dots = [];
for (let i = 0; i < D_MAX; i++) dots.push({ on: false });
let dotSpawnT = 0, dotRR = 0;
function updateDots(dt) {
  dotSpawnT -= dt;
  if (dotSpawnT <= 0 && pipes.length) {
    dotSpawnT = Math.max(0.08, 1.6 / pipes.length);
    for (let tries = 0; tries < pipes.length; tries++) {
      const pipe = pipes[dotRR++ % pipes.length];
      if (pipe.power && !islandPowered) continue;
      for (let i = 0; i < D_MAX; i++) {
        if (dots[i].on) continue;
        dots[i].on = true; dots[i].pipe = pipe; dots[i].d = 0;
        dots[i].frame = 0;
        tries = 99; break;
      }
      break;
    }
  }
  for (let i = 0; i < D_MAX; i++) {
    const d = dots[i];
    if (!d.on) continue;
    d.d += dt * (d.pipe.power ? 150 : 55);
    if (d.d >= d.pipe.len || pipes.indexOf(d.pipe) === -1) d.on = false;
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   ECONOMY — fixed 1s tick. One shared global pool; placement never
   affects function. All numbers live in B / REQ_NEXT above.
   ═══════════════════════════════════════════════════════════════════════ */
const cnt = k => { let n = 0; for (const b of buildings) if (b.k === k) n++; return n; };
function canAfford(cost) { for (const r in cost) if ((res[r] || 0) < cost[r]) return false; return true; }
function payCost(cost) { for (const r in cost) res[r] -= cost[r]; }
function refund(cost) { for (const r in cost) res[r] += cost[r]; }

function economyTick() {
  const wellBonus = cnt('well') > 0 ? 1.5 : 1;
  powerInc = 0; powerDem = 0;
  const inc = {};
  for (const b of buildings) {
    const d = B[b.k];
    if (d.prod && d.prod.power) powerInc += d.prod.power;
    if (d.needPower) powerDem += d.needPower;
  }
  let avail = powerInc;
  const sorted = buildings.slice().sort((a, b2) => a.seq - b2.seq);
  for (const b of sorted) {
    const d = B[b.k];
    b.idle = null;
    if (d.needPower) {
      if (avail >= d.needPower) { avail -= d.needPower; b.powered = true; }
      else { b.powered = false; b.idle = 'power'; continue; }
    }
    if (d.cons) {
      let ok = true;
      for (const r in d.cons) if ((res[r] || 0) < d.cons[r]) ok = false;
      if (!ok) { b.idle = 'input'; continue; }
      for (const r in d.cons) { res[r] -= d.cons[r]; inc[r] = (inc[r] || 0) - d.cons[r]; }
    }
    if (d.prod) for (const r in d.prod) {
      if (r === 'power') continue;
      let amt = d.prod[r];
      if (b.k === 'farm') amt *= wellBonus;
      res[r] += amt; inc[r] = (inc[r] || 0) + amt;
      if (r === 'metal') life.metal += amt;
      if (r === 'parts') life.parts += amt;
    }
  }
  /* population eats (age 2+); never dies — growth just pauses */
  const eat = age >= 2 ? pop * 0.05 : 0;
  const before = res.food;
  res.food = Math.max(0, res.food - eat);
  hungry = age >= 2 && res.food <= 0 && eat > 0 && (inc.food || 0) <= eat;
  inc.food = (inc.food || 0) - Math.min(eat, before);
  const cap = 2 + 4 * cnt('cabin');
  if (popF < cap && (age < 2 || !hungry)) popF = Math.min(cap, popF + 0.5);
  pop = Math.floor(popF);
  if (pop > best) { best = pop; lsSet('islandforge_best', '' + best); }
  rates = inc; rates.power = powerInc - powerDem;
  const nowPowered = powerInc > 0;
  if (nowPowered !== islandPowered) {
    islandPowered = nowPowered;
    bgDirty = true;
    if (nowPowered && !firstPowerDone) {
      firstPowerDone = true;
      banners.push({ title: 'POWER ONLINE!', sub: 'The island comes alive!', t: 0, dur: 2.6 });
      SFX.power();
    }
  }
  /* mystery crate — every 4–6 minutes of active play */
  if (!crate && scene === 'play') {
    crateT -= 1;
    if (crateT <= 0) spawnCrate();
  }
  /* age advancement */
  const rq = REQ_NEXT[age];
  if (rq && rq.ok()) ageUp();
}

function ageUp() {
  if (age >= 5) return;
  age++;
  banners.push({ title: 'AGE ' + age + ' — ' + AGE_NAMES[age] + '!', sub: AGE_SUBS[age], t: 0, dur: 3.4 });
  SFX.fanfare();
  scatterFlora(age);
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (landAge[gy][gx] === age && hash2(gx + age, gy) < 0.4)
      spawnP(tX(gx) + 16, tY(gy) + 16, SPR.spark[0], { vy: -30, g: 0, life: 1.2 });
  }
  recomputePipes(); recomputeAnims();
  terrainDirty = true;
  saveGame();
}

/* ── building placement ── */
function validAt(k, gx, gy) {
  const s = B[k].size || 1;
  if (gx < 0 || gy < 0 || gx + s > GW || gy + s > GH) return false;
  for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++)
    if (!tileBuildable(gx + dx, gy + dy) || sandAt(gx + dx, gy + dy)) return false;
  return true;
}
function addBuilding(k, gx, gy) {
  const b = { k, gx, gy, seq: seqN++, idle: null, powered: false };
  buildings.push(b);
  const s = B[k].size || 1;
  for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) occ[gy + dy][gx + dx] = b;
  recomputePipes(); recomputeAnims();
  bgDirty = true;
  return b;
}
function placeBuilding(k, gx, gy) {
  if (!validAt(k, gx, gy) || !canAfford(B[k].cost)) return false;
  payCost(B[k].cost);
  const b = addBuilding(k, gx, gy);
  if (B[k].robot) spawnRobot(tX(gx) + 16, tY(gy) + 40);
  SFX.place();
  const s = B[k].size || 1;
  for (let i = 0; i < 8; i++)
    spawnP(tX(gx) + s * 16 + (Math.random() - 0.5) * s * 26, tY(gy) + s * 30, SPR.puff[1], { vy: -25, g: -10, life: 0.5 });
  b.popT = 0.35;
  return true;
}
function removeBuilding(b) {
  if (B[b.k].special) return false;
  const s = B[b.k].size || 1;
  for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) occ[b.gy + dy][b.gx + dx] = null;
  buildings.splice(buildings.indexOf(b), 1);
  refund(B[b.k].cost);
  SFX.remove();
  addFloat(tX(b.gx) + s * 16, tY(b.gy), 'REFUNDED!', '#7dff9a');
  for (let i = 0; i < 6; i++)
    spawnP(tX(b.gx) + s * 16, tY(b.gy) + s * 16, SPR.puff[0], { life: 0.5 });
  recomputePipes(); recomputeAnims();
  bgDirty = true;
  return true;
}

/* ── mystery crates ── */
function spawnCrate() {
  const beach = [];
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++)
    if (sandAt(gx, gy) && !occ[gy][gx] && !floraAt(gx, gy)) beach.push({ gx, gy });
  if (!beach.length) { crateT = 60; return; }
  const t = beach[(Math.random() * beach.length) | 0];
  crate = { gx: t.gx, gy: t.gy, t: 0, opening: 0 };
  SFX.crate();
}
const GIFTS = ['goldtree', 'robot', 'giantmill', 'treasure', 'egg'];
function openCrate() {
  if (!crate || crate.opening) return;
  crate.opening = 0.0001;
  SFX.crate();
}
function nearestFreeGrass(gx, gy) {
  for (let r = 0; r < 8; r++) for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    const x = gx + dx, y = gy + dy;
    if (tileBuildable(x, y) && !sandAt(x, y)) return { gx: x, gy: y };
  }
  return null;
}
function revealCrate() {
  const cx2 = tX(crate.gx) + 16, cy2 = tY(crate.gy) + 8;
  let g = GIFTS[(Math.random() * GIFTS.length) | 0];
  if (g === 'egg' && (drake || egg)) g = 'treasure';
  if (g === 'robot' && robots.length >= 4) g = 'treasure';
  if (g === 'giantmill' && cnt('giantmill') >= 3) g = 'treasure';
  let label = '';
  if (g === 'goldtree') {
    const t = nearestFreeGrass(crate.gx, crate.gy);
    if (t) { flora.push({ type: 'tree', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: true }); bgDirty = true; }
    label = 'GOLDEN TREE! 3x wood forever!';
  } else if (g === 'robot') {
    spawnRobot(cx2, cy2 + 16); label = 'ROBOT HELPER! It harvests for you!';
  } else if (g === 'giantmill') {
    const t = nearestFreeGrass(crate.gx, crate.gy);
    if (t) addBuilding('giantmill', t.gx, t.gy);
    label = 'GIANT WINDMILL! +12 power!';
  } else if (g === 'treasure') {
    const mult = age * 60;
    res.wood += mult; res.stone += mult;
    if (age >= 2) res.food += mult;
    if (age >= 3) { res.ore += mult / 2; res.metal += mult / 3; res.parts += mult / 4; }
    if (age >= 5) res.science += 10;
    label = 'TREASURE! A pile of everything!';
  } else {
    egg = { x: cx2, y: cy2 + 18, t: 0 }; label = 'DRAGON EGG! Keep it warm...';
  }
  banners.push({ title: 'LEGENDARY!', sub: label, t: 0, dur: 3.2, legendary: true });
  SFX.legendary();
  for (let i = 0; i < 14; i++) spawnP(cx2, cy2, SPR.spark[i % 2], { life: 1 });
  crate = null;
  crateT = 240 + Math.random() * 120;
}

/* ── robots & drake ── */
function spawnRobot(x, y) {
  robots.push({ x, y, tx: x, ty: y, cool: 0, frame: 0, targ: null });
}
function updateRobot(r, dt) {
  if (!r.targ || r.targ.gone) {
    r.targ = null;
    let bd = 1e9;
    for (const f of flora) {
      if (f.gone) continue;
      const d = Math.hypot(tX(f.gx) + 16 - r.x, tY(f.gy) + 24 - r.y);
      if (d < bd) { bd = d; r.targ = f; }
    }
  }
  if (r.targ) {
    const tx2 = tX(r.targ.gx) + 16, ty2 = tY(r.targ.gy) + 26;
    const d = Math.hypot(tx2 - r.x, ty2 - r.y);
    if (d > 26) {
      const nx = r.x + (tx2 - r.x) / d * 70 * dt, ny = r.y + (ty2 - r.y) / d * 70 * dt;
      if (isLandPx(nx, ny)) { r.x = nx; r.y = ny; }
      else if (isLandPx(nx, r.y)) r.x = nx;
      else if (isLandPx(r.x, ny)) r.y = ny;
      else r.targ = null;
      r.frame += dt * 6;
    } else {
      r.cool -= dt;
      if (r.cool <= 0) { r.cool = 1.1; harvestFlora(r.targ, r.x, r.y - 10); }
    }
  }
}
function updateDrake(dr, dt) {
  const owner = players[0];
  if (!owner) return;
  const tx2 = owner.x - 26, ty2 = owner.y - 6;
  dr.x += (tx2 - dr.x) * Math.min(1, dt * 3);
  dr.y += (ty2 - dr.y) * Math.min(1, dt * 3);
  dr.frame += dt * 5;
}

/* ── harvesting (shared by players & robots) ── */
function harvestFlora(f, px2, py2) {
  if (f.gone) return;
  f.shakeT = 0.28;
  bgDirty = true;
  if (f.type === 'tree') {
    const amt = f.golden ? 6 : 2;
    res.wood += amt;
    addFloat(tX(f.gx) + 16, tY(f.gy) - 4, '+' + amt, RES_COL.wood, 'wood');
    for (let i = 0; i < 4; i++) spawnP(tX(f.gx) + 16, tY(f.gy) + 8, f.golden ? SPR.spark[0] : SPR.leaf, { life: 0.6 });
    SFX.chop();
  } else {
    res.stone += 2;
    addFloat(tX(f.gx) + 16, tY(f.gy) - 4, '+2', RES_COL.stone, 'stone');
    for (let i = 0; i < 4; i++) spawnP(tX(f.gx) + 16, tY(f.gy) + 12, SPR.chip, { life: 0.5 });
    SFX.mine();
  }
  SFX.coin();
  if (!f.golden) {
    f.hits++;
    if (f.hits >= 3) { f.gone = true; f.hits = 0; f.regrowT = 35 + Math.random() * 15; }
  }
}

/* ── rocket sequence ── */
function buyRocket() {
  if (!canAfford(ROCKET_COST) || rocketDone || rocketSeq) return false;
  const pad = buildings.find(b => b.k === 'launchpad');
  if (!pad) return false;

  if ((mx || my)) { p.target = null; p.ghost = null; }
  else if (p.target) {

    if (d < 6) p.target = null;
    else { mx = (p.target.x - p.x) / d; my = (p.target.y - p.y) / d; }

    else if (isLandPx(p.x, ny)) { p.y = ny; p.target = null; }

    if (keys.ArrowDown || keys.KeyS) dy += 1;
  }

/* ── button-edge router (pads + keyboard + touch all land here) ── */
function onBtn(pi, b) {

    return;
  }

    return;
  }

    return;
  }

    return;

      else if (it.rocket) {

      } else if (canAfford(B[it.k].cost)) { p.mode = 'place'; p.placeK = it.k; p.ghost = null; SFX.confirm(); }
      else SFX.cancel();
    }
    else if (b === 'east' || b === 'west') { p.mode = 'walk'; SFX.cancel(); }
  } else if (p.mode === 'place') {
    if (b === 'south') {

    else if (b === 'west') { p.mode = 'walk'; p.ghost = null; SFX.cancel(); }
  } else if (p.mode === 'remove') {

}

  if (statsOpen) { statsOpen = false; SFX.ui(); return; }
  const p = players[0];
  if (!p) return;
  if (p.mode === 'menu') {
    const items = menuItems();
    const pw = Math.min(1240, items.length * 100 + 24);
    const x0 = W / 2 - pw / 2, y0 = H - 114;
    if (y > y0 && y < y0 + 106) {
      const i = Math.floor((x - x0 - 12) / 100);
      if (i >= 0 && i < items.length) {
        if (p.menuI === i) onBtn(0, 'south');
        else { p.menuI = i; SFX.ui(); }
      }
      return;
    }
    p.mode = 'walk'; SFX.cancel();
    return;
  }
  if (p.mode === 'place' || p.mode === 'remove') {
    if (y > 44) {
      const s = p.placeK && p.mode === 'place' ? (B[p.placeK].size || 1) : 1;
      p.ghost = { gx: clamp(Math.floor(x / TILE), 0, GW - s), gy: clamp(Math.floor((y - GY0) / TILE), 0, GH - s) };
      SFX.ui();
    }
    return;
  }
  if (y > 44) { p.target = { x: clamp(x, 8, W - 8), y: clamp(y, GY0 + 8, H - 8) }; }
}

/* ═══════════════════════════════════════════════════════════════════════
   RENDER — per-frame hot path is drawImage + transforms + fillText only.
   Static world = 1 drawImage of bgC.
   ═══════════════════════════════════════════════════════════════════════ */
function txt(s, x, y, size, color, align, weight) {
  ctx.font = (weight || 700) + ' ' + size + 'px Verdana, sans-serif';
  ctx.textAlign = align || 'left';
  ctx.fillStyle = color || '#fff';
  ctx.fillText(s, x, y);
}
function otxt(s, x, y, size, color, align) {
  ctx.font = '900 ' + size + 'px Verdana, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.fillStyle = 'rgba(10,25,40,0.85)';
  ctx.fillText(s, x + Math.max(1, size / 14), y + Math.max(1, size / 14));
  ctx.fillStyle = color;
  ctx.fillText(s, x, y);
}
function drawFit(s, cx2, cy2, mw, mh) {
  const sc = Math.min(mw / s.width, mh / s.height);
  ctx.drawImage(s, cx2 - s.width * sc / 2, cy2 - s.height * sc / 2, s.width * sc, s.height * sc);
}
function extraSprites() {
  SPR.dim = (() => { const [c, g] = C(W, H); g.fillStyle = 'rgba(5,14,24,0.62)'; g.fillRect(0, 0, W, H); return c; })();
  SPR.iconRemove = S(11, 11, (g, P) => {
    g.fillStyle = '#e05a3a'; g.beginPath(); g.arc(11, 11, 10, 0, 6.3); g.fill();
    g.strokeStyle = '#fff'; g.lineWidth = 4; g.lineCap = 'round';
    g.beginPath(); g.moveTo(6, 6); g.lineTo(16, 16); g.moveTo(16, 6); g.lineTo(6, 16); g.stroke();
  });
}

      ctx.drawImage(ok ? SPR.tileOK : SPR.tileNO, tX(g.gx + dx), tY(g.gy + dy));

    const spr2 = SPR.b[k];

function renderPlay() {
  if (terrainDirty) rebuildTerrain();
  if (bgDirty) rebuildBG();
  ctx.save();
  if (shakeAmt > 0.2) ctx.translate((Math.random() - 0.5) * shakeAmt * 2, (Math.random() - 0.5) * shakeAmt * 2);
  ctx.drawImage(bgC, 0, 0);

  /* ocean sparkles along the coast */
  const nspark = Math.min(12, coast.length);
  for (let i = 0; i < nspark; i++) {
    const c = coast[(i * 43) % coast.length];
    ctx.globalAlpha = 0.25 + 0.3 * Math.sin(T * 2.4 + i * 2.1);
    ctx.drawImage(SPR.sparkB[i % 2], c.x - 5 + ((i * 13) % 11), c.y - 5 + ((i * 7) % 9));
  }
  ctx.globalAlpha = 1;

  /* pipe dots & power arcs */
  for (let i = 0; i < D_MAX; i++) {
    const d = dots[i];
    if (!d.on) continue;
    const q = pipePos(d.pipe, d.d);
    if (d.pipe.power) ctx.drawImage(SPR.arc[((T * 12) | 0 + i) % 2], q.x - 7, q.y - 7);
    else ctx.drawImage(SPR.dot, q.x - 5, q.y - 5);
  }

  /* animated building overlays */
  for (const a of anims) {
    switch (a.t) {
      case 'flame': {
        const f = SPR.flame[((T * 9) | 0) % 3];
        ctx.drawImage(f, a.x - 4, a.y + 2 - ((T * 9 | 0) % 3 === 1 ? 2 : 0));
        break;
      }
      case 'furnace':
        ctx.globalAlpha = 0.55 + 0.3 * Math.sin(T * 7 + a.x);
        ctx.drawImage(SPR.fglow[((T * 6) | 0) % 2], a.x - 9, a.y - 9);
        ctx.globalAlpha = 1;
        break;
      case 'blades': case 'bladesBig': {
        const s = a.t === 'blades' ? SPR.blades : SPR.bladesBig;
        const hw = s.width / 2;
        ctx.translate(a.x, a.y);
        ctx.rotate(T * a.sp);
        ctx.drawImage(s, -hw, -hw);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        if (shakeAmt > 0.2) ctx.translate((Math.random() - 0.5) * shakeAmt * 2, (Math.random() - 0.5) * shakeAmt * 2);
        break;
      }
      case 'gear':
        ctx.translate(a.x, a.y);
        ctx.rotate(T * 1.3);
        ctx.drawImage(SPR.gear, -8, -8);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        if (shakeAmt > 0.2) ctx.translate((Math.random() - 0.5) * shakeAmt * 2, (Math.random() - 0.5) * shakeAmt * 2);
        break;
      case 'bglow':
        if (islandPowered) {
          ctx.globalAlpha = 0.35 + 0.3 * Math.sin(T * 3 + a.x);
          ctx.drawImage(SPR.bglow, a.x - 10, a.y - 6);
          ctx.globalAlpha = 1;
        }
        break;
      case 'glint': {
        const ph = (T * 0.35 + a.cool) % 1;
        if (ph < 0.16) ctx.drawImage(SPR.glint, a.x + ph * 110, a.y + ph * 26);
        break;
      }
    }
  }

  /* idle / hungry bubbles */
  const bob = Math.sin(T * 4) * 2;
  for (const b of buildings) {
    if (b.idle === 'power') ctx.drawImage(SPR.bubPower, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
    else if (b.idle === 'input') ctx.drawImage(SPR.bubHungry, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
    else if (hungry && b.k === 'cabin') ctx.drawImage(SPR.bubHungry, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
  }

  /* crate + egg */
  if (crate) {
    const cbob = Math.sin(T * 3) * 2;
    const s = crate.opening ? SPR.crateOpen : SPR.crate;
    ctx.drawImage(s, tX(crate.gx) + 2, tY(crate.gy) + 26 - s.height + (crate.opening ? -Math.sin(crate.opening * 8) * 4 : cbob));
    ctx.drawImage(SPR.spark[((T * 5) | 0) % 2], tX(crate.gx) + 11, tY(crate.gy) - 14 + cbob);
  }
  if (egg) {
    ctx.drawImage(SPR.egg, egg.x - 8, egg.y - 18 + Math.sin(T * 6) * 1.5);
  }

  /* shaking flora (temporarily lifted out of the static bg) */
  for (const f of flora) if (!f.gone && f.shakeT > 0) drawFlora(ctx, f, true);

  /* harvest target markers */
  for (const p of players) {
    if (p.mode !== 'walk') continue;
    const f = nearFlora(p);
    if (f) drawFit(SPR.mark, tX(f.gx) + 16, tY(f.gy) - 12 + bob, 16, 14);
    if (crate && Math.hypot(tX(crate.gx) + 16 - p.x, tY(crate.gy) + 12 - p.y) < 52)
      otxt('✕ OPEN!', tX(crate.gx) + 16, tY(crate.gy) - 24, 13, '#ffd24a');
  }

  /* ghosts under everything mobile */
  for (const p of players) drawGhost(p);

  /* robots, drake, players */
  for (const r of robots) ctx.drawImage(SPR.robot[(r.frame | 0) % 2], r.x - 12, r.y - 26);
  if (drake) ctx.drawImage(SPR.drake[(drake.frame | 0) % 2], drake.x - 11, drake.y - 14 + Math.sin(T * 5) * 2);
  for (const p of players) {
    const frames = SPR.av[p.pi][p.dir];
    const spr2 = p.moving ? frames[1 + ((p.frame | 0) % 2)] : frames[0];
    if (p.flip) {
      ctx.translate(p.x, 0); ctx.scale(-1, 1);
      ctx.drawImage(spr2, -12, p.y - 30);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    } else ctx.drawImage(spr2, p.x - 12, p.y - 30);
    if (players.length > 1) otxt('P' + (p.pi + 1), p.x, p.y - 36, 10, p.pi ? '#ff9a8a' : '#8fd4ff');
  }

  /* rocket sequence */
  if (rocketSeq) {
    const q = rocketSeq;
    const rx = tX(q.pad.gx) + 32 - 20, ry0 = tY(q.pad.gy) + 46 - 92;
    ctx.drawImage(SPR.rocket, rx, ry0 - q.ry);
    if (q.phase === 'lift') ctx.drawImage(SPR.rflame[((T * 14) | 0) % 2], rx + 8, ry0 - q.ry + 88);
    if (q.phase === 'count' && q.n > 0) otxt('' + q.n, W / 2, 300, 130, '#ffd24a');
    if (q.phase === 'lift' && q.t < 1) otxt('LIFTOFF!', W / 2, 300, 70, '#ff9a4a');
  } else if (rocketDone) {
    const pad = buildings.find(b2 => b2.k === 'launchpad');
    if (pad) ctx.drawImage(SPR.star, tX(pad.gx) + 24, tY(pad.gy) + 18);
  }

  /* particles + floaty texts */
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (!p.on) continue;
    if (p.fade) ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
    ctx.drawImage(p.spr, p.x - p.spr.width / 2, p.y - p.spr.height / 2);
  }
  ctx.globalAlpha = 1;
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (!f.on) continue;
    ctx.globalAlpha = clamp(1.4 - f.t, 0, 1);
    let fx = f.x;
    if (f.icon && SPR.icon[f.icon]) { ctx.drawImage(SPR.icon[f.icon], f.x - 22, f.y - f.t * 34 - 14); fx = f.x + 2; }
    otxt(f.str, fx + (f.icon ? 12 : 0), f.y - f.t * 34, 15, f.color);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  drawHUD();
  for (const p of players) if (p.mode === 'menu') drawMenu(p, H - 114 - (p.pi ? 170 : 0));
  /* contextual hint line (touch users have DOM buttons in this corner) */
  if (!paused && !modal && !rocketSeq && players[0] &&
      !(AC && AC.currentInputSource() === 'touch')) {
    const m = players[0].mode;
    let hint = '';
    if (m === 'walk') hint = '✕/Z CHOP · □/C BUILD · △/V STATS';
    else if (m === 'menu') hint = '◀ ▶ CHOOSE · ✕ OK · ○ BACK';
    else if (m === 'place') hint = 'WALK TO A SPOT · ✕ PLACE · ○ BACK';
    else if (m === 'remove') hint = 'STAND ON A BUILDING · ✕ REMOVE · ○ BACK';
    txt(hint, 12, H - 12, 11, 'rgba(220,240,255,0.75)');
  }
  if (statsOpen) drawStats();
  if (paused) drawPause();
  if (modal) drawModal();
  if (banners.length) drawBanner(banners[0]);
}

function render() {
  if (scene === 'title') renderTitle();
  else if (scene === 'name') renderName();
  else renderPlay();
}

/* ═══════════════════════════════════════════════════════════════════════
   UPDATE + MAIN LOOP
   ═══════════════════════════════════════════════════════════════════════ */
function updatePlay(dt) {
  if (banners.length) {
    banners[0].t += dt * (banners.length > 1 ? 2.4 : 1);   // queued banners drain fast
    if (banners[0].t > banners[0].dur) banners.shift();
  }
  if (paused || modal) return;
  playtime += dt;
  simAcc += dt;
  while (simAcc >= 1) { simAcc -= 1; economyTick(); }
  if (!rocketSeq) for (const p of players) updatePlayer(p, dt);
  for (const r of robots) updateRobot(r, dt);
  if (drake) updateDrake(drake, dt);
  if (egg) {
    egg.t += dt;
    if (Math.random() < dt * 2) spawnP(egg.x, egg.y - 16, SPR.spark[1], { vy: -20, g: 0, life: 0.6 });
    if (egg.t > 20) {
      drake = { x: egg.x, y: egg.y, frame: 0 };
      egg = null;
      banners.push({ title: 'IT HATCHED!', sub: 'A pet drake joins your family!', t: 0, dur: 3, legendary: true });
      SFX.hatch();
    }
  }
  if (crate) {
    crate.t += dt;
    if (crate.opening) {
      crate.opening += dt;
      if (crate.opening > 0.8) revealCrate();
    } else if (Math.random() < dt * 2.4) {
      spawnP(tX(crate.gx) + 16, tY(crate.gy) - 4, SPR.spark[0], { vy: -34, vx: (Math.random() - 0.5) * 20, g: 0, life: 0.8 });
    }
  }
  for (const f of flora) {
    if (f.gone) {
      f.regrowT -= dt;
      if (f.regrowT <= 0) {
        f.gone = false; f.hits = 0; bgDirty = true;
        spawnP(tX(f.gx) + 16, tY(f.gy) + 16, SPR.spark[0], { vy: -20, g: 0, life: 0.7 });
      }
    } else if (f.shakeT > 0) {
      f.shakeT -= dt;
      if (f.shakeT <= 0) bgDirty = true;
    }
  }
  /* ambient emitters (smoke / bubbles / auras) */
  for (const a of anims) {
    if (a.t === 'smoke') {
      a.cool -= dt;
      if (a.cool <= 0) {
        a.cool = a.soft ? 1.6 : 0.85 + Math.random() * 0.4;
        spawnP(a.x, a.y, (a.soft ? SPR.puff : SPR.puffDark)[(Math.random() * 2) | 0],
               { vx: 6 + Math.random() * 8, vy: -20 - Math.random() * 8, g: -8, life: 1.5 });
      }
    } else if (a.t === 'bubbles') {
      if (!a.b.idle) {
        a.cool -= dt;
        if (a.cool <= 0) { a.cool = 0.5 + Math.random() * 0.4; spawnP(a.x, a.y, SPR.sparkB[1], { vx: 0, vy: -26, g: 0, life: 0.7 }); }
      }
    } else if (a.t === 'aura') {
      a.cool -= dt;
      if (a.cool <= 0) {
        a.cool = 0.7 + Math.random() * 0.6;
        spawnP(a.x + (Math.random() - 0.5) * 26, a.y + Math.random() * 16,
               a.gold ? SPR.spark[0] : SPR.sparkB[0], { vx: 0, vy: -18, g: 0, life: 0.9 });
      }
    }
  }
  if (rocketSeq) updateRocket(dt);
  else if (shakeAmt > 0) shakeAmt = Math.max(0, shakeAmt - dt * 8);
  updateDots(dt);
  /* pools */
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (!p.on) continue;
    p.t += dt;
    if (p.t >= p.life) { p.on = false; continue; }
    p.vy += p.g * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (!f.on) continue;
    f.t += dt;
    if (f.t > 1.3) f.on = false;
  }
  autosaveT += dt;
  if (autosaveT > 10) { autosaveT = 0; saveGame(); }
}

let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min(((t - lastT) || 16.7) / 1000, 0.1);
  lastT = t;
  T += dt;
  musicTick();
  if (scene === 'play') updatePlay(dt);
  render();
}

/* ───── test hooks (used by the CI harness; harmless to ship) ───── */
window.__test = {
  grant(o) { for (const k in o) res[k] = (res[k] || 0) + o[k]; },
  setAge(n) { while (age < n) ageUp(); },
  setPop(n) { popF = n; pop = n; },
  crate() { if (!crate) spawnCrate(); return crate ? { gx: crate.gx, gy: crate.gy } : null; },
  gotoCrate() { if (crate && players[0]) { players[0].x = tX(crate.gx) + 16; players[0].y = tY(crate.gy) + 20; } },
  walkTo(x, y) { if (players[0]) players[0].target = { x, y }; },
  walkToTile(gx, gy) { if (players[0]) players[0].target = { x: tX(gx) + 16, y: tY(gy) + 16 }; },
  arrived() { return !players[0] || !players[0].target; },
  flora() { return flora.filter(f => !f.gone).map(f => ({ type: f.type, x: tX(f.gx) + 16, y: tY(f.gy) + 20 })); },
  findSpot(k) {
    for (let r = 1; r < 16; r++) for (let gy = CYG - r; gy <= CYG + r; gy++) for (let gx = CX - r; gx <= CX + r; gx++)
      if (validAt(k, gx, gy)) return { gx, gy };
    return null;
  },
  place(k, gx, gy) { return placeBuilding(k, gx, gy); },
  tick(n) { for (let i = 0; i < (n || 1); i++) economyTick(); },
  fastRocket() { if (rocketSeq) { rocketSeq.phase = 'lift'; rocketSeq.t = 3.3; rocketSeq.n = 0; } },
  fastBanner() { if (banners.length) banners[0].t = banners[0].dur; },
  save() { saveGame(); },
  info() {
    return {
      scene, age, pop, hungry, paused, statsOpen, legends, rocketDone,
      res: Object.assign({}, res), rates: Object.assign({}, rates),
      powerInc, powerDem, islandPowered,
      buildings: buildings.map(b => b.k), pipes: pipes.length,
      players: players.length,
      mode: players[0] ? players[0].mode : null,
      p2mode: players[1] ? players[1].mode : null,
      modal: !!modal, banner: banners.length ? banners[0].title : null,
      crate: !!crate, robots: robots.length, drake: !!drake, egg: !!egg,
      rocket: rocketSeq ? rocketSeq.phase : null,
      slotSel, nameBuf: nameSt ? nameSt.name : null,
      p1: players[0] ? { x: players[0].x, y: players[0].y } : null,
    };
  },
};

/* ───── boot ───── */
initSprites();
extraSprites();
loadSlotSummaries();
document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
addEventListener('pagehide', () => saveGame());
requestAnimationFrame(loop);
</script>
