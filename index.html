<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════════
   ISLAND FORGE — Stephens Arcade
   Kid-friendly incremental island builder. One file, zero assets:
   every sprite is baked into offscreen canvases at load, all audio is
   WebAudio synth. Per-frame hot path is drawImage + transforms only —
   all static content (ocean, land, wires, paths, buildings, trees) lives in ONE
   background canvas rebuilt only when the island changes.
   ═══════════════════════════════════════════════════════════════════════ */

const W = 1280, H = 720, TILE = 32, GY0 = 8;
/* v4b: TWO worlds. The active world's grid/canvases live in these globals;
   the inactive world's live in `otherWorld` and swap in wholesale. */
const EGW = 80, EGH = 44;                      // Earth grid
const MGW = 40, MGH = 26;                      // Moon grid (all space around one landmass)
let GW = EGW, GH = EGH;
let WORLD_W = GW * TILE, WORLD_H = GY0 + GH * TILE;   // 2560 x 1416 (Earth)
const CX = 24, CYG = 13;                       // home island centre in grid coords
const MCX = 20, MCY = 13;                      // moon landmass centre
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
addEventListener('resize', fit); fit();

/* ───── tiny utils ───── */
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
function mulberry(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash2(x, y) {
  let h = (x * 374761393 + y * 668265263) ^ ((x + 7) * (y + 13) * 1274126177);
  h = (h ^ (h >>> 13)) >>> 0;
  return (h % 1024) / 1024;
}
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K';
  return '' + n;
}
const tX = gx => gx * TILE, tY = gy => GY0 + gy * TILE;

/* ───── storage ───── */
const SLOT_KEY = i => 'islandforge_slot' + i;
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch (e) {} }
let best = parseInt(lsGet('islandforge_best') || '0', 10) || 0;
let muted = lsGet('islandforge_mute') === '1';

/* ───── audio (all synthesized, context created lazily on first gesture) ───── */
let actx = null, musNext = 0, chordI = 0;
function ensureAudio() {
  if (!actx) {
    const A = window.AudioContext || window.webkitAudioContext;
    if (A) { actx = new A(); musNext = actx.currentTime + 0.4; }
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol, sweepTo) {
  if (!actx || muted) return;
  const t0 = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, sweepTo), t0 + dur);
  g.gain.setValueAtTime(vol || 0.06, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(actx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur, peak, lp0, lp1) {
  if (!actx || muted) return;
  const t0 = actx.currentTime, sr = actx.sampleRate;
  const buf = actx.createBuffer(1, Math.floor(sr * dur), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length * 0.5);
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(lp0, t0);
  f.frequency.exponentialRampToValueAtTime(Math.max(30, lp1), t0 + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(f).connect(g).connect(actx.destination);
  src.start(t0); src.stop(t0 + dur + 0.05);
}
let lastTickSnd = 0;
const SFX = {
  ui:       () => blip(520, 0.05, 'square', 0.04, 640),
  confirm:  () => { blip(660, 0.07, 'triangle', 0.07); setTimeout(() => blip(990, 0.09, 'triangle', 0.07), 60); },
  cancel:   () => blip(330, 0.09, 'square', 0.05, 200),
  chop:     () => { noiseBurst(0.07, 0.12, 1600, 500); blip(190, 0.06, 'square', 0.07, 120); },
  mine:     () => { noiseBurst(0.06, 0.12, 2600, 900); blip(560, 0.05, 'square', 0.05, 340); },
  place:    () => { blip(240, 0.1, 'triangle', 0.09, 480); noiseBurst(0.1, 0.08, 900, 300); },
  remove:   () => { noiseBurst(0.14, 0.1, 1200, 200); blip(300, 0.12, 'square', 0.05, 90); },

                    blip(880, 0.05, 'triangle', 0.045, 1320); },

  fanfare:  () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.22, 'triangle', 0.09), i * 130)); },

  hatch:    () => { [520, 700, 940].forEach((f, i) => setTimeout(() => blip(f, 0.1, 'sine', 0.07), i * 80)); },
  alarm:    () => { [420, 300, 420, 300].forEach((f, i) => setTimeout(() => blip(f, 0.16, 'square', 0.06), i * 180)); },
  boom:     () => { noiseBurst(0.5, 0.28, 900, 60); blip(90, 0.4, 'sawtooth', 0.1, 35); },
  fixed:    () => { [523, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.12, 'triangle', 0.08), i * 70)); },
  gate:     () => { [330, 440, 587, 784].forEach((f, i) => setTimeout(() => blip(f, 0.3, 'sawtooth', 0.05, f * 1.5), i * 160)); },
  splash:   () => { noiseBurst(0.28, 0.14, 1400, 220); blip(320, 0.14, 'sine', 0.05, 130); },
  /* v4c: pop cannon */
  shoot:    () => { noiseBurst(0.12, 0.14, 900, 220); blip(150, 0.16, 'square', 0.07, 430); },
  bounce:   () => blip(300, 0.07, 'sine', 0.06, 620),
  boing:    () => { blip(150, 0.08, 'sine', 0.09, 80); setTimeout(() => blip(190, 0.24, 'sine', 0.08, 540), 50); },
  burst:    () => { noiseBurst(0.2, 0.14, 2200, 300); blip(900, 0.18, 'triangle', 0.06, 260); },
  /* v5b: interiors */
  purr:     () => { blip(170, 0.32, 'sine', 0.05, 130); setTimeout(() => blip(210, 0.26, 'sine', 0.045, 150), 130); },
  ding:     () => { blip(880, 0.16, 'triangle', 0.06); setTimeout(() => blip(1320, 0.3, 'triangle', 0.05), 110); },
  door:     () => { blip(300, 0.08, 'triangle', 0.06, 420); setTimeout(() => blip(460, 0.1, 'triangle', 0.05, 620), 70); },
};
/* cozy ambient loop — soft pad chords + pentatonic plucks, scheduled ahead */
const CHORDS = [[130.8, 196, 329.6], [110, 164.8, 261.6], [87.3, 130.8, 220], [98, 146.8, 246.9]];
const PENTA = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3];
function musicTick() {
  if (!actx || muted) return;
  const now = actx.currentTime;
  if (musNext < now - 4) musNext = now + 0.1;
  while (musNext < now + 0.5) {
    const t0 = musNext, ch = CHORDS[chordI % CHORDS.length]; chordI++;
    for (const f of ch) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.02, t0 + 0.8);
      g.gain.linearRampToValueAtTime(0.0001, t0 + 3.1);
      o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0 + 3.2);
    }
    for (let i = 0; i < 4; i++) {
      if (Math.random() < 0.35) continue;
      const t1 = t0 + i * 0.8 + (Math.random() < 0.3 ? 0.4 : 0);
      const f = PENTA[(Math.random() * PENTA.length) | 0];
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t1);
      g.gain.linearRampToValueAtTime(0.035, t1 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t1 + 0.7);
      o.connect(g).connect(actx.destination); o.start(t1); o.stop(t1 + 0.75);
    }
    musNext += 3.2;
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   SPRITE ATLAS — everything baked once at load. P() draws chunky 2x
   "16px art" pixels; gradients/ellipses are fine HERE (load time only).
   ═══════════════════════════════════════════════════════════════════════ */
const SPR = {};
function C(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d'); g.imageSmoothingEnabled = false;
  return [c, g];
}
function S(w, h, fn) {          // w,h in art units (1 unit = 2px)
  const [c, g] = C(w * 2, h * 2);
  const P = (x, y, ww, hh, col) => { g.fillStyle = col; g.fillRect(Math.round(x * 2), Math.round(y * 2), Math.round(ww * 2), Math.round(hh * 2)); };
  fn(g, P);
  return c;
}
function rr(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
function shad(g, cx, cy, rx, ry) {
  g.fillStyle = 'rgba(15,40,30,0.28)';
  g.beginPath(); g.ellipse(cx, cy, rx, ry, 0, 0, 6.3); g.fill();
}
function glowDot(r, col) {      // baked radial glow sprite
  const [c, g] = C(r * 2, r * 2);
  const gr = g.createRadialGradient(r, r, 1, r, r, r);
  gr.addColorStop(0, col); gr.addColorStop(0.5, col.slice(0, 7) + '88'); gr.addColorStop(1, col.slice(0, 7) + '00');
  g.fillStyle = gr; g.fillRect(0, 0, r * 2, r * 2);
  return c;
}

function initSprites() {
  /* terrain tiles (16 units = 32px) */
  /* 5 grass shades, dark→light, picked by smooth noise for mottled patches */
  const GRASS_BASE = ['#4c9c45', '#52a64a', '#57b04f', '#5cb954', '#62c15a'];
  const GRASS_DARK = ['#438c3d', '#489642', '#4da046', '#52a94b', '#57b250'];
  const GRASS_LITE = ['#57ad4f', '#5db755', '#63c159', '#68c95f', '#6ed165'];
  SPR.grass = [0, 1, 2, 3, 4].map(v => S(16, 16, (g, P) => {
    P(0, 0, 16, 16, GRASS_BASE[v]);
    for (let i = 0; i < 16; i++) {
      const x = (i * 7 + v * 5) % 16, y = (i * 11 + v * 3 + 2) % 16;
      P(x, y, 1, 1, i % 3 ? GRASS_DARK[v] : GRASS_LITE[v]);
    }
    if (v >= 3) { P((v * 3) % 12 + 2, (v * 5) % 12 + 2, 1, 2, '#7ed07a'); }
  }));
  /* tiny decor stamped on some grass tiles during the terrain bake */
  SPR.flower = ['#ffd1e0', '#f6e97e', '#fefefe', '#ffb28a'].map(c => S(3, 3, (g, P) => {
    P(1, 0, 1, 3, c); P(0, 1, 3, 1, c); P(1, 1, 1, 1, '#f5c542');
  }));
  SPR.pebble = S(3, 2, (g, P) => { P(0, 0.6, 3, 1.4, '#9aa2ab'); P(0.6, 0, 1.8, 1, '#b8bfc7'); });
  SPR.tuft = S(4, 3, (g, P) => { P(0, 1, 1, 2, '#7ed07a'); P(1.5, 0, 1, 3, '#8ed88a'); P(3, 1, 1, 2, '#7ed07a'); });
  SPR.sand = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#ecd794');
    for (let i = 0; i < 12; i++) P((i * 5 + 3) % 16, (i * 7 + 1) % 16, 1, 1, i % 2 ? '#dbc27b' : '#f7e8b4');
  });
  SPR.shallow = S(16, 16, (g, P) => {
    P(0, 0, 16, 16, '#3f97c9');
    for (let i = 0; i < 6; i++) P((i * 6 + 2) % 15, (i * 9 + 4) % 15, 2, 1, '#57aad6');
  });
  SPR.foam = [0, 1].map(v => S(16, 16, (g, P) => {
    for (let i = 0; i < 5; i++) P((i * 4 + v * 2 + 1) % 14, (i * 6 + v * 5 + 2) % 14, 2, 1, 'rgba(230,248,255,0.85)');
  }));

  /* trees & rocks — bottom-anchored, 16x22 units (32x44 px) */
  const mkTree = (stage, golden) => S(16, 22, (g, P) => {
    shad(g, 16, 40, 10 - stage * 2, 3.5);
    const tD = golden ? '#9a7328' : '#6e4023', tL = golden ? '#b98d38' : '#8a5530';
    const c1 = golden ? '#a37a10' : '#2c7a3a', c2 = golden ? '#dda428' : '#3a9a49', c3 = golden ? '#f4cc4e' : '#54bd62';
    if (stage === 0) {
      P(7, 13, 2, 8, tD); P(7, 13, 1, 8, tL);
      P(2, 8, 12, 6, c1);
      P(3, 4, 10, 6, c2);
      P(5, 2, 6, 4, c2);
      P(5, 3, 5, 3, c3); P(4, 6, 4, 3, c3);
      P(6, 2, 2, 1, golden ? '#fff7c9' : '#8ed88a');
      if (golden) { P(4, 9, 1, 1, '#fff7c9'); P(11, 6, 1, 1, '#fff7c9'); P(9, 11, 1, 1, '#fff7c9'); }
      else { P(4, 10, 1, 1, '#e85f5f'); P(10, 6, 1, 1, '#e85f5f'); P(11, 11, 1, 1, '#e85f5f'); }
    } else if (stage === 1) {
      P(7, 13, 2, 8, tD); P(7, 13, 1, 8, tL);
      P(4, 9, 8, 5, c1);
      P(5, 6, 6, 5, c2);
      P(6, 7, 3, 2, c3);
    } else {
      P(6.5, 16, 3, 5, tD); P(6.5, 16, 1.4, 5, tL);
      P(5, 14, 3, 3, c2); P(8.5, 15, 2.5, 2, c2);

  SPR.tree = [mkTree(0), mkTree(1), mkTree(2)];
  SPR.gold = [mkTree(0, 1), mkTree(0, 1), mkTree(0, 1)];
  /* rainbow tree — legendary crate gift, banded canopy, never depletes */
  SPR.rainbow = (r => [r, r, r])(S(16, 22, (g, P) => {
    shad(g, 16, 40, 10, 3.5);
    P(7, 13, 2, 8, '#6e4023'); P(7, 13, 1, 8, '#8a5530');
    P(2, 11, 12, 3, '#b46bff');
    P(2, 9, 12, 2.4, '#59a0ff');
    P(2.6, 7, 10.8, 2.4, '#4cd674');
    P(3.4, 5, 9.2, 2.4, '#ffd24a');
    P(4.4, 3.4, 7.2, 2, '#ff9a4a');
    P(5.4, 2, 5.2, 1.8, '#ff5f8a');
    P(6.4, 1, 3.2, 1.2, '#ffb2d0');
    P(4, 8, 1, 1, '#ffffff'); P(10.4, 5.6, 1, 1, '#ffffff'); P(7, 11.6, 1, 1, '#ffffff');
  }));
  /* v4d: sleeping (dimmed) variants of the treasure trees — baked once,

  const dimify = src => {
    const [c, g] = C(src.width, src.height);
    g.drawImage(src, 0, 0);
    g.globalCompositeOperation = 'source-atop';
    g.fillStyle = 'rgba(18,32,58,0.48)';

  SPR.goldDim = SPR.gold.map(dimify);
  SPR.rainbowDim = SPR.rainbow.map(dimify);
  SPR.rock = [0, 1, 2].map(st => S(16, 12, (g, P) => {

  /* campfire + flame frames */
  SPR.b = {}; SPR.bLit = {};
  SPR.b.campfire = SPR.bLit.campfire = S(16, 16, (g, P) => {
    const gr = g.createRadialGradient(16, 24, 2, 16, 24, 15);

    P(3.4, 13.4, 3, 2.4, '#9aa2ab'); P(9.6, 13.6, 3, 2.4, '#9aa2ab');

    [[3, 9], [10, 8.6], [1.6, 11.4], [11.6, 11.2], [3.4, 13.4], [9.6, 13.6]].forEach(q => P(q[0] + 0.4, q[1] + 0.3, 2.2, 0.8, '#c2c9d1'));
    P(4.6, 11.6, 7, 1.6, '#6e4023'); P(5, 11.2, 6, 1, '#8a5530');
    P(6, 10, 4.4, 1.4, '#4a2c18');
    P(6.6, 12.2, 3, 1, '#2b1c10');

    const w = [5, 6.4, 5.4][v], h = [9, 10.5, 8][v];
    P(5 - w / 2, 11 - h, w, h, '#ff7a1a');

    P(5 - w / 2 + 1.6, 13 - h + v * 0.4, w - 3.2, h - 4.6, '#ffe27a');

const FLAG_COLS = [['#e05a3a', '#f0705e'], ['#3a7bd5', '#5f9ae8'], ['#4cb45a', '#6ecc78'], ['#ffd24a', '#ffe27a']];
function initDecorSprites() {
  SPR.dec = {}; SPR.path = {};
  /* covered rects for a connection mask: fat centre pad + an arm per bit */
  const maskRects = m => {
    const r = [[9, 9, 14, 14]];
    if (m & 1) r.push([9, 0, 14, 9]);
    if (m & 2) r.push([23, 9, 9, 14]);
    if (m & 4) r.push([9, 23, 14, 9]);
    if (m & 8) r.push([0, 9, 9, 14]);
    return r;
  };
  const inRects = (r, x, y) => r.some(q => x >= q[0] && x < q[0] + q[2] && y >= q[1] && y < q[1] + q[3]);
  const mkPathSet = paint => [...Array(16)].map((_, m) => {
    const [c, g] = C(32, 32);
    paint(g, maskRects(m), m);
    return c;
  });
  SPR.path.stonepath = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#848c95'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#a9b1ba'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let i = 0; i < 26; i++) {
      const x = (i * 7 + m * 3) % 30, y = (i * 11 + 5 + m) % 30;
      if (!inRects(r, x, y) || !inRects(r, x + 3, y + 2)) continue;
      g.fillStyle = i % 3 ? '#98a0a8' : '#c6cdd5';
      g.fillRect(x, y, 3, 2);
    }
  });
  SPR.path.boardwalk = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#7a4a2b'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#9c6b3d'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let y = 2; y < 32; y += 4) for (const q of r) {
      if (y <= q[1] || y >= q[1] + q[3] - 1) continue;
      g.fillStyle = '#8a5c33'; g.fillRect(q[0] + 1, y, q[2] - 2, 1);
      g.fillStyle = '#b07c48'; g.fillRect(q[0] + 1, y + 1, q[2] - 2, 1);
    }
    for (let i = 0; i < 8; i++) {
      const x = (i * 9 + m * 5 + 3) % 29, y = (i * 13 + 7) % 29;
      if (inRects(r, x, y)) { g.fillStyle = '#5f3a22'; g.fillRect(x, y, 1, 1); }
    }
  });
  SPR.path.sandtrail = mkPathSet((g, r, m) => {
    for (const q of r) { g.fillStyle = '#dbc27b'; g.fillRect(q[0], q[1], q[2], q[3]); }
    for (const q of r) { g.fillStyle = '#ecd794'; g.fillRect(q[0] + 1, q[1] + 1, q[2] - 2, q[3] - 2); }
    for (let i = 0; i < 22; i++) {
      const x = (i * 5 + m * 7 + 2) % 30, y = (i * 11 + 3) % 30;
      if (inRects(r, x, y)) { g.fillStyle = i % 2 ? '#d4ba76' : '#f7e8b4'; g.fillRect(x, y, 2, 1); }
    }
  });
  /* fence + hedge: same 16-mask idea, but they live in the bg (y-sorted) */
  SPR.fence16 = [...Array(16)].map((_, m) => {
    const [c, g] = C(32, 40);

    if (m & 8) { rail(0, 15, 16); rail(0, 15, 25); }

    if (m & 1) { P(11, 8, 2.4, 12, '#8a5c33'); P(18.6, 8, 2.4, 12, '#8a5c33'); }   // rails receding north
    if (m & 4) { P(11, 30, 2.4, 10, '#8a5c33'); P(18.6, 30, 2.4, 10, '#8a5c33'); }

  if (!cands.length) {
    /* per-archipelago: only "full" when no island can grow AND all are settled */
    if (!islandFull && settled.length >= SETTLE_MAX) {
      islandFull = true;
      pushEvent('full');                        // v5b
      banners.push({ title: 'YOUR ARCHIPELAGO IS FULL!', sub: 'Every last tile tamed!', t: 0, dur: 3.6, legendary: true });
      SFX.fanfare();
      saveGame();
    }
    return false;
  }
  /* connected band of ~10-16 tiles hugging the coastline (prefer 2+ land
     neighbours so the shoreline stays organic; re-seed only if boxed in) */
  const want = 10 + ((Math.random() * 7) | 0);
  const picked = [];
  const nearPicked = c => picked.some(p => Math.abs(p.gx - c.gx) + Math.abs(p.gy - c.gy) === 1);
  const score = c => {
    let n = c.n;
    for (const p of picked) if (Math.abs(p.gx - c.gx) + Math.abs(p.gy - c.gy) === 1) n++;
    return n;
  };
  while (picked.length < want && cands.length) {
    let pool = picked.length ? cands.filter(nearPicked) : cands;
    if (!pool.length) pool = cands;                   // boxed in — start a new arm
    let bestS = 0;
    for (const c of pool) { c.s = score(c); if (c.s > bestS) bestS = c.s; }
    const top = pool.filter(c => c.s >= Math.min(2, bestS));
    const t = top[(Math.random() * top.length) | 0];
    picked.push(t);
    cands.splice(cands.indexOf(t), 1);
  }
  for (const t of picked) {
    landAge[t.gy][t.gx] = 7;
    grownTiles.push([t.gx, t.gy]);
    spawnP(tX(t.gx) + 16, tY(t.gy) + 16, SPR.spark[(t.gx + t.gy) % 2], { vy: -30, g: 0, life: 1.2 });
  }
  for (const t of picked) {                           // fresh flora takes root (not on sand)
    if (sandAt(t.gx, t.gy) || occ[t.gy][t.gx] || floraAt(t.gx, t.gy)) continue;
    const r = hash2(t.gx * 5 + 3, t.gy * 9 + 1);
    if (r < 0.16) flora.push({ type: 'tree', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
    else if (r < 0.24) flora.push({ type: 'rock', gx: t.gx, gy: t.gy, hits: 0, gone: false, regrowT: 0, shakeT: 0, golden: false });
  }
  banners.push({ title: 'THE ISLAND GROWS!', sub: '+' + picked.length + ' new land — room to build!', t: 0, dur: 3 });
  SFX.fanfare();
  let px2 = 0, py2 = 0;
  for (const t of picked) { px2 += tX(t.gx) + 16; py2 += tY(t.gy) + 16; }
  camPanTo(px2 / picked.length, py2 / picked.length, 2.4);   // show kids the new land
  recomputeIsleIds();
  landGrowthSanity(false);                      // v4d: boats push off, landlocked ports pack up
  refreshColonyChecks(); refreshFerries();
  terrainDirty = true;
  saveGame();
  return true;
}

/* ── v3: camera — one smooth window into the big world ── */

function camTarget() {
  if (gateSeq) return { x: tX(gateSeq.b.gx) + 32, y: tY(gateSeq.b.gy) + 30 };
  if (travelCin()) {
    const st = travel.phase === 'land' ? travel.site : travel.srcSite;
    if (st) return { x: tX(st.gx) + st.s * 16, y: tY(st.gy) + 20 - Math.min((travel.ry || 0) * 0.5, 260) };
  }
  if (rocketSeq && rocketSeq.phase !== 'stars')
    return { x: tX(rocketSeq.pad.gx) + 32, y: tY(rocketSeq.pad.gy) + 20 - Math.min(rocketSeq.ry * 0.5, 260) };
  if (disaster && world === 'earth') {
    const t = disaster.targets.find(t2 => !t2.done) || disaster.targets[disaster.targets.length - 1];
    if (t) return { x: t.x, y: t.y };

  let sx = 0, sy = 0, n = 0;
  for (const p of players) { if (p.inside) continue; sx += p.x; sy += p.y; n++; }   // v5b: follow OUTSIDE players only
  if (!n && players.length) return { x: camX + W / 2, y: camY + H / 2 };            // everyone inside — hold still
  return n ? { x: sx / n, y: sy / n } : { x: tX(CX) + 16, y: tY(CYG) + 16 };
}

  !(disaster && world === 'earth') && !camPan;   // leash only in follow mode

  if (camPan) { camPan.t -= dt; if (camPan.t <= 0) camPan = null; }
  const t = camTarget();
  const wx = clamp(t.x - W / 2, 0, WORLD_W - W), wy = clamp(t.y - H / 2, 0, WORLD_H - H);
  if (snap) { camX = wx; camY = wy; return; }
  const f = Math.min(1, dt * 3.2);
  camX += (wx - camX) * f;
  camY += (wy - camY) * f;
}

/* ═══ v5a: THE POWER GRID — real and player-built (SimCity-style).
   ONE kid-legible rule: power flood-fills from any SOURCE through
   orthogonally adjacent buildings and POWER POLES. b.conn caches the
   result; wire runs bake into the terrain as sagging catenary segments
   (path ops at bake time only — the hot path never draws a path). ═══ */
const isSource = b => !b.rubble && !!(B[b.k].prod && B[b.k].prod.power);

  const s = B[b.k].size || 1;
  if (B[b.k].pole) return { x: tX(b.gx) + 16, y: tY(b.gy) - 4 };   // the crossarm
  return { x: tX(b.gx) + s * 16, y: tY(b.gy) + 8 };
}
function recomputePower() {
  for (const b of buildings) b.conn = false;
  const q = [];
  for (const b of buildings) if (isSource(b)) { b.conn = true; q.push(b); }
  while (q.length) {
    const b = q.pop();
    const s = B[b.k].size || 1;
    for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) {
      const gx = b.gx + dx, gy = b.gy + dy;
      const nbs = [occ[gy - 1] && occ[gy - 1][gx], occ[gy + 1] && occ[gy + 1][gx],
                   occ[gy][gx - 1], occ[gy][gx + 1]];
      for (const o of nbs) {
        if (!o || o === b || o.conn || o.rubble) continue;
        o.conn = true; q.push(o);
      }
    }
  }
  /* visible wires: adjacent pairs involving a pole, or a source feeding a
     power-hungry neighbour directly (dense cabin rows stay wire-free) */
  wires = [];
  const seen = new Set();
  for (const b of buildings) {
    if (b.rubble) continue;
    const s = B[b.k].size || 1;
    for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) {
      const gx = b.gx + dx, gy = b.gy + dy;
      for (const o of [occ[gy] && occ[gy][gx + 1], occ[gy + 1] && occ[gy + 1][gx]]) {
        if (!o || o === b || o.rubble) continue;
        const wired = B[b.k].pole || B[o.k].pole ||
          (isSource(b) && B[o.k].needPower) || (isSource(o) && B[b.k].needPower);
        if (!wired) continue;
        const key = Math.min(b.seq, o.seq) * 131072 + Math.max(b.seq, o.seq);
        if (seen.has(key)) continue;
        seen.add(key);
        const a1 = wireAnchor(b), a2 = wireAnchor(o);
        wires.push({ x0: a1.x, y0: a1.y, x1: a2.x, y1: a2.y,
                     g0: [b.gx, b.gy], g1: [o.gx, o.gy], on: !!(b.conn && o.conn) });
      }
    }
  }

  terrainDirty = true;
}
function drawWires(g) {           // bake-time only — drawn into the terrain layer
  for (const w of wires) {
    const mx = (w.x0 + w.x1) / 2, my = Math.max(w.y0, w.y1) / 2 + Math.min(w.y0, w.y1) / 2 + 5;
    g.globalAlpha = w.on ? 1 : 0.5;
    g.lineCap = 'round';
    g.strokeStyle = '#241a10'; g.lineWidth = 2.6;
    g.beginPath(); g.moveTo(w.x0, w.y0); g.quadraticCurveTo(mx, my, w.x1, w.y1); g.stroke();
    g.strokeStyle = w.on ? '#59606a' : '#3a3830'; g.lineWidth = 1;
    g.beginPath(); g.moveTo(w.x0, w.y0 - 1); g.quadraticCurveTo(mx, my - 1, w.x1, w.y1 - 1); g.stroke();
    g.globalAlpha = 1;

}
/* placement aid: faint glow on the grid + everything one step away from it,
   baked at ¼ resolution and blitted as ONE drawImage while placing */
function rebuildPowGlow() {
  glowDirty = false;
  if (!powGlowC) { const a = C(EGW * TILE / 4, (GY0 + EGH * TILE) / 4); powGlowC = a[0]; powGlowG = a[1]; }
  const g = powGlowG;
  g.clearRect(0, 0, powGlowC.width, powGlowC.height);
  const mark = (gx, gy, a) => {
    if (gx < 0 || gy < 0 || gx >= GW || gy >= GH || !isLand(gx, gy)) return;
    g.fillStyle = 'rgba(90,224,255,' + a + ')';
    g.fillRect(gx * 8, GY0 / 4 + gy * 8, 8, 8);
  };
  for (const b of buildings) {
    if (!b.conn || b.rubble) continue;
    const s = B[b.k].size || 1;
    for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) {
      const gx = b.gx + dx, gy = b.gy + dy;
      mark(gx, gy, 0.5);
      if (!occ[gy - 1] || !occ[gy - 1][gx]) mark(gx, gy - 1, 0.26);
      if (!occ[gy + 1] || !occ[gy + 1][gx]) mark(gx, gy + 1, 0.26);
      if (!occ[gy][gx - 1]) mark(gx - 1, gy, 0.26);

/* ── v5a migration: pre-v6 saves get REAL poles auto-granted along sensible
   routes so every building that WAS powered STAYS powered. Islands that
   powered a lab from across the sea (old global rule) get a free windmill —
   nobody's city goes dark, and every grant is removable/refundable. ── */
function poleOKAt(gx, gy) {
  return isLand(gx, gy) && !occ[gy][gx] && !floraAt(gx, gy) && !decorAt(gx, gy) &&
         !(crate && crate.gx === gx && crate.gy === gy);
}
function poleRoute(b) {
  const s = B[b.k].size || 1, kk = (gx, gy) => gy * GW + gx;
  const prev = new Map(), q = [];
  const goal = (gx, gy) => {
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const o = occ[gy + dy] && occ[gy + dy][gx + dx];
      if (o && o.conn && !o.rubble) return true;
    }
    return false;
  };
  for (let fy = 0; fy < s; fy++) for (let fx = 0; fx < s; fx++)
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const gx = b.gx + fx + dx, gy = b.gy + fy + dy;
      if (!poleOKAt(gx, gy) || prev.has(kk(gx, gy))) continue;
      prev.set(kk(gx, gy), null);
      q.push({ gx, gy });
    }
  for (let qi = 0; qi < q.length && qi < 3000; qi++) {
    const t = q[qi];
    if (goal(t.gx, t.gy)) {
      const path = [];
      let cur = t;
      while (cur) { path.push(cur); cur = prev.get(kk(cur.gx, cur.gy)); }
      return path;
    }
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const gx = t.gx + dx, gy = t.gy + dy;
      if (!poleOKAt(gx, gy) || prev.has(kk(gx, gy))) continue;
      prev.set(kk(gx, gy), t);

}

  for (let r = 1; r < 18; r++) for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue;
    if (validAt(k, cx2 + dx, cy2 + dy)) return { gx: cx2 + dx, gy: cy2 + dy };
  }

}

  recomputePower();

  for (let pass = 0; pass < 90; pass++) {
    const b = buildings.find(b2 => !b2.rubble && B[b2.k].needPower && !b2.conn && !skip.has(b2));
    if (!b) break;
    const isle = isleIdAt(b.gx, b.gy);
    if (!buildings.some(o => isSource(o) && isleIdAt(o.gx, o.gy) === isle)) {
      const spot = spiralSpot('windmill', b.gx, b.gy);   // old rule powered it globally
      if (spot) { addBuilding('windmill', spot.gx, spot.gy); granted++; continue; }
      skip.add(b); continue;
    }
    const path = poleRoute(b);
    if (!path || !path.length) { skip.add(b); continue; }
    for (const t of path) { addBuilding('pole', t.gx, t.gy); granted++; }

/* ═══ v5a: DECORATIONS — placement, removal, auto-connect masks ═══ */
const DKEY = (gx, gy) => gy * 512 + gx;

  return isLand(gx, gy) && !occ[gy][gx] && !floraAt(gx, gy) && !decorAt(gx, gy) &&
         !(crate && crate.gx === gx && crate.gy === gy);
}
function decorMask(it) {          // N=1 E=2 S=4 W=8 same-kind neighbours
  const same = (gx, gy) => { const o = decorAt(gx, gy); return o && o.k === it.k; };
  return (same(it.gx, it.gy - 1) ? 1 : 0) | (same(it.gx + 1, it.gy) ? 2 : 0) |
         (same(it.gx, it.gy + 1) ? 4 : 0) | (same(it.gx - 1, it.gy) ? 8 : 0);
}

  const d = D[k];

  payCost(d.cost);
  const it = { k, gx, gy };
  decor.push(it);
  decorMap.set(DKEY(gx, gy), it);
  if (d.path) pathsLaid++;
  if (d.path || d.flat) terrainDirty = true; else bgDirty = true;
  recomputeAnims();
  if (d.golden) {
    goldenPlaced++;
    pushEvent('golden');                        // v5b: residents WILL bring this up
    banners.push({ title: 'A ' + d.name + ' RISES!', sub: 'Pure gold, pure showing off. Magnificent!', t: 0, dur: 3.6, legendary: true });
    SFX.legendary();
    for (let i = 0; i < 12; i++) spawnP(tX(gx) + 16, tY(gy) + 8, SPR.spark[i % 2], { life: 1 });
  } else {
    SFX.place();
    for (let i = 0; i < 5; i++) spawnP(tX(gx) + 16, tY(gy) + 24, SPR.puff[1], { vy: -20, g: -8, life: 0.45 });
  }
  return true;
}
function removeDecor(it) {        // decorations always refund in full
  decor.splice(decor.indexOf(it), 1);
  decorMap.delete(DKEY(it.gx, it.gy));
  refund(D[it.k].cost);
  addFloat(tX(it.gx) + 16, tY(it.gy), 'REFUNDED!', '#7dff9a');
  SFX.remove();
  for (let i = 0; i < 4; i++) spawnP(tX(it.gx) + 16, tY(it.gy) + 16, SPR.puff[0], { life: 0.4 });
  if (D[it.k].path || D[it.k].flat) terrainDirty = true; else bgDirty = true;
  recomputeAnims();
  return true;
}

  for (const it of decor) {
    const d = D[it.k];
    if (d.path) g.drawImage(SPR.path[it.k][decorMask(it)], tX(it.gx), tY(it.gy));
    else if (d.flat) g.drawImage(SPR.dec[it.k], tX(it.gx), tY(it.gy));

}
function drawDecorItem(g, it) {   // bg decor (y-sorted with buildings/flora)
  const d = D[it.k];
  const s = d.conn ? (it.k === 'fence' ? SPR.fence16 : SPR.hedge16)[decorMask(it)] : SPR.dec[it.k];
  g.drawImage(s, tX(it.gx) + 16 - s.width / 2, tY(it.gy) + 32 - s.height);

/* ── v4b: the moon bake — deep space, starfield, Earth in the sky,
   silver regolith with baked craters. A wondrous OTHER place. ── */
function rebuildMoonTerrain() {
  const gr = tg.createLinearGradient(0, 0, 0, WORLD_H);
  gr.addColorStop(0, '#04060f'); gr.addColorStop(0.6, '#080b1a'); gr.addColorStop(1, '#0d1226');
  tg.fillStyle = gr; tg.fillRect(0, 0, WORLD_W, WORLD_H);

    if (isLandPx(x, y) || isLandPx(x, y + 8)) continue;
    tg.fillStyle = i % 6 ? 'rgba(255,255,255,0.75)' : 'rgba(160,210,255,0.9)';
    tg.fillRect(x, y, i % 4 ? 2 : 3, i % 4 ? 2 : 3);

  neb.addColorStop(0, 'rgba(120,80,220,0.13)'); neb.addColorStop(1, 'rgba(120,80,220,0)');
  tg.fillStyle = neb; tg.fillRect(0, 0, WORLD_W, 340);

     (the right space band is on screen at every camera position) */
  tg.drawImage(SPR.earthBall, WORLD_W - 122, 268);
  /* soft grey halo under the landmass so it floats IN space */
  const halo = tg.createRadialGradient(tX(MCX) + 16, tY(MCY) + 16, 80, tX(MCX) + 16, tY(MCY) + 16, 430);
  halo.addColorStop(0, 'rgba(170,180,200,0.10)'); halo.addColorStop(1, 'rgba(170,180,200,0)');
  tg.fillStyle = halo; tg.fillRect(0, 0, WORLD_W, WORLD_H);
  coast = [];                                    // no surf on the moon
  /* regolith tiles + rim edging */
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (!isLand(gx, gy)) continue;
    const x = tX(gx), y = tY(gy);
    const hv = hash2(gx * 3 + 1, gy * 5 + 2);
    tg.drawImage(SPR.moontile[hv < 0.16 ? 3 : (gx * 7 + gy * 13) % 3], x, y);
    tg.fillStyle = 'rgba(225,232,242,0.4)';

    if (!isLand(gx - 1, gy)) tg.fillRect(x, y, 3, 32);
    if (!isLand(gx + 1, gy)) tg.fillRect(x + 29, y, 3, 32);
  }
  /* big baked craters (never under the base centre) */
  for (let i = 0; i < 10; i++) {
    const gx = 3 + ((i * 11 + 5) % (GW - 6)), gy = 3 + ((i * 7 + 2) % (GH - 6));
    if (!isLand(gx, gy) || !isLand(gx + 1, gy) || !isLand(gx, gy + 1)) continue;
    if (Math.hypot(gx - (MCX - 6), gy - MCY) < 3.5) continue;   // spare the lander site
    tg.drawImage(SPR.crater[i % 2], tX(gx) - 8, tY(gy) - 4);
  }
  /* south cliff lip — the surface reads raised out of the void */
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (!isLand(gx, gy) || isLand(gx, gy + 1)) continue;
    const x = tX(gx), y = tY(gy);
    tg.fillStyle = '#9aa1ac'; tg.fillRect(x, y + 26, 32, 4);
    tg.fillStyle = '#4a505a'; tg.fillRect(x, y + 30, 32, 2);

  gr.addColorStop(0, '#2b7db8'); gr.addColorStop(1, '#175a92');
  tg.fillStyle = gr; tg.fillRect(0, 0, WORLD_W, WORLD_H);

    halo.addColorStop(0, 'rgba(120,215,255,0.13)'); halo.addColorStop(1, 'rgba(120,215,255,0)');

  };

  for (const il of settled) isleHalo(tX(il.gx) + 16, tY(il.gy) + 16, 220 + il.steps * 40);
  tg.fillStyle = 'rgba(10,50,90,0.25)';

    if (!isLandPx(x, y)) tg.fillRect(x, y, 14, 2);

    return false;

  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (isLand(gx, gy)) continue;
    if (nearLandR(gx, gy, 1)) {

  const vn = (x, y, sx, sy) => {

  };

  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (!isLand(gx, gy)) continue;

      if (!isLand(gx, gy + 1)) tg.fillRect(x, y + 27, 32, 5);
      if (!isLand(gx, gy - 1)) tg.fillRect(x, y, 32, 4);
      if (!isLand(gx - 1, gy)) tg.fillRect(x, y, 4, 32);

      /* occasional flowers / pebbles / tufts (deterministic per tile) */
      const d = hash2(gx * 3 + 1, gy * 5 + 2);
      const ox = 4 + Math.floor(hash2(gx + 9, gy + 4) * 18), oy = 4 + Math.floor(hash2(gx + 2, gy + 11) * 18);
      if (d < 0.06) tg.drawImage(SPR.flower[Math.floor(d * 66) % 4], x + ox, y + oy);
      else if (d < 0.09) tg.drawImage(SPR.pebble, x + ox, y + oy);
      else if (d < 0.16) tg.drawImage(SPR.tuft, x + ox, y + oy);

    if (!isLand(gx, gy) || isLand(gx, gy + 1)) continue;
    const x = tX(gx), y = tY(gy);

    tg.fillStyle = '#8a6538'; tg.fillRect(x, y + 30, 32, 2);

  drawWires(tg);                                 // v5a: the power grid's wire runs
  bgDirty = true;
}

/* ═══════════════════════════════════════════════════════════════════════
   POOLS — particles / floaty texts / wire sparks (no per-frame allocation:
   fixed arrays, dead slots recycled).
   ═══════════════════════════════════════════════════════════════════════ */
const P_MAX = 48, parts = [];   // v4c: 96→48 — worst-case scenes stay well under the draw budget

    p.vx = o.vx !== undefined ? o.vx : (Math.random() - 0.5) * 60;
    p.vy = o.vy !== undefined ? o.vy : -40 - Math.random() * 40;

}
const F_MAX = 14, floats = [];
for (let i = 0; i < F_MAX; i++) floats.push({ on: false });

    sparkT = Math.max(0.07, 1.3 / wires.length);
    for (let tries = 0; tries < wires.length; tries++) {
      const w = wires[sparkRR++ % wires.length];
      if (!w.on) continue;
      for (let i = 0; i < K_MAX; i++) {
        if (sparks[i].on) continue;
        sparks[i].on = true; sparks[i].w = w; sparks[i].t = 0;
        tries = 99; break;
      }
      break;
    }
  }
  for (let i = 0; i < K_MAX; i++) {
    const s = sparks[i];
    if (!s.on) continue;
    s.t += dt * 2.4;
    if (s.t >= 1 || wires.indexOf(s.w) === -1) s.on = false;
  }

/* ═══════════════════════════════════════════════════════════════════════
   ECONOMY — fixed 1s tick. One shared global pool; placement never
   affects function. All numbers live in B / REQ_NEXT above.
   ═══════════════════════════════════════════════════════════════════════ */
/* counts span BOTH worlds — goals, wonders and pop are global */
const cnt = k => {
  let n = 0;
  for (const b of buildings) if (b.k === k) n++;
  if (otherWorld) for (const b of otherWorld.buildings) if (b.k === k) n++;
  return n;
};
function capPop() {
  let c = 2;
  for (const b of allB()) if (!b.rubble && B[b.k].pop) c += B[b.k].pop;
  return c;
}
function canAfford(cost) { for (const r in cost) if ((res[r] || 0) < cost[r]) return false; return true; }
function payCost(cost) { for (const r in cost) res[r] -= cost[r]; }
function refund(cost) { for (const r in cost) res[r] += cost[r]; }

function economyTick() {
  const wellBonus = cnt('well') > 0 ? 1.5 : 1;
  const mult = 1 + 0.1 * stars;                 // prestige bonus on ALL production
  /* v4a: TOWN islands boost their specialty producers 1.5x locally;
     each finished COLONY adds +10% to its specialty resource GLOBALLY
     (multiplicative with prestige) */
  const townSpec = {}, colonyMult = {};
  for (const il of settled) {
    if (il.lvl >= 3) townSpec[earthIsleAt(il.gx, il.gy)] = il.spec;
    if (il.lvl >= 4) colonyMult[il.spec] = (colonyMult[il.spec] || 1) * 1.1;
  }
  /* v4b: the tick spans BOTH worlds — production never stops while away */
  const every = allB();
  powerInc = 0; powerDem = 0;
  const inc = {};
  for (const b of every) {
    if (b.rubble) continue;                     // rubble makes nothing
    const d = B[b.k];
    if (d.prod && d.prod.power) powerInc += d.prod.power * mult;
    if (d.needPower && b.conn) powerDem += d.needPower;   // v5a: only the WIRED city draws
  }
  powerInc = Math.round(powerInc * 10) / 10;
  /* batteries: surplus charges them, deficit drains them before anything idles */
  battCap = every.reduce((n, b) => n + (!b.rubble && B[b.k].store ? B[b.k].store : 0), 0);
  battCharge = Math.min(battCharge, battCap);
  let avail = powerInc + battCharge;
  const sorted = every.sort((a, b2) => a.seq - b2.seq);
  for (const b of sorted) {
    const d = B[b.k];
    b.idle = null;
    if (b.rubble) continue;
    if (d.needPower) {
      if (!b.conn) { b.powered = false; b.idle = 'plug'; continue; }   // v5a: wire it in! (🔌)
      if (avail >= d.needPower) { avail -= d.needPower; b.powered = true; }
      else { b.powered = false; b.idle = 'power'; continue; }          // wired, grid too small (⚡)
    }
    if (d.cons) {
      let ok = true;
      for (const r in d.cons) if ((res[r] || 0) < d.cons[r]) ok = false;
      if (!ok) { b.idle = 'input'; continue; }
      for (const r in d.cons) { res[r] -= d.cons[r]; inc[r] = (inc[r] || 0) - d.cons[r]; }
    }
    if (d.prod) for (const r in d.prod) {
      if (r === 'power') continue;
      let amt = d.prod[r] * mult;
      if (b.k === 'farm') amt *= wellBonus;
      const ts = d.moon ? null : townSpec[earthIsleAt(b.gx, b.gy)];   // colonies are an Earth thing
      if (ts && SPEC_B[ts] === b.k) amt *= 1.5;  // golden TOWN producer
      if (colonyMult[r]) amt *= colonyMult[r];   // global COLONY bonus
      res[r] += amt; inc[r] = (inc[r] || 0) + amt;
      if (r === 'metal') life.metal += amt;
      if (r === 'parts') life.parts += amt;
      if (r === 'science') life.science += amt;
      if (r === 'regolith') life.regolith += amt;
      if (r === 'ice') life.ice += amt;
    }
  }
  /* population eats (age 2+); never dies — growth just pauses */
  const eat = age >= 2 ? pop * 0.05 : 0;
  const before = res.food;
  res.food = Math.max(0, res.food - eat);
  hungry = age >= 2 && res.food <= 0 && eat > 0 && (inc.food || 0) <= eat;
  inc.food = (inc.food || 0) - Math.min(eat, before);
  const cap = capPop();
  if (popF < cap && (age < 2 || !hungry)) popF = Math.min(cap, popF + 0.5);
  pop = Math.floor(popF);
  if (pop > best) { best = pop; lsSet('islandforge_best', '' + best); }
  /* max-age growth: at Age 7 every +25 pop past the last growth adds land
     (Earth-only; while on the moon it politely waits for your return) */
  if (age >= 7 && !islandFull && !loading && world === 'earth' && !travel) {
    if (!growNextPop) growNextPop = pop + 25;
    else if (pop >= growNextPop && growIsland()) growNextPop = pop + 25;
  }
  battCharge = clamp(avail, 0, battCap);      // leftovers charge the batteries
  rates = inc; rates.power = powerInc - powerDem;
  const nowPowered = powerInc > 0;
  if (nowPowered !== islandPowered) {
    islandPowered = nowPowered;
    bgDirty = true;
    if (otherWorld) otherWorld.bgDirty = true;  // lit windows in both worlds
    if (nowPowered && !firstPowerDone) {
      firstPowerDone = true;
      banners.push({ title: 'POWER ONLINE!', sub: 'The island comes alive!', t: 0, dur: 2.6 });
      SFX.power();
    }
  }
  /* mystery crate — every 4–6 minutes of active play */
  if (!crate && scene === 'play') {
    crateT -= 1;
    if (crateT <= 0) spawnCrate();
  }
  /* goals — one active goal, reward crate washes ashore */
  if (!loading && goalI < GOALS.length && GOALS[goalI].ok()) {
    banners.push({ title: 'GOAL DONE!', sub: GOALS[goalI].t + ' — a reward crate washed ashore!', t: 0, dur: 3, legendary: true });
    SFX.fanfare();
    goalI++;
    if (!crate) spawnCrate();
    else crateT = Math.min(crateT, 5);
  }
  /* v4a: colony ladders — one level-up per tick (staged celebrations).
     Earth-only machinery: while on the moon it simply waits. */
  if (!loading && world === 'earth') {
    for (const il of settled)
      if (colonyReady(il)) { colonyLevelUp(il); break; }
    refreshColonyChecks();                       // keep HUD checklists live
  }
  /* age advancement (5 → 6 happens via the rocket instead) */
  const rq = REQ_NEXT[age];
  if (rq && rq.ok()) ageUp();
}
function skipSatisfiedGoals() { while (goalI < GOALS.length && GOALS[goalI].ok()) goalI++; }

function ageUp() {
  if (age >= 7) return;
  age++;
  banners.push({ title: 'AGE ' + age + ' — ' + AGE_NAMES[age] + '!', sub: AGE_SUBS[age], t: 0, dur: 3.4 });
  SFX.fanfare();
  /* every settled island grows its own ring, from its own centre */
  for (const il of settled) {
    if (il.steps >= ISLE_STEP_MAX) continue;
    il.steps++;
    carveIsle(il, il.steps, age);
  }
  recomputeIsleIds();
  scatterFlora(age);
  for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) {
    if (landAge[gy][gx] === age && hash2(gx + age, gy) < 0.4)
      spawnP(tX(gx) + 16, tY(gy) + 16, SPR.spark[0], { vy: -30, g: 0, life: 1.2 });
  }
  camPanTo(tX(CX) + 16, tY(CYG) + 16, 2.2);     // watch the home island bloom
  if (age === 7) {                              // v4b: the moon is a real place now
    banners.push({ title: 'THE MOON AWAITS!', sub: 'Build a MOON ROCKET at your launch pad!', t: 0, dur: 3.8, legendary: true });
    const pad = buildings.find(b2 => b2.k === 'launchpad');
    if (pad) camPanTo(tX(pad.gx) + 32, tY(pad.gy) + 20, 2.6);

  refreshColonyChecks(); refreshFerries();      // new rings can reshape lanes/components
  recomputePower(); recomputeAnims();
  terrainDirty = true;
  saveGame();
}

  for (let dy = 0; dy < s; dy++) for (let dx = 0; dx < s; dx++) {
    if (!tileBuildable(gx + dx, gy + dy)) return false;
    /* coastal buildings (seaport) NEED a beach tile; everything else avoids

    res.wood += 20;

/* ── robots & drakes ── */
function spawnRobot(x, y, gold) {

/* v4d: one robot per target — a robot's `targ` IS its reservation; it clears

function targReserved(r, t) {

  return false;
}
function updateRobot(r, dt) {
  /* drop finished / invalid targets (flora harvested/napping, rubble repaired,

  if (r.targ && (r.targ.k ? (!r.targ.rubble || r.targ.packed) : (r.targ.gone || r.targ.sleepT > 0))) r.targ = null;
  if (!r.targ) {
    r.seekT = (r.seekT || 0) - dt;               // gentle rescan pace when idle
    if (r.seekT > 0) return;
    /* robots stay on their own island — never chase targets across water */
    const home = isleIdAt(Math.floor(r.x / TILE), Math.floor((r.y - GY0) / TILE));
    let bd = 1e9;
    for (const b of buildings) {                // rubble first — robots love fixing
      if (!b.rubble || b.packed) continue;
      if (home && isleIdAt(b.gx, b.gy) !== home) continue;
      if (targReserved(r, b)) continue;         // v4d: someone's already on it
      const s = B[b.k].size || 1;
      const d = Math.hypot(tX(b.gx) + s * 16 - r.x, tY(b.gy) + s * 16 - r.y);
      if (d < bd) { bd = d; r.targ = b; }
    }
    if (!r.targ) for (const f of flora) {
      if (f.gone || f.sleepT > 0) continue;     // v4d: napping treasure trees rest
      if (home && isleIdAt(f.gx, f.gy) !== home) continue;
      if (targReserved(r, f)) continue;         // v4d: spread out, little buddies
      const d = Math.hypot(tX(f.gx) + 16 - r.x, tY(f.gy) + 24 - r.y);
      if (d < bd) { bd = d; r.targ = f; }
    }
    if (!r.targ) { r.seekT = 0.4; return; }
  }
  if (r.targ) {
    const s2 = r.targ.k ? (B[r.targ.k].size || 1) : 1;
    const tx2 = tX(r.targ.gx) + s2 * 16, ty2 = tY(r.targ.gy) + s2 * 16 + (r.targ.k ? 4 : 10);
    const d = Math.hypot(tx2 - r.x, ty2 - r.y);
    if (d > 26) {
      const nx = r.x + (tx2 - r.x) / d * r.sp * dt, ny = r.y + (ty2 - r.y) / d * r.sp * dt;
      if (isLandPx(nx, ny)) { r.x = nx; r.y = ny; }
      else if (isLandPx(nx, r.y)) r.x = nx;
      else if (isLandPx(r.x, ny)) r.y = ny;
      else r.targ = null;
      r.frame += dt * 6;

    sgx = clamp(sgx + step * 2, 2, GW - 3);

/* ── recent-events ring buffer (persisted) ── */
function pushEvent(k) {
  recentEvents.push({ k, t: playtime });
  if (recentEvents.length > 8) recentEvents.shift();
}
function latestEvent() {
  for (let i = recentEvents.length - 1; i >= 0; i--)
    if (playtime - recentEvents[i].t < 180 && CONTEXT_LINES[recentEvents[i].k]) return recentEvents[i];
  return null;
}

/* ── interior sprites: mini resident avatars, the cat, speech bubble ── */
function initInteriorSprites() {
  /* resident avatar — same 12x16-unit language as the players; dirs [down, side] */
  const mkRes = (shirt, shirtD, hair, skin, o) => {
    o = o || {};
    const dirs = [];
    for (const d of [0, 2]) {
      dirs.push([0, 1, 2].map(f => S(12, 16, (g, P) => {
        shad(g, 12, 29, 7, 2.4);
        const step = f === 0 ? 0 : (f === 1 ? 1 : -1);
        const ty = o.small ? 2.6 : 0;            // CHIP is short
        P(3.4 + (step > 0 ? 0.8 : 0), 13, 2, 2.4, '#4a3018');
        P(6.6 + (step < 0 ? -0.8 : 0), 13, 2, 2.4, '#4a3018');
        P(3, 8 + ty * 0.6, 6, 5.4 - ty * 0.6, shirt);
        P(3, 8 + ty * 0.6, 1.4, 5.4 - ty * 0.6, shirtD);
        P(1.8, 8.6 + ty * 0.5, 1.4, 2.6 + (step ? 0.8 : 0), skin);
        P(8.8, 8.6 + ty * 0.5, 1.4, 2.6 - (step ? 0.8 : 0), skin);
        P(3, 2 + ty, 6, 6, skin);
        if (d === 0) {
          P(3, 1.4 + ty, 6, 2.6, hair); P(2.6, 2 + ty, 1, 3, hair); P(8.4, 2 + ty, 1, 3, hair);
          P(4.2, 5 + ty, 1.2, 1.4, '#2b2018'); P(6.6, 5 + ty, 1.2, 1.4, '#2b2018');
          P(5.2, 6.8 + ty, 1.6, 0.6, '#c9765a');
        } else {
          P(3, 1.4 + ty, 6, 2.6, hair); P(2.6, 2 + ty, 1, 4, hair);
          P(7, 5 + ty, 1.2, 1.4, '#2b2018');
        }
        if (o.hat) {                             // CHIP's enormous hat
          P(0.4, 1.8 + ty, 11.2, 1.8, o.hat);
          P(2.4, -0.4 + ty, 7.2, 2.6, o.hat);
          P(2.4, 1 + ty, 7.2, 0.9, o.band || '#8a6a20');
        }
      })));
    }
    return dirs;
  };
  const SHIRTS = [['#5ab46a', '#3f8a4e'], ['#c9a53a', '#9a7c28'], ['#8a6bd0', '#6a4fa8'],
                  ['#e0708a', '#b05468'], ['#4aa8c9', '#357a94'], ['#c96a3a', '#9a4e28'],
                  ['#7a8a99', '#5c6a77'], ['#d0c04a', '#a89838']];
  const HAIRS = ['#6e4526', '#2b2018', '#a86420', '#7a7a7a'];
  const SKINS = ['#f0c090', '#e8b07a', '#c98d5c'];
  SPR.resAv = SHIRTS.map((s, i) => mkRes(s[0], s[1], HAIRS[(i * 3 + 1) % 4], SKINS[i % 3]));
  SPR.miloAv = mkRes('#d54a3a', '#a83a2c', '#6e4526', '#f0c090');                       // MILO — red shirt
  SPR.chipAv = mkRes('#4aa8c9', '#357a94', '#2b2018', '#e8b07a',
                     { small: true, hat: '#c9a53a', band: '#8a6a20' });                 // CHIP — small, big hat
  /* the cabin cat — orange tabby, 2 tail-flick frames */
  SPR.cat = [0, 1].map(v => S(12, 9, (g, P) => {
    shad(g, 12, 16, 7, 2);
    P(2, 3.4, 6.4, 4, '#e8913a');
    P(2.6, 4.2, 5, 0.8, '#c9772a');
    P(7.4, 1.4, 3.4, 3.4, '#e8913a');
    P(7.6, 0.4, 1, 1.4, '#e8913a'); P(9.8, 0.4, 1, 1.4, '#e8913a');
    P(8.2, 2.6, 0.8, 0.8, '#2b2018'); P(9.6, 2.6, 0.8, 0.8, '#2b2018');
    P(8.9, 3.5, 0.9, 0.5, '#c9557a');
    P(2.6, 6.8, 1.2, 1.2, '#c9772a'); P(6.4, 6.8, 1.2, 1.2, '#c9772a');
    if (v) { P(0.4, 1.2, 1.4, 3, '#e8913a'); P(0.4, 1.2, 1.4, 0.8, '#c9772a'); }
    else { P(0.4, 3.6, 1.4, 3, '#e8913a'); P(0.4, 5.8, 1.4, 0.8, '#c9772a'); }
  }));
  /* speech bubble (3-slice stretch) + tail */
  SPR.bubP = (() => {
    const [c, g] = C(120, 44);
    g.fillStyle = 'rgba(10,25,40,0.35)'; rr(g, 3, 4, 116, 40, 12); g.fill();
    g.fillStyle = '#fdfaf2'; rr(g, 0, 0, 116, 40, 12); g.fill();
    g.strokeStyle = '#c9bfa8'; g.lineWidth = 2; rr(g, 1, 1, 114, 38, 11); g.stroke();
    return c;
  })();
  SPR.bubTail = S(6, 5, (g, P) => { P(1, 0, 4, 1.6, '#fdfaf2'); P(2, 1.6, 2.4, 1.6, '#fdfaf2'); P(2.8, 3.2, 1.2, 1.4, '#fdfaf2'); });
}

  const solids = [];

  const door = { x: IPW / 2 - 55, y: IPH - 54, w: 110, h: 44 };
  const out = { c, solids, door, spots: [], cat: null, flame: null, ding: null };
  const TH = {
    cabin:    { wall: '#7a5433', wallD: '#5f4226', floor: '#a8794a', floorD: '#96693e', trim: '#3f2c16' },
    bakery:   { wall: '#c9a172', wallD: '#a8825a', floor: '#e0c9a0', floorD: '#cdb488', trim: '#7a5230' },
    lab:      { wall: '#5c6670', wallD: '#4a525a', floor: '#aab4bd', floorD: '#98a2ab', trim: '#333b42' },
    factory:  { wall: '#6d6157', wallD: '#57493f', floor: '#8a8178', floorD: '#7a7168', trim: '#38312a' },
    moondome: { wall: '#aab6c4', wallD: '#8a96a4', floor: '#d5dce4', floorD: '#c2cbd6', trim: '#525d6a' },
    neontower:{ wall: '#2a2340', wallD: '#1e1930', floor: '#3a3352', floorD: '#312b47', trim: '#141022' },
  }[kind];
  /* shell: frame, back wall, floor, baseboard */
  g.fillStyle = TH.trim; g.fillRect(0, 0, IPW, IPH);
  g.fillStyle = TH.wallD; g.fillRect(10, 10, IPW - 20, IWALL - 10);
  g.fillStyle = TH.wall; g.fillRect(10, 10, IPW - 20, IWALL - 34);
  g.fillStyle = TH.floor; g.fillRect(10, IWALL, IPW - 20, IPH - IWALL - 10);
  g.fillStyle = 'rgba(0,0,0,0.22)'; g.fillRect(10, IWALL, IPW - 20, 8);
  /* floor pattern */
  if (kind === 'cabin' || kind === 'bakery') {
    g.fillStyle = 'rgba(0,0,0,0.13)';
    for (let y = IWALL + 26; y < IPH - 12; y += 26) g.fillRect(12, y, IPW - 24, 2);
    for (let i = 0; i < 40; i++) {
      const sx2 = 20 + ((i * 173 + 31) % (IPW - 80)), sy2 = IWALL + 4 + ((i * 97 + 13) % (IPH - IWALL - 30));
      g.fillRect(sx2, Math.floor((sy2 - IWALL) / 26) * 26 + IWALL + 4, 2, 20);
    }
  } else if (kind === 'lab' || kind === 'moondome') {
    g.fillStyle = 'rgba(0,0,0,0.1)';
    for (let y = IWALL + 48; y < IPH - 12; y += 48) g.fillRect(12, y, IPW - 24, 2);
    for (let x = 58; x < IPW - 12; x += 48) g.fillRect(x, IWALL + 2, 2, IPH - IWALL - 14);
  } else if (kind === 'factory') {
    g.fillStyle = 'rgba(0,0,0,0.14)';
    for (let y = IWALL + 78; y < IPH - 12; y += 78) g.fillRect(12, y, IPW - 24, 3);
    for (let x = 90; x < IPW - 12; x += 96) g.fillRect(x, IWALL + 2, 3, IPH - IWALL - 14);
    g.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 60; i++) g.fillRect(20 + ((i * 96) % (IPW - 44)), IWALL + 10 + 78 * ((i / 9) | 0) % (IPH - IWALL - 40), 3, 3);
  } else {                                       // neon lobby: glossy grid + magenta/cyan trim
    g.fillStyle = 'rgba(89,224,255,0.08)';

    g.fillStyle = '#59e0ff'; g.fillRect(10, IWALL - 4, IPW - 20, 3);
    g.fillStyle = '#f05ad0'; g.fillRect(10, IPH - 14, IPW - 20, 3);
  }
  /* side + top walkability guards */
  sol(0, 0, 28, IPH);
  sol(IPW - 28, 0, 28, IPH);

  return { x: (t.clientX - r.left) / r.width * W, y: (t.clientY - r.top) / r.height * H };
}
function tapAt(x, y) {
  if (scene === 'title') {
    if (confirmErase) {
      if (y > 380 && y < 450) { confirmErase.yes = x < W / 2; onBtn(0, 'south'); }
      else confirmErase = null;
      return;
    }
    for (let i = 0; i < 3; i++) {
      const cy2 = 268 + i * 116;
      if (x > W / 2 - 320 && x < W / 2 + 320 && y > cy2 && y < cy2 + 100) {
        if (slotSel === i) {
          if (slots[i] && x > W / 2 + 240) { confirmErase = { slot: i, yes: false }; SFX.ui(); }
          else onBtn(0, 'south');
        } else { slotSel = i; SFX.ui(); }
        return;
      }
    }
    return;
  }
  if (scene === 'name') {
    const n = nameSt;
    if (!n) return;
    const x0 = W / 2 - 330, y0 = 262;
    for (let r2 = 0; r2 < 3; r2++) for (let c2 = 0; c2 < 10; c2++) {
      if (x > x0 + c2 * 66 && x < x0 + c2 * 66 + 60 && y > y0 + r2 * 72 && y < y0 + r2 * 72 + 62) {
        n.r = r2; n.c = c2; onBtn(0, 'south'); return;
      }
    }
    const sy = y0 + 3 * 72;
    for (let c2 = 0; c2 < 3; c2++) {
      if (x > x0 + c2 * 224 && x < x0 + c2 * 224 + 208 && y > sy && y < sy + 62) {
        n.r = 3; n.c = c2; onBtn(0, 'south'); return;
      }
    }
    return;
  }
  /* play */
  if (modal) { onBtn(0, 'south'); return; }
  if (confirmPrestige) {
    if (y > 380 && y < 460) { confirmPrestige.yes = x < W / 2; onBtn(0, 'south'); }
    else { confirmPrestige = null; SFX.cancel(); }
    return;
  }
  if (rocketSeq || gateSeq || travelCin()) return;
  if (paused) {
    const opts = pauseOptions();
    const py = H / 2 - 130;
    for (let i = 0; i < opts.length; i++) {
      if (y > py + 80 + i * 52 && y < py + 80 + (i + 1) * 52 && x > W / 2 - 180 && x < W / 2 + 180) {
        pauseIdx = i; onBtn(0, 'south'); return;
      }
    }
    paused = false;
    return;
  }
  if (statsOpen) { statsOpen = false; SFX.ui(); return; }
  const p = players[0];
  if (!p || p.aboard) return;                   // aboard: tbB (○) hops out
  if (p.mode === 'cannon') return;              // v4c: dedicated ◀ ▶ PWR FIRE buttons drive it
  if (interior && p.inside) {                   // v5b: taps land in room space
    const rx = x - IPX, ry = y - IPY;
    if (rx < 0 || ry < 0 || rx > IPW || ry > IPH) return;
    const dm = interior.door;
    if (rx > dm.x && rx < dm.x + dm.w && ry > dm.y - 10) { exitInterior(p); return; }
    const r = interior.residents.find(r2 => Math.hypot(r2.x - rx, (r2.y - 30) - ry) < 44);
    if (r && Math.hypot(r.x - p.ix, r.y - p.iy) < 58) { talkToResident(p, r); return; }
    if (interior.cat && Math.hypot(interior.cat.x - rx, interior.cat.y - ry) < 40 &&
        Math.hypot(interior.cat.x - p.ix, interior.cat.y - p.iy) < 52) { petCatDo(p); return; }
    p.itarget = { x: clamp(rx, 42, IPW - 42), y: clamp(ry, IWALL + 16, IPH - 24) };
    return;
  }
  const wx = x + camX, wy = y + camY;           // tap → world coords through the camera
  if (p.mode === 'boatmenu') {
    const y0 = H - 114;
    if (y > y0 && y < y0 + 106) { onBtn(0, 'south'); return; }
    p.mode = 'walk'; SFX.cancel();
    return;
  }
  if (p.mode === 'settle') {
    if (y > 44) p.target = { x: clamp(wx, 8, WORLD_W - 8), y: clamp(wy, GY0 + 8, WORLD_H - 8) };
    return;
  }
  if (p.mode === 'menu') {
    const items = stripItems(p);
    const pw = Math.min(1240, items.length * 100 + 24);
    const x0 = W / 2 - pw / 2, y0 = H - 114;
    if (y > y0 && y < y0 + 106) {
      const i = Math.floor((x - x0 - 12) / 100);
      if (i >= 0 && i < items.length) {
        if (p.menuI === i) onBtn(0, 'south');
        else { p.menuI = i; SFX.ui(); }
      }
      return;
    }
    p.mode = 'walk'; SFX.cancel();
    return;
  }
  if (p.mode === 'place' || p.mode === 'remove') {
    if (y > 44) {
      const s = p.placeK && p.mode === 'place' ? (B[p.placeK].size || 1) : 1;
      p.ghost = { gx: clamp(Math.floor(wx / TILE), 0, GW - s), gy: clamp(Math.floor((wy - GY0) / TILE), 0, GH - s) };
      SFX.ui();
    }
    return;
  }
  if (y > 44) {
    /* v5b: tapping an enterable building walks to its door and steps in */
    const tgx = Math.floor(wx / TILE), tgy = Math.floor((wy - GY0) / TILE);
    const tb = occ[tgy] && occ[tgy][tgx];
    if (tb && ENTERABLE[tb.k] && !tb.rubble && !p.boat && enterAllowed()) {
      const ts = B[tb.k].size || 1;
      if (nearDoorB(p) === tb) { enterInterior(p, tb); return; }
      p.target = { x: tX(tb.gx) + ts * 16, y: tY(tb.gy) + ts * 32 + 14 };
      p.enterB = tb;
      return;
    }
    p.target = { x: clamp(wx, 8, WORLD_W - 8), y: clamp(wy, GY0 + 8, WORLD_H - 8) };
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   RENDER — per-frame hot path is drawImage + transforms + fillText only.
   Static world = 1 drawImage of bgC.
   ═══════════════════════════════════════════════════════════════════════ */
function txt(s, x, y, size, color, align, weight) {
  ctx.font = (weight || 700) + ' ' + size + 'px Verdana, sans-serif';
  ctx.textAlign = align || 'left';
  ctx.fillStyle = color || '#fff';
  ctx.fillText(s, x, y);
}
function otxt(s, x, y, size, color, align) {
  ctx.font = '900 ' + size + 'px Verdana, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.fillStyle = 'rgba(10,25,40,0.85)';
  ctx.fillText(s, x + Math.max(1, size / 14), y + Math.max(1, size / 14));
  ctx.fillStyle = color;
  ctx.fillText(s, x, y);
}
function drawFit(s, cx2, cy2, mw, mh) {
  const sc = Math.min(mw / s.width, mh / s.height);
  ctx.drawImage(s, cx2 - s.width * sc / 2, cy2 - s.height * sc / 2, s.width * sc, s.height * sc);
}
function extraSprites() {
  SPR.dim = (() => { const [c, g] = C(W, H); g.fillStyle = 'rgba(5,14,24,0.62)'; g.fillRect(0, 0, W, H); return c; })();
  SPR.iconRemove = S(11, 11, (g, P) => {
    g.fillStyle = '#e05a3a'; g.beginPath(); g.arc(11, 11, 10, 0, 6.3); g.fill();
    g.strokeStyle = '#fff'; g.lineWidth = 4; g.lineCap = 'round';
    g.beginPath(); g.moveTo(6, 6); g.lineTo(16, 16); g.moveTo(16, 6); g.lineTo(6, 16); g.stroke();
  });
}

/* ── edge arrows: pulsing pointers to off-screen events (pooled, 1/type) ── */
function updateArrows() {
  let n = 0;
  const put = (x, y, spr, type) => {
    if (n >= edgeArrows.length || onCam(x, y, -8)) return;
    const dx = x - (camRX + W / 2), dy = y - (camRY + H / 2);
    const s = Math.min((W / 2 - 34) / Math.abs(dx || 0.001), (H / 2 - 34) / Math.abs(dy || 0.001));
    const a = edgeArrows[n++];
    a.on = true; a.type = type; a.spr = spr;
    a.x = W / 2 + dx * s;
    a.y = clamp(H / 2 + dy * s, 72, H - 34);     // keep clear of the HUD bar
    a.ang = Math.atan2(dy, dx);
  };
  if (scene === 'play')                          // v4c: track a ball that flew off-screen
    for (const bl of balls) if (bl.on) { put(bl.x, bl.y - bl.h, SPR.arrowB, 'ball'); break; }
  if (scene === 'play' && world === 'earth') {
    if (disaster) {
      const t = disaster.targets.find(t2 => !t2.done) || disaster.targets[0];
      if (t && !(t.done && disaster.phase !== 'warn')) put(t.x, t.y, SPR.arrowD, 'disaster');
    }
    if (crate && !crate.opening) put(tX(crate.gx) + 16, tY(crate.gy) + 12, SPR.arrowC, 'crate');
    if (egg) put(egg.x, egg.y, SPR.arrowE, 'egg');
  } else if (scene === 'play') {
    /* moon: never lose the base — point home to the port (or lander) */
    const tb = buildings.find(b => b.k === 'moonport') || buildings.find(b => b.k === 'lander');
    if (tb && !travelCin()) put(tX(tb.gx) + 32, tY(tb.gy) + 32, SPR.arrowC, 'base');
  }
  for (let i = n; i < edgeArrows.length; i++) edgeArrows[i].on = false;
}
function drawArrows() {
  updateArrows();
  const pulse = 1 + 0.14 * Math.sin(T * 6);
  for (const a of edgeArrows) {
    if (!a.on) continue;
    ctx.translate(a.x, a.y);
    ctx.rotate(a.ang);
    ctx.scale(pulse, pulse);
    ctx.drawImage(a.spr, -20, -20);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
}
