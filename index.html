let camRX = 0, camRY = 0;                        // rounded camera used this frame
const onCam = (x, y, m) => x > camRX - m && x < camRX + W + m && y > camRY - m && y < camRY + H + m;
function reTx() {                                // restore shake+camera after setTransform
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.translate(shakeX - camRX, shakeY - camRY);
}
function renderPlay() {
  if (terrainDirty) rebuildTerrain();
  if (bgDirty) rebuildBG();
  camRX = Math.round(camX); camRY = Math.round(camY);
  shakeX = shakeAmt > 0.2 ? (Math.random() - 0.5) * shakeAmt * 2 : 0;
  shakeY = shakeAmt > 0.2 ? (Math.random() - 0.5) * shakeAmt * 2 : 0;
  ctx.save();
  ctx.translate(shakeX - camRX, shakeY - camRY);
  /* ONE source-rect blit of the visible world window */
  ctx.drawImage(bgC, camRX, camRY, W, H, camRX, camRY, W, H);

  /* v5a: placement aid — connected/powered tiles glow while placing a
     power-hungry building or a pole (ONE scaled blit of a ¼-res bake) */
  if (players.some(p2 => p2.mode === 'place' && p2.placeK && B[p2.placeK] &&
      (B[p2.placeK].needPower || B[p2.placeK].pole))) {
    if (glowDirty) rebuildPowGlow();
    ctx.globalAlpha = 0.6 + 0.2 * Math.sin(T * 3.2);
    ctx.drawImage(powGlowC, camRX / 4, camRY / 4, W / 4, H / 4, camRX, camRY, W, H);
    ctx.globalAlpha = 1;
  }

  /* ocean sparkles along the coast (culled to the window) */
  const nspark = Math.min(26, coast.length);
  for (let i = 0, drawn = 0; i < nspark && drawn < 7; i++) {
    const c = coast[(i * 43) % coast.length];
    if (!onCam(c.x, c.y, 0)) continue;
    drawn++;
    ctx.globalAlpha = 0.25 + 0.3 * Math.sin(T * 2.4 + i * 2.1);
    ctx.drawImage(SPR.sparkB[i % 2], c.x - 5 + ((i * 13) % 11), c.y - 5 + ((i * 7) % 9));
  }
  ctx.globalAlpha = 1;

  /* v5a: blue sparks gliding along powered wires (quadratic point = math only) */
  for (let i = 0; i < K_MAX; i++) {
    const s = sparks[i];
    if (!s.on) continue;
    const w = s.w, t = s.t, mx = (w.x0 + w.x1) / 2, my = (w.y0 + w.y1) / 2 + 5;
    const u = 1 - t;
    const x = u * u * w.x0 + 2 * u * t * mx + t * t * w.x1;
    const y = u * u * w.y0 + 2 * u * t * my + t * t * w.y1;
    if (!onCam(x, y, 16)) continue;
    ctx.drawImage(SPR.arc[(((T * 12) | 0) + i) % 2], x - 7, y - 7);
  }

  /* v4b: boarding zone — pulsing ring + standing rocket at the pad */
  const bZone = boardingPad();
  if (bZone && (!travel || travel.phase === 'board')) {
    const zp = 1 + 0.06 * Math.sin(T * 4);
    if (onCam(bZone.cx, bZone.cy, 80)) {
      ctx.globalAlpha = 0.75 + 0.25 * Math.sin(T * 4);
      ctx.translate(bZone.cx, bZone.cy);
      ctx.scale(zp, zp);
      ctx.drawImage(SPR.zoneRing, -48, -48);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.translate(shakeX - camRX, shakeY - camRY);
      ctx.globalAlpha = 1;
    }
  }

  /* animated building overlays */
  for (const a of anims) {
    if (a.b && a.b.rubble) continue;
    if (!onCam(a.x, a.y, 64)) continue;
    switch (a.t) {
      case 'flame': {
        const f = SPR.flame[((T * 9) | 0) % 3];
        ctx.drawImage(f, a.x - 4, a.y + 2 - ((T * 9 | 0) % 3 === 1 ? 2 : 0));
        break;
      }
      case 'furnace':
        ctx.globalAlpha = 0.55 + 0.3 * Math.sin(T * 7 + a.x);
        ctx.drawImage(SPR.fglow[((T * 6) | 0) % 2], a.x - 9, a.y - 9);
        ctx.globalAlpha = 1;
        break;
      case 'blades': case 'bladesBig': {
        const s = a.t === 'blades' ? SPR.blades : SPR.bladesBig;
        const hw = s.width / 2;
        ctx.translate(a.x, a.y);
        ctx.rotate(T * a.sp);
        ctx.drawImage(s, -hw, -hw);
        reTx();
        break;
      }
      case 'gear':
        ctx.translate(a.x, a.y);
        ctx.rotate(T * 1.3);
        ctx.drawImage(SPR.gear, -8, -8);
        reTx();
        break;
      case 'bglow':
        if (islandPowered) {
          /* glow brightness tracks actual stored charge; pulse speed shows charging vs supplying */
          const frac = battCap > 0 ? battCharge / battCap : 0;
          ctx.globalAlpha = (0.14 + 0.6 * frac) + 0.18 * Math.sin(T * (powerInc > powerDem ? 3 : 7) + a.x);
          ctx.drawImage(SPR.bglow, a.x - 10, a.y - 6);
          ctx.globalAlpha = 1;
        }
        break;
      case 'glint': {
        const ph = (T * 0.35 + a.cool) % 1;
        if (ph < 0.16) ctx.drawImage(SPR.glint, a.x + ph * 110, a.y + ph * 26);
        break;
      }
      case 'barrel': {                           // v4c: the cannon's live barrel
        const cb = a.b;
        const rec = (cb.recoil || 0) * 5;
        ctx.translate(a.x, a.y);
        ctx.rotate(-(cb.ang || 90) * Math.PI / 180);
        ctx.drawImage(SPR.cannonBarrel, -7 - rec, -8);
        reTx();
        break;
      }
      /* age 6 neon + age 7 moon overlays (1 drawImage each) */
      case 'beacon':
        ctx.globalAlpha = 0.4 + 0.4 * Math.sin(T * 4 + a.x);
        ctx.drawImage(a.m ? SPR.beaconM : SPR.beaconC, a.x - 6, a.y - 6);
        ctx.globalAlpha = 1;
        break;
      case 'holo': {
        const fl = Math.sin(T * 11 + a.x) + Math.sin(T * 23);
        ctx.globalAlpha = fl > 1.2 ? 0.16 : 0.32 + 0.12 * Math.sin(T * 5 + a.x);
        const s = SPR.bLit.holotree;
        ctx.drawImage(s, a.x, a.y - s.height);
        ctx.globalAlpha = 1;
        break;
      }
      case 'arm':
        ctx.translate(a.x, a.y);
        ctx.rotate(Math.sin(T * 2.2 + a.x) * 0.7 - 0.6);
        ctx.drawImage(SPR.roboArm, -4, -4);
        reTx();
        break;
      case 'fusion': {
        const pu = 0.5 + 0.5 * Math.sin(T * 3.2 + a.x);
        ctx.globalAlpha = 0.35 + 0.4 * pu;
        const sz = 20 + pu * 10;
        ctx.drawImage(SPR.fusionGlow, a.x - sz / 2, a.y - sz / 2, sz, sz);
        ctx.globalAlpha = 1;
        break;
      }
      case 'rain':
        ctx.globalAlpha = 0.85;
        ctx.drawImage(SPR.rain[((T * 5) | 0) % 2], a.x, a.y);
        ctx.globalAlpha = 1;
        break;
      case 'portal':
        if (legends) {
          ctx.globalAlpha = 0.3 + 0.25 * Math.sin(T * 2.6);
          ctx.drawImage(SPR.gateBeam, a.x - 45, a.y - 45, 90, 90);
          ctx.globalAlpha = 1;
        }
        break;
      case 'landerGlow':                         // the lander's warm shelter light
        ctx.globalAlpha = 0.22 + 0.08 * Math.sin(T * 1.8);
        ctx.drawImage(SPR.landerGlow, a.x - 52, a.y - 52);
        ctx.globalAlpha = 1;
        break;
      /* v5a: decoration overlays */
      case 'flag':                               // waving cloth, seeded colour
        ctx.drawImage(SPR.flagCloth[a.ci][((T * 5 + a.ci) | 0) % 2], a.x, a.y + Math.sin(T * 4 + a.ci) * 0.8);
        break;
      case 'lamp':                               // warm glow when the island has power
        if (islandPowered) {
          ctx.globalAlpha = 0.5 + 0.14 * Math.sin(T * 2.4 + a.x);
          ctx.drawImage(SPR.lampGlow, a.x - 15, a.y - 15);
          ctx.globalAlpha = 1;
        }
        break;
    }
  }

  /* idle / hungry / rubble bubbles — gentle blink (also cheaper on the Pi) */
  const bob = Math.sin(T * 4) * 2;
  if (((T * 1.4) | 0) % 3 !== 2) for (const b of buildings) {
    if (!onCam(tX(b.gx), tY(b.gy), 64)) continue;
    if (b.rubble) ctx.drawImage(SPR.bubHungry, tX(b.gx) + 6, tY(b.gy) - 26 + bob);   // sad "!"
    else if (b.idle === 'plug') ctx.drawImage(SPR.bubPlug, tX(b.gx) + 6, tY(b.gy) - 26 + bob);  // v5a 🔌 wire me!
    else if (b.idle === 'power') ctx.drawImage(SPR.bubPower, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
    else if (b.idle === 'input') ctx.drawImage(SPR.bubHungry, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
    else if (hungry && b.k === 'cabin') ctx.drawImage(SPR.bubHungry, tX(b.gx) + 6, tY(b.gy) - 26 + bob);
  }

  /* crate + egg (Earth-side treasures) */
  if (world === 'earth' && crate && onCam(tX(crate.gx), tY(crate.gy), 64)) {
    const cbob = Math.sin(T * 3) * 2;
    const s = crate.opening ? SPR.crateOpen : SPR.crate;
    ctx.drawImage(s, tX(crate.gx) + 2, tY(crate.gy) + 26 - s.height + (crate.opening ? -Math.sin(crate.opening * 8) * 4 : cbob));
    ctx.drawImage(SPR.spark[((T * 5) | 0) % 2], tX(crate.gx) + 11, tY(crate.gy) - 14 + cbob);
  }
  if (world === 'earth' && egg && onCam(egg.x, egg.y, 48)) {
    ctx.drawImage(SPR.egg, egg.x - 8, egg.y - 18 + Math.sin(T * 6) * 1.5);
  }

  /* shaking flora (temporarily lifted out of the static bg) */
  for (const f of flora) if (!f.gone && f.shakeT > 0 && onCam(tX(f.gx), tY(f.gy), 64)) drawFlora(ctx, f, true);

  /* v4d: 💤 bubble bobbing over napping treasure trees (1 drawImage each, ≤ a couple exist) */
  for (const f of flora) {
    if (f.gone || !(f.sleepT > 0) || !onCam(tX(f.gx), tY(f.gy), 64)) continue;
    ctx.drawImage(SPR.bubZzz, tX(f.gx) + 14, tY(f.gy) - 32 + Math.sin(T * 2.6 + f.gx) * 2);
  }

  /* v4c: fizzle-wobbling buildings (lifted out of the bg, boinging side to side) */
  if (wobbleN > 0) for (const b of buildings) {
    if (!(b.wobT > 0) || !onCam(tX(b.gx), tY(b.gy), 64)) continue;
    const off = Math.sin(T * 26) * 3 * (b.wobT / 0.55);
    ctx.translate(off, 0);
    drawBuilding(ctx, b);
    reTx();
  }

  /* harvest / repair / sail / board target markers */
  for (const p of players) {
    if (p.mode !== 'walk' || p.aboard || p.inside) continue;
    if (p.boat) continue;
    const rb = nearRubble(p);
    if (rb) {
      const s2 = B[rb.k].size || 1;
      drawFit(SPR.mark, tX(rb.gx) + s2 * 16, tY(rb.gy) - 12 + bob, 16, 14);
      if (rb.packed) {                           // v4d: landlocked seaport
        otxt('THE SEA IS TOO FAR AWAY!', tX(rb.gx) + s2 * 16, tY(rb.gy) - 40, 12, '#ff9a8a');
        otxt('✕ TO PACK IT UP', tX(rb.gx) + s2 * 16, tY(rb.gy) - 24, 13, '#ffd24a');
      } else otxt('✕ FIX!', tX(rb.gx) + s2 * 16, tY(rb.gy) - 24, 13, '#7dff9a');
    } else if (world === 'moon') {
      /* v4b: lunar prompts — fuel at the port, mine rocks & ice */
      if (moonStage() === 3 && nearMoonPortB(p)) {
        const port = buildings.find(b2 => b2.k === 'moonport');
        if (port) otxt('✕ FUEL THE ROCKET!', tX(port.gx) + 32, tY(port.gy) - 14, 14, '#7dffe0');
      }
      const f = nearFlora(p);
      if (f) {
        drawFit(SPR.mark, tX(f.gx) + 16, tY(f.gy) - 12 + bob, 16, 14);
        otxt(f.type === 'ice' ? '✕ MINE ICE!' : '✕ MINE REGOLITH!', tX(f.gx) + 16, tY(f.gy) - 24, 12,
             f.type === 'ice' ? '#9fe8ff' : '#e0e6f0');
      }
    } else {
      const sp = nearSeaport(p);
      if (sp) otxt('✕ SET SAIL!', tX(sp.gx) + 16, tY(sp.gy) - 26, 13, '#8fd4ff');
      else if (p.moor && Math.hypot(p.moor.x - p.x, p.moor.y - p.y) < 64)
        otxt('✕ SAIL!', p.moor.x, p.moor.y - 26, 13, '#8fd4ff');
      const f = nearFlora(p);
      if (f) drawFit(SPR.mark, tX(f.gx) + 16, tY(f.gy) - 12 + bob, 16, 14);
    }
    const cnn = nearCannon(p);                   // v4c: manning prompt (both worlds)
    if (cnn) otxt('✕ MAN THE CANNON!', tX(cnn.gx) + 16, tY(cnn.gy) - 28 + bob, 13, '#ffd24a');
    const drB = nearDoorB(p);                    // v5b: enterable door (both worlds)
    if (drB && enterAllowed() && !cnn) {
      const ds = B[drB.k].size || 1;
      otxt('✕ GO INSIDE', tX(drB.gx) + ds * 16, tY(drB.gy) + ds * 32 + 30 + bob, 13, '#ffd1a1');
    }
    if (world === 'earth' && crate && Math.hypot(tX(crate.gx) + 16 - p.x, tY(crate.gy) + 12 - p.y) < 52)
      otxt('✕ OPEN!', tX(crate.gx) + 16, tY(crate.gy) - 24, 13, '#ffd24a');
    if (bZone && !p.aboard && Math.hypot(bZone.cx - p.x, bZone.cy - p.y) < 78)
      otxt('✕ BOARD THE ROCKET!', bZone.cx, bZone.cy - 96, 15, '#7dffe0');
  }

  /* ghosts under everything mobile (hidden during cinematics) */
  if (!rocketSeq && !gateSeq && !travelCin()) for (const p of players) {
    drawGhost(p);
    if (p.mode === 'cannon') drawCannonUI(p);   // v4c: pips + dotted arc preview
  }

  /* cosmetic cargo ferries — hull + tiny crate, ≤3 in the world, culled */
  for (let i = 0; i < ferries.length; i++) {
    const f = ferries[i];
    if (!onCam(f.x, f.y, 48)) continue;
    const fb = Math.sin(T * 3 + i * 2.1) * 1.6;
    if (f.dir * (f.x1 - f.x0) < 0) {
      ctx.translate(f.x, 0); ctx.scale(-1, 1);
      ctx.drawImage(SPR.boat, -19, f.y - 12 + fb);
      ctx.drawImage(SPR.crate, -7, f.y - 17 + fb, 14, 12);
      reTx();
    } else {
      ctx.drawImage(SPR.boat, f.x - 19, f.y - 12 + fb);
      ctx.drawImage(SPR.crate, f.x - 7, f.y - 17 + fb, 14, 12);
    }
  }

  /* robots, drakes, players (+ boats) */
  for (const r of robots) {
    if (!onCam(r.x, r.y, 48)) continue;
    ctx.drawImage((r.gold ? SPR.robotG : SPR.robot)[(r.frame | 0) % 2], r.x - 12, r.y - 26);
  }
  if (world === 'earth') for (const dr of drakes) {   // drakes never board — Earth pets
    if (!onCam(dr.x, dr.y, 48)) continue;
    ctx.drawImage((dr.blue ? SPR.drakeB : SPR.drake)[(dr.frame | 0) % 2], dr.x - 11, dr.y - 14 + Math.sin(T * 5 + (dr.blue ? 2 : 0)) * 2);
  }
  for (const p of players) {
    if (p.aboard || p.inside) continue;         // aboard/inside: drawn elsewhere
    if (p.moor && !p.boat && onCam(p.moor.x, p.moor.y, 48))     // the waiting dinghy
      ctx.drawImage(SPR.boat, p.moor.x - 19, p.moor.y - 12 + Math.sin(T * 3.2 + p.pi * 2) * 1.6);
    const bob2 = p.boat ? Math.sin(T * 3.2 + p.pi * 2) * 1.6 : 0;
    const frames = SPR.av[p.pi][p.boat ? 0 : p.dir];
    const spr2 = p.moving && !p.boat ? frames[1 + ((p.frame | 0) % 2)] : frames[0];
    if (p.flip && !p.boat) {
      ctx.translate(p.x, 0); ctx.scale(-1, 1);
      ctx.drawImage(spr2, -12, p.y - 30);
      reTx();
    } else ctx.drawImage(spr2, p.x - 12, p.y - (p.boat ? 34 : 30) + bob2);
    if (p.boat) {                                // hull drawn over the legs = sitting sailor
      if (p.flip) {
        ctx.translate(p.x, 0); ctx.scale(-1, 1);
        ctx.drawImage(SPR.boat, -19, p.y - 12 + bob2);
        reTx();
      } else ctx.drawImage(SPR.boat, p.x - 19, p.y - 12 + bob2);
    }
    if (players.length > 1) otxt('P' + (p.pi + 1), p.x, p.y - (p.boat ? 42 : 36), 10, p.pi ? '#ff9a8a' : '#8fd4ff');
  }

  /* v4c: bouncing energy balls (shadow on the ground, glow ball in the air) */
  for (const bl of balls) {
    if (!bl.on || !onCam(bl.x, bl.y, 64)) continue;
    ctx.drawImage(SPR.ballShad, bl.x - 7, bl.y - 4);
    if (bl.squash > 0.03) {                      // squash-and-stretch on the bounce
      ctx.translate(bl.x, bl.y - bl.h);
      ctx.scale(1 + bl.squash, 1 - bl.squash * 0.85);
      ctx.drawImage(SPR.eball, -10, -10);
      reTx();
    } else ctx.drawImage(SPR.eball, bl.x - 10, bl.y - bl.h - 10);
  }

  /* rocket sequence */
  if (rocketSeq) {
    const q = rocketSeq;
    const rx = tX(q.pad.gx) + 32 - 20, ry0 = tY(q.pad.gy) + 46 - 92;
    ctx.drawImage(SPR.rocket, rx, ry0 - q.ry);
    if (q.phase === 'lift') ctx.drawImage(SPR.rflame[((T * 14) | 0) % 2], rx + 8, ry0 - q.ry + 88);
    if (q.phase === 'count' && q.n > 0) otxt('' + q.n, camRX + W / 2, camRY + 300, 130, '#ffd24a');
    if (q.phase === 'lift' && q.t < 1) otxt('LIFTOFF!', camRX + W / 2, camRY + 300, 70, '#ff9a4a');
  } else if (rocketDone && world === 'earth') {
    const pad = buildings.find(b2 => b2.k === 'launchpad');
    if (pad) ctx.drawImage(SPR.star, tX(pad.gx) + 24, tY(pad.gy) + 18);
  }

  /* v4b: the MOON ROCKET — standing at the pad, boarding heads, ready pips */
  if (bZone && (!travel || travel.phase === 'board') && onCam(bZone.cx, bZone.cy, 160)) {
    const s3 = B[bZone.b.k].size || 1;
    const rx2 = tX(bZone.b.gx) + s3 * 16 - 20, ry2 = tY(bZone.b.gy) + 46 - 92;
    ctx.drawImage(SPR.rocket, rx2, ry2);
    for (const p2 of players)
      if (p2.aboard) ctx.drawImage(SPR.headAv[p2.pi], rx2 + 13 + p2.pi * 7, ry2 + 29);
    if (players.length > 1 && travel) {          // 2P: clear P1/P2 ready pips
      for (let i = 0; i < players.length; i++) {
        const px3 = tX(bZone.b.gx) + s3 * 16 - 26 + i * 36;
        ctx.drawImage(players[i].aboard ? SPR.pipOn : SPR.pipOff, px3, ry2 - 22);
        otxt('P' + (i + 1), px3 + 6, ry2 - 28, 11, i ? '#ff9a8a' : '#8fd4ff');
      }
      const waiting = players.find(p2 => !p2.aboard);
      if (waiting) otxt('P' + (waiting.pi + 1) + ': PRESS ✕ TO BOARD!', tX(bZone.b.gx) + s3 * 16, ry2 - 46, 15, '#ffd24a');
      else otxt('○ HOP OUT', tX(bZone.b.gx) + s3 * 16, ry2 - 46, 11, '#9fd4f0');
    } else if (travel && players.some(p2 => p2.aboard))
      otxt('○ HOP OUT', tX(bZone.b.gx) + s3 * 16, ry2 - 40, 11, '#9fd4f0');
  }
  /* parked (unfueled) return rocket during the survival arc */
  if (world === 'moon' && !moonReturnDone && !travel && !bZone) {
    const port = buildings.find(b2 => b2.k === 'moonport');
    const l = buildings.find(b2 => b2.k === 'lander');
    const at = port || l;
    if (at && onCam(tX(at.gx), tY(at.gy), 160)) {
      const gx3 = port ? at.gx : at.gx + 2;
      ctx.drawImage(SPR.rocket, tX(gx3) + 12, tY(at.gy) + 46 - 92);
    }
  }
  /* travel cinematic: countdown / lift-off / landing */
  if (travelCin() && travel.phase !== 'stars') {
    const st = travel.phase === 'land' ? travel.site : travel.srcSite;
    if (st) {
      const rx2 = tX(st.gx) + st.s * 16 - 20, ry2 = tY(st.gy) + 46 - 92;
      ctx.drawImage(SPR.rocket, rx2, ry2 - travel.ry);
      if (travel.phase !== 'count' && travel.ry > 3)
        ctx.drawImage(SPR.rflame[((T * 14) | 0) % 2], rx2 + 8, ry2 - travel.ry + 88);
      for (const p2 of players) ctx.drawImage(SPR.headAv[p2.pi], rx2 + 13 + p2.pi * 7, ry2 - travel.ry + 29);
      if (travel.phase === 'count' && travel.n > 0) otxt('' + travel.n, camRX + W / 2, camRY + 300, 130, '#7dffe0');
      if (travel.phase === 'lift' && travel.t < 1) otxt('LIFTOFF!', camRX + W / 2, camRY + 300, 70, '#ff9a4a');
    }
  }

  /* disaster overlays: warning flashes → projectiles → boom (Earth only) */
  if (disaster && world === 'earth') {
    const q = disaster;
    /* flashing warning markers on doomed tiles (kids see it coming) */
    for (const tg2 of q.targets) {
      if (tg2.done) continue;
      const s2 = B[tg2.b.k].size || 1;
      const flash = ((T * 5) | 0) % 2;
      for (let dy = 0; dy < s2; dy++) for (let dx = 0; dx < s2; dx++)
        ctx.drawImage(flash ? SPR.tileWarn : SPR.tileNO, tX(tg2.b.gx + dx), tY(tg2.b.gy + dy));
    }
    if (q.type === 'storm') {
      const ramp = q.phase === 'warn' ? clamp(q.t - 3.5, 0, 1) * 0.55
                                      : clamp(2.6 - q.t * 0.45, 0.15, 0.55);
      ctx.globalAlpha = ramp;
      ctx.drawImage(SPR.dim, camRX, camRY);            // screen-sized, pinned to the window
      ctx.globalAlpha = 1;
      if (q.phase === 'strike') for (const tg2 of q.targets) {
        const bt = q.t - tg2.delay;
        if (bt > -0.1 && bt < 0.18) {                  // bolt + white flash
          ctx.drawImage(SPR.bolt, tg2.x - 8, tg2.y - 160, 16, 160);
          ctx.globalAlpha = 0.5 * (1 - bt * 5);
          ctx.drawImage(SPR.flashW, camRX, camRY);
          ctx.globalAlpha = 1;
        }
      }
    } else if (q.type === 'meteor' && q.phase === 'strike') {
      for (const tg2 of q.targets) {
        if (tg2.defended) continue;                    // v4c: intercepted mid-air — no rock falls
        const ft = (q.t - tg2.delay) / 0.7;            // flight 0..1
        if (ft > 0 && ft < 1) {
          const mx2 = tg2.x + (1 - ft) * 420, my2 = tg2.y - (1 - ft) * 560;
          ctx.drawImage(SPR.flameP, mx2 + 6, my2 - 14);
          ctx.drawImage(SPR.flameP, mx2 + 14, my2 - 26);
          ctx.drawImage(SPR.meteorR, mx2 - 9, my2 - 9);
        }
      }
    } else if (q.type === 'pirates' && q.ship) {
      const sh = q.ship;
      ctx.drawImage(SPR.ship, sh.x - 26, sh.y - 30 + Math.sin(T * 1.8) * 3);
      if (q.phase === 'strike') for (const tg2 of q.targets) {
        const ft = (q.t - tg2.delay) / 1.1;
        if (ft > 0 && ft < 1) {
          const bx = sh.x + (tg2.x - sh.x) * ft;
          const by = sh.y + (tg2.y - sh.y) * ft - Math.sin(ft * Math.PI) * 130;
          ctx.drawImage(SPR.ball, bx - 3, by - 3);
        }
      }
    }
  }

  /* star gate cinematic */
  if (gateSeq) {
    const q = gateSeq;
    const gx2 = tX(q.b.gx) + 32, gy2 = tY(q.b.gy) + 30;
    for (let i = 0; i < q.ring; i++) {
      ctx.globalAlpha = 0.55 + 0.4 * Math.sin(T * 6 + i * 2);
      ctx.drawImage(SPR.gateGlow[i], gx2 - 25, gy2 - 25);
    }
    ctx.globalAlpha = 1;
    if (q.phase === 'portal' || q.phase === 'stars') {
      ctx.globalAlpha = q.phase === 'portal' ? 0.5 + 0.3 * Math.sin(T * 8) : 0.4;
      ctx.drawImage(SPR.gateBeam, gx2 - 70, gy2 - 70);
      ctx.globalAlpha = 1;
      if (q.phase === 'portal' && q.t < 0.5) {         // screen glow at ignition
        ctx.globalAlpha = 0.55 * (1 - q.t * 2);
        ctx.drawImage(SPR.flashW, camRX, camRY);
        ctx.globalAlpha = 1;
      }
    }
  }

  /* particles + floaty texts (culled) */
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (!p.on || !onCam(p.x, p.y, 32)) continue;
    if (p.fade) ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
    ctx.drawImage(p.spr, p.x - p.spr.width / 2, p.y - p.spr.height / 2);
  }
  ctx.globalAlpha = 1;
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (!f.on || !onCam(f.x, f.y, 64)) continue;
    ctx.globalAlpha = clamp(1.4 - f.t, 0, 1);
    let fx = f.x;
    if (f.icon && SPR.icon[f.icon]) { ctx.drawImage(SPR.icon[f.icon], f.x - 22, f.y - f.t * 34 - 14); fx = f.x + 2; }
    otxt(f.str, fx + (f.icon ? 12 : 0), f.y - f.t * 34, 15, f.color);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  /* v4b: star-field warp between the worlds (screen-space, all baked) */
  if (travel && (travel.phase === 'stars' ||
      (travel.phase === 'lift' && travel.t > 2.0) ||
      (travel.phase === 'land' && travel.t < 0.5))) {
    let al = 1;
    if (travel.phase === 'lift') al = (travel.t - 2.0) / 0.6;
    else if (travel.phase === 'land') al = 1 - travel.t * 2;
    ctx.globalAlpha = clamp(al, 0, 1);
    ctx.drawImage(SPR.warpBG, 0, 0);
    for (let i = 0; i < 16; i++) {               // rushing star streaks
      const sx2 = (i * 173 + 47) % W;
      const sy2 = ((i * 97 + T * (380 + i * 26)) % (H + 90)) - 45;
      ctx.drawImage(SPR.streak, sx2, sy2);
    }
    const wob = Math.sin(T * 3) * 6;
    ctx.drawImage(SPR.rocket, W / 2 - 30, H / 2 - 80 + wob, 60, 138);
    ctx.drawImage(SPR.rflame[((T * 14) | 0) % 2], W / 2 - 18 + 6.5, H / 2 + 52 + wob, 36, 60);
    if (travel.phase === 'stars')
      otxt(travel.dir === 'toMoon' ? 'TO THE MOON!' : 'HOMEWARD!', W / 2, 160, 44, '#7dffe0');
    ctx.globalAlpha = 1;
  }

  drawArrows();                                  // edge pointers so kids never lose an event
  drawHUD();
  if (interior) drawInterior();                  // v5b: the dollhouse panel over the dimmed world
  for (const p of players) {
    if (p.mode === 'menu') drawMenu(p, H - 114 - (p.pi ? 170 : 0));
    else if (p.mode === 'boatmenu') drawBoatMenu(p, H - 114 - (p.pi ? 170 : 0));
  }
  /* contextual hint line (touch users have DOM buttons in this corner) */
  if (!paused && !modal && !rocketSeq && !gateSeq && !travelCin() && !confirmPrestige && players[0] &&
      !(AC && AC.currentInputSource() === 'touch')) {
    const p0 = players[0];
    const m = p0.mode;
    let hint = '';
    if (p0.aboard) hint = '○/X HOP OUT';
    else if (p0.inside) hint = '✕/Z SAY HI · ○/X GO OUTSIDE';
    else if (m === 'walk') hint = p0.boat ? '✕/Z LAND NEARBY · □/C SETTLE MENU · △/V STATS'
                                     : world === 'moon' ? '✕/Z MINE · □/C BUILD · △/V STATS'
                                     : '✕/Z CHOP · □/C BUILD · △/V STATS';
    else if (m === 'cannon') hint = '◀ ▶ AIM · ▲ ▼ POWER · ✕ FIRE · ○ HOP OFF';
    else if (m === 'menu') hint = '◀ ▶ CHOOSE · L1/R1 HOP · □/C DECORATE · ✕ OK · ○ BACK';
    else if (m === 'boatmenu') hint = '✕ SETTLE ISLAND · ○ BACK';
    else if (m === 'settle') hint = 'SAIL TO OPEN WATER · ✕ RAISE THE ISLAND · ○ BACK';
    else if (m === 'place') hint = B[p0.placeK] && B[p0.placeK].coastal
        ? 'WALK TO A BEACH · ✕ PLACE · ○ BACK' : 'WALK TO A SPOT · ✕ PLACE · ○ BACK';
    else if (m === 'remove') hint = 'STAND ON A BUILDING · ✕ REMOVE · ○ BACK';
    txt(hint, 12, H - 12, 11, 'rgba(220,240,255,0.75)');
  }
  if (statsOpen) drawStats();
  if (paused) drawPause();
  if (modal) drawModal();
  if (confirmPrestige) drawPrestige();
  if (banners.length) drawBanner(banners[0]);
}

function render() {
  if (scene === 'title') renderTitle();
  else if (scene === 'name') renderName();
  else renderPlay();
}

/* ═══════════════════════════════════════════════════════════════════════
   UPDATE + MAIN LOOP
   ═══════════════════════════════════════════════════════════════════════ */
function updatePlay(dt) {
  if (banners.length) {
    banners[0].t += dt * (banners.length > 1 ? 2.4 : 1);   // queued banners drain fast
    if (banners[0].t > banners[0].dur) banners.shift();
  }
  if (paused || modal || confirmPrestige) return;
  playtime += dt;
  sessionT += dt;
  simAcc += dt;
  while (simAcc >= 1) { simAcc -= 1; economyTick(); }
  /* disasters — age 3+ only; the countdown only runs during eligible active play,
     so the 8-minute session warm-up and 6–10 min spacing come from disasterT itself */
  /* v4b: disasters are Earth-only and pause during travel (kid-proof) */
  if (disaster) { if (world === 'earth' && !travel) updateDisaster(dt); }
  else if (age >= 3 && world === 'earth' && !travel && !rocketSeq && !gateSeq && !banners.length && !anyRubble()) {
    disasterT -= dt;
    if (disasterT <= 0) startDisaster();
  }
  if (travel) updateTravel(dt);
  if (!rocketSeq && !gateSeq && !travelCin())
    for (const p of players) if (!p.aboard) updatePlayer(p, dt);
  if (interior) updateInterior(dt);              // v5b: residents wander, hearts float, elevators ding
  for (const r of robots) updateRobot(r, dt);
  if (world === 'earth')
    for (let i = 0; i < drakes.length; i++) updateDrake(drakes[i], i, dt);
  if (egg) {
    egg.t += dt;
    if (Math.random() < dt * 2) spawnP(egg.x, egg.y - 16, SPR.spark[1], { vy: -20, g: 0, life: 0.6 });
    if (egg.t > 20) {
      drakes.push({ x: egg.x, y: egg.y, frame: 0, blue: false });
      egg = null;
      banners.push({ title: 'IT HATCHED!', sub: 'A pet drake joins your family!', t: 0, dur: 3, legendary: true });
      SFX.hatch();
    }
  }
  /* party fireworks show (pure celebration + a tiny treasure trickle) */
  if (fwShow > 0) {
    fwShow -= dt; fwT -= dt;
    if (fwT <= 0) {
      fwT = 0.4;
      SFX.firework();
      const { x: fx, y: fy } = fwSpot();
      const spr = SPR.fw[(Math.random() * SPR.fw.length) | 0];
      for (let i = 0; i < 9; i++) {
        const a = i / 9 * 6.28, sp = 60 + Math.random() * 60;
        spawnP(fx, fy, spr, { vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 30, life: 1.1 });
      }
      res.wood += age; res.stone += age;
      if (age >= 2) res.food += age;
    }
  }
  /* v4a: colony-complete fireworks show over the island (pooled particles) */
  if (colonyFw) {
    colonyFw.t -= dt; colonyFw.cool -= dt;
    if (colonyFw.cool <= 0) {
      colonyFw.cool = 0.45;
      SFX.firework();
      const fx = colonyFw.x + (Math.random() - 0.5) * 260;
      const fy = colonyFw.y - 60 - Math.random() * 140;
      const spr = SPR.fw[(Math.random() * SPR.fw.length) | 0];
      for (let i = 0; i < 9; i++) {
        const a = i / 9 * 6.28, sp = 60 + Math.random() * 60;
        spawnP(fx, fy, spr, { vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 30, life: 1.1 });
      }
    }
    if (colonyFw.t <= 0) colonyFw = null;
  }
  if (crate) {
    crate.t += dt;
    if (crate.opening) {
      crate.opening += dt;
      if (crate.opening > 0.8) revealCrate();
    } else if (Math.random() < dt * 2.4) {
      spawnP(tX(crate.gx) + 16, tY(crate.gy) - 4, SPR.spark[0], { vy: -34, vx: (Math.random() - 0.5) * 20, g: 0, life: 0.8 });
    }
  }
  for (const f of flora) {
    if (f.gone) {
      f.regrowT -= dt;
      if (f.regrowT <= 0) {
        f.gone = false; f.hits = 0; bgDirty = true;
        spawnP(tX(f.gx) + 16, tY(f.gy) + 16, SPR.spark[0], { vy: -20, g: 0, life: 0.7 });
      }
    } else {
      if (f.sleepT > 0) {                        // v4d: napping treasure trees
        f.sleepT -= dt;
        if (f.sleepT <= 0) wakeFlora(f);         // wakes with a sparkle
      }
      if (f.shakeT > 0) {
        f.shakeT -= dt;
        if (f.shakeT <= 0) bgDirty = true;
      }
    }
  }
  /* ambient emitters (smoke / bubbles / auras) */
  for (const a of anims) {
    if (a.b && a.b.rubble) continue;            // rubble is quiet
    if (a.t === 'smoke') {
      a.cool -= dt;
      if (a.cool <= 0) {
        a.cool = a.soft ? 1.6 : 1.05 + Math.random() * 0.5;
        spawnP(a.x, a.y, (a.soft ? SPR.puff : SPR.puffDark)[(Math.random() * 2) | 0],
               { vx: 6 + Math.random() * 8, vy: -20 - Math.random() * 8, g: -8, life: 1.5 });
      }
    } else if (a.t === 'bubbles') {
      if (!a.b.idle) {
        a.cool -= dt;
        if (a.cool <= 0) { a.cool = 0.5 + Math.random() * 0.4; spawnP(a.x, a.y, SPR.sparkB[1], { vx: 0, vy: -26, g: 0, life: 0.7 }); }
      }
    } else if (a.t === 'aura') {
      a.cool -= dt;
      if (a.cool <= 0) {
        a.cool = 0.7 + Math.random() * 0.6;
        spawnP(a.x + (Math.random() - 0.5) * 26, a.y + Math.random() * 16,
               a.gold ? SPR.spark[0] : SPR.sparkB[0], { vx: 0, vy: -18, g: 0, life: 0.9 });
      }
    } else if (a.t === 'fount') {                // v5a: fountain water sparkle
      a.cool -= dt;
      if (a.cool <= 0) {
        a.cool = 0.5 + Math.random() * 0.35;
        spawnP(a.x + (Math.random() - 0.5) * 6, a.y - 14,
               a.gold ? SPR.spark[1] : SPR.sparkB[(Math.random() * 2) | 0],
               { vx: (Math.random() - 0.5) * 26, vy: -34, g: 90, life: 0.8 });
      }
    } else if (a.t === 'barrel') {               // v4c: recoil spring-back + fire cooldown
      if (a.b.recoil > 0) a.b.recoil = Math.max(0, a.b.recoil - dt * 2.6);
      if (a.b.cd > 0) a.b.cd -= dt;
    }
  }
  if (rocketSeq) updateRocket(dt);
  else if (gateSeq) updateGate(dt);
  else if (shakeAmt > 0) shakeAmt = Math.max(0, shakeAmt - dt * 8);
  updateCamera(dt);
  updateSparks(dt);
  updateFerries(dt);
  /* v4c: cannon balls, fizzle wobbles, manning safety + touch UI class */
  updateBalls(dt);
  if (wobbleN > 0) for (const b of buildings) {
    if (b.wobT > 0) {
      b.wobT -= dt;
      if (b.wobT <= 0) { b.wobT = 0; wobbleN--; bgDirty = true; }
    }
  }
  for (const p of players)                       // a disaster rubbled the manned cannon → hop off
    if (p.mode === 'cannon' && (!p.cannon || p.cannon.rubble || buildings.indexOf(p.cannon) < 0))
      unmanCannon(p);
  const man0 = !!(players[0] && players[0].mode === 'cannon');
  if (man0 !== bodyManning) {
    bodyManning = man0;
    document.body.classList.toggle('manning', man0);
  }
  /* pools */
  for (let i = 0; i < P_MAX; i++) {
    const p = parts[i];
    if (!p.on) continue;
    p.t += dt;
    if (p.t >= p.life) { p.on = false; continue; }
    p.vy += p.g * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  for (let i = 0; i < F_MAX; i++) {
    const f = floats[i];
    if (!f.on) continue;
    f.t += dt;
    if (f.t > 1.3) f.on = false;
  }
  autosaveT += dt;
  if (autosaveT > 10) { autosaveT = 0; saveGame(); }
}

let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min(((t - lastT) || 16.7) / 1000, 0.1);
  lastT = t;
  T += dt;
  musicTick();
  if (scene === 'play') updatePlay(dt);
  render();
}

/* ───── test hooks (used by the CI harness; harmless to ship) ───── */
window.__test = {
  _spr: SPR,

  setPop(n) { popF = n; pop = n; },
  crate() { if (!crate) spawnCrate(); return crate ? { gx: crate.gx, gy: crate.gy } : null; },

  walkTo(x, y) { if (players[0]) players[0].target = { x, y }; },

  arrived() { return !players[0] || !players[0].target; },
  flora() { return flora.filter(f => !f.gone).map(f => ({ type: f.type, x: tX(f.gx) + 16, y: tY(f.gy) + 20,
                                                          gx: f.gx, gy: f.gy, hits: f.hits, golden: !!f.golden, rainbow: !!f.rainbow,
                                                          sleep: f.sleepT > 0, sleepT: f.sleepT || 0, zc: f.zc || 0 })); },
  findSpot(k) {
    for (let r = 1; r < 24; r++) for (let gy = CYG - r; gy <= CYG + r; gy++) for (let gx = CX - r; gx <= CX + r; gx++)
      if (validAt(k, gx, gy)) return { gx, gy };

  },
  place(k, gx, gy) { return placeBuilding(k, gx, gy); },
  tick(n) { for (let i = 0; i < (n || 1); i++) economyTick(); },
  fastRocket() { if (rocketSeq) { rocketSeq.phase = 'lift'; rocketSeq.t = 3.3; rocketSeq.n = 0; } },
  fastBanner() { if (banners.length) banners[0].t = banners[0].dur; },
  save() { saveGame(); },
  /* ── v2 hooks ── */
  forceDisaster(type) { if (!disaster) return startDisaster(type); return false; },
  forceGift(g) { forcedGift = g; },
  landCount() { let n = 0; for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++) if (isLand(gx, gy)) n++; return n; },
  removeCampfire() { const c = buildings.find(b => b.k === 'campfire'); return c ? removeBuilding(c) : false; },
  fastDisaster() { for (let i = 0; i < 400 && disaster; i++) updateDisaster(0.1); },
  fastGate() { for (let i = 0; i < 400 && gateSeq; i++) updateGate(0.1); },
  robotTo(x, y, i) { const r = robots[i || 0]; if (r) { r.x = x; r.y = y; r.targ = null; r.seekT = 0; } },
  gotoRubble() {
    const b = buildings.find(b2 => b2.rubble);
    if (b && players[0]) {
      const s = B[b.k].size || 1;
      players[0].x = tX(b.gx) + s * 16; players[0].y = tY(b.gy) + s * 16 + 20;
      players[0].target = null;
    }
  },
  fireworks() {
    for (let n = 0; n < 3; n++) {
      const { x: fx, y: fy } = fwSpot();
      const spr = SPR.fw[(Math.random() * SPR.fw.length) | 0];
      for (let i = 0; i < 9; i++) {
        const a = i / 9 * 6.28, sp = 60 + Math.random() * 60;
        spawnP(fx, fy, spr, { vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 30, life: 1.1 });
      }
    }
  },
  /* ── v3 hooks ── */
  teleport(pi, x, y) {
    const p = players[pi || 0];
    if (p) { p.x = x; p.y = y; p.target = null; }
  },
  setBoat(pi, v) { const p = players[pi || 0]; if (p) p.boat = !!v; },
  snapCam() { updateCamera(0, true); },
  gotoSeaport() {
    const sp = buildings.find(b => b.k === 'seaport' && !b.rubble);
    if (sp && players[0]) { players[0].x = tX(sp.gx) + 16; players[0].y = tY(sp.gy) + 44; players[0].target = null; }

  },
  findSettleSpot() {
    for (let gy = 7; gy < GH - 7; gy++) for (let gx = 7; gx < GW - 7; gx++) {
      if (!isWater(gx, gy)) continue;
      let clear = true;
      chk: for (let dy = -9; dy <= 9; dy++) for (let dx = -9; dx <= 9; dx++) {
        const x2 = gx + dx, y2 = gy + dy;
        if (x2 >= 0 && y2 >= 0 && x2 < GW && y2 < GH && landAge[y2][x2] > 0) { clear = false; break chk; }

      if (clear) return { gx, gy, x: tX(gx) + 16, y: tY(gy) + 16 };
    }
    return null;
  },
  settleAt(gx, gy) {
    const p = players[0];
    if (!p) return false;
    p.boat = true; p.x = tX(gx) + 16; p.y = tY(gy) + 16; p.mode = 'settle'; p.target = null;

  settleCost() { return settleCost(); },

      const id = isleIdAt(il.gx, il.gy);

      for (let gy = 0; gy < GH; gy++) for (let gx = 0; gx < GW; gx++)
        if (landAge[gy][gx] > 0 && isleId[gy][gx] === id) tiles++;
      return { gx: il.gx, gy: il.gy, steps: il.steps, tiles };
    });
  },
  pipeIslands() {                                // v5a re-point: over WIRES now
    return wires.map(w => [isleIdAt(w.g0[0], w.g0[1]), isleIdAt(w.g1[0], w.g1[1])]);
  },
  crateAt(gx, gy) { crate = { gx, gy, t: 0, opening: 0 }; return true; },

    if (!isLand(gx, gy) || occ[gy][gx] || floraAt(gx, gy)) return false;

  },
  /* ── v4d hooks ── */

    const f = floraAt(gx, gy);
    if (f) { harvestFlora(f, tX(gx) + 16, tY(gy) + 30); return true; }
    const b = occ[gy] && occ[gy][gx];

  burst(x, y) { burstAt(x, y); return lastImpact; },   // the cannon-repair path, sans ballistics
  windSleep(sec) {                               // fast-forward nap timers (wake path included)
    let n = 0;
    for (const f of flora) if (f.sleepT > 0) { n++; f.sleepT -= sec; if (f.sleepT <= 0) wakeFlora(f); }

  addRobot(x, y, gold) { spawnRobot(x, y, gold); return robots.length; },
  robotsInfo() {
    return robots.map(r => ({ x: Math.round(r.x), y: Math.round(r.y), gold: !!r.gold,
      targ: r.targ ? (r.targ.k ? { b: r.targ.k, gx: r.targ.gx, gy: r.targ.gy }

  raiseLand(gx, gy) {                            // raise one tile through the growth pipeline

  cannonTuning() { return { gs: CAN_GS.slice(), hv: CAN_HV.slice(), g: CAN_G }; },
  lastImpact() { return lastImpact; },
  resetWarn() {
    if (disaster && disaster.phase === 'warn') { disaster.t = 0; return true; }
    return false;
  },
  /* ── v4a hooks ── */
  colonies() {
    return settled.map(il => ({ gx: il.gx, gy: il.gy, steps: il.steps, lvl: il.lvl,
                                spec: il.spec, name: il.name,
                                camp: !occ[il.gy][il.gx],
                                check: colonyChecklist(il) }));
  },
  isleAt(gx, gy) { return isleIdAt(gx, gy); },
  canPlace(k, gx, gy) { return validAt(k, gx, gy) && canAfford(B[k].cost); },
  calm(n) { disasterT = n; },
  info() {
    const items = players[0] && players[0].mode === 'menu' ? stripItems(players[0]) : null;
    const sel = items ? items[clamp(players[0].menuI, 0, items.length - 1)] : null;
    return {
      scene, age, pop, hungry, paused, statsOpen, legends, rocketDone,
      res: Object.assign({}, res), rates: Object.assign({}, rates),
      powerInc, powerDem, islandPowered,
      buildings: buildings.map(b => b.k), pipes: wires.length,   // v5a: wires now
      players: players.length,
      mode: players[0] ? players[0].mode : null,
      p2mode: players[1] ? players[1].mode : null,
      modal: !!modal, banner: banners.length ? banners[0].title : null,
      crate: !!crate, robots: robots.length, drake: drakes.length > 0, drakes: drakes.length, egg: !!egg,
      rocket: rocketSeq ? rocketSeq.phase : null,
      slotSel, nameBuf: nameSt ? nameSt.name : null,
      p1: players[0] ? { x: players[0].x, y: players[0].y, boat: !!players[0].boat, moor: !!players[0].moor,
                         moorX: players[0].moor ? players[0].moor.x : 0, moorY: players[0].moor ? players[0].moor.y : 0 } : null,
      p2: players[1] ? { x: players[1].x, y: players[1].y, boat: !!players[1].boat, moor: !!players[1].moor } : null,
      /* v3 */
      cam: { x: camX, y: camY },
      world: { w: WORLD_W, h: WORLD_H },
      islands: settled.length,
      islandList: settled.map(il => ({ gx: il.gx, gy: il.gy, steps: il.steps })),
      seaports: cnt('seaport'),
      /* v4a */
      colonies: settled.map(il => ({ name: il.name, spec: il.spec, lvl: il.lvl, steps: il.steps })),
      focusColony: (() => {
        for (const p of players) { const il = playerColony(p); if (il) return il.name; }
        return null;
      })(),
      ferries: ferries.length,
      ferryXY: ferries.map(f => ({ x: Math.round(f.x), y: Math.round(f.y) })),
      goldCount: buildings.filter(b => b.gold).length,
      arrows: edgeArrows.filter(a => a.on).map(a => ({ type: a.type, x: a.x, y: a.y })),
      minimap: statsOpen ? { x: W / 2 - 480 + 636, y: 80 + 150, w: 276, h: 158 } : null,
      buildingsXY: buildings.map(b => [b.k, b.gx, b.gy]),
      /* v2 */
      battCharge, battCap,
      stars, goalI, goalText: goalI < GOALS.length ? GOALS[goalI].t : null,
      goalCount: GOALS.length, cratesOpened, rubbleFixed,
      islandName, capPop: capPop(),
      disaster: disaster ? { type: disaster.type, phase: disaster.phase,
                             targets: disaster.targets.map(t => ({ gx: t.b.gx, gy: t.b.gy, x: t.x, y: t.y,
                                                                   done: t.done, defended: !!t.defended })) } : null,
      /* v4c */
      meteorsBlocked,
      ballsLive: balls.filter(b => b.on).length,
      impact: lastImpact,
      rubble: buildings.filter(b => b.rubble).map(b => ({ k: b.k, gx: b.gx, gy: b.gy, repair: b.repair || 0, packed: !!b.packed })),
      /* v4d */
      costPill: pillRect && T - pillT < 0.5 ? Object.assign({}, pillRect) : null,
      moorE: players[0] && players[0].moorE ? { x: players[0].moorE.x, y: players[0].moorE.y } : null,
      /* v4b */
      wld: world,
      moon: { bought: moonRocketBought, arrived: moonArrived, returned: moonReturnDone, fueled: returnFueled },
      travel: travel ? { phase: travel.phase, dir: travel.dir, n: travel.n } : null,
      aboard: players.map(p => !!p.aboard),
      boardZone: !!boardingPad(),
      moonStage: moonStage(),
      otherBuildings: otherWorld ? otherWorld.buildings.map(b => b.k) : [],
      allBuildings: allB().map(b => b.k),
      life: Object.assign({}, life),
      camFollow: camFollowing(),
      gate: gateSeq ? gateSeq.phase : null,
      pauseOpts: paused ? pauseOptions() : null,
      confirmPrestige: confirmPrestige ? { yes: confirmPrestige.yes } : null,
      menuKey: sel ? (sel.k || (sel.rocket && 'rocket') || (sel.moonrocket && 'moonrocket') || (sel.remove && 'remove') || null) : null,
      p2menuKey: (() => {
        const p = players[1];
        if (!p || p.mode !== 'menu') return null;
        const it = stripItems(p), s2 = it[clamp(p.menuI, 0, it.length - 1)];
        return s2 ? (s2.k || (s2.rocket && 'rocket') || (s2.moonrocket && 'moonrocket') || (s2.remove && 'remove') || null) : null;
      })(),
      /* v5a */
      wires: wires.length,
      poles: cnt('pole'),
      plugged: buildings.filter(b => b.idle === 'plug').map(b => [b.k, b.gx, b.gy]),
      lowPower: buildings.filter(b => b.idle === 'power').map(b => [b.k, b.gx, b.gy]),
      conn: buildings.filter(b => B[b.k].needPower).map(b => [b.k, b.gx, b.gy, !!b.conn]),
      strip: players[0] ? players[0].strip : null,
      p2strip: players[1] ? players[1].strip : null,
      stripSection: (() => {
        const p = players[0];
        if (!p || p.mode !== 'menu') return -1;
        const it = stripItems(p), secs = stripSections(it);
        let cur = 0;
        for (let i = 0; i < secs.length; i++) if (secs[i] <= p.menuI) cur = i;
        return cur;
      })(),
      decorCount: decor.length,
      decorList: decor.map(t => [t.k, t.gx, t.gy]),
      pathsLaid, goldenPlaced,
      /* v5b */
      interior: interior ? { kind: interior.kind, gx: interior.b.gx, gy: interior.b.gy } : null,
      inside: players.map(p => !!p.inside),
      insideCount, residentsGreeted, catPets, cookieDay,
      slot: curSlot,
      floatsLive: floats.filter(f => f.on).map(f => f.str),
      nearDoor: players[0] && !players[0].inside ? !!nearDoorB(players[0]) : false,
    };
  },
  /* ── v5a hooks ── */
  decorPlace(k, gx, gy) { return placeDecor(k, gx, gy); },
  decorRemove(gx, gy) { const it = decorAt(gx, gy); return it ? removeDecor(it) : false; },
  decorInfo() { return decor.map(t => ({ k: t.k, gx: t.gx, gy: t.gy,
    mask: (D[t.k].path || D[t.k].conn) ? decorMask(t) : -1 })); },
  wireUp() {                                     // migration-style auto-poling, both worlds
    const a = autoWirePoles();
    const b2 = inWorld(world === 'earth' ? 'moon' : 'earth', autoWirePoles);
    return a + b2;
  },
  gridInfo() {
    return { wires: wires.length, poles: cnt('pole'),
             plugged: buildings.filter(b => b.idle === 'plug').length,
             conn: buildings.filter(b => B[b.k].needPower && b.conn).length };
  },
  /* ── v5b hooks — walkable interiors ── */
  enterHouse(gx, gy, pi) {                       // teleport to the door + enter through the player path
    const p = players[pi || 0];
    const b2 = occ[gy] && occ[gy][gx];
    if (!p || !b2 || !ENTERABLE[b2.k]) return false;
    const s = B[b2.k].size || 1;
    p.x = tX(b2.gx) + s * 16; p.y = tY(b2.gy) + s * 32 + 12;
    p.target = null; p.boat = false;
    return enterInterior(p, b2) ? interior.kind : false;
  },
  firstCabin() {
    const b = firstHomeCabin();
    return b ? { gx: b.gx, gy: b.gy } : null;
  },
  interiorInfo() {
    if (!interior) return null;
    return { kind: interior.kind, panel: { x: IPX, y: IPY, w: IPW, h: IPH },
             door: Object.assign({}, interior.door),
             solids: interior.solids.map(s => Object.assign({}, s)),
             spots: interior.spots.length,
             cat: interior.cat ? { x: interior.cat.x, y: interior.cat.y } : null,
             hearts: interior.hearts.filter(h => h.on).length,
             residents: interior.residents.map(r => ({ name: r.name, x: Math.round(r.x), y: Math.round(r.y),
               baker: !!r.baker, greeted: !!r.greeted, say: r.sayT > 0 ? r.say : null })),
             players: players.map(p => p.inside ? { x: Math.round(p.ix), y: Math.round(p.iy) } : null) };
  },
  teleInside(pi, x, y) {
    const p = players[pi || 0];
    if (!p || !p.inside) return false;
    p.ix = x; p.iy = y; p.itarget = null;
    return true;
  },
  talkToName(name, pi) {                         // stand by the named resident and say hi
    const p = players[pi || 0];
    if (!p || !p.inside || !interior) return null;
    const r = interior.residents.find(r2 => r2.name === name) || interior.residents[0];
    if (!r) return null;
    p.ix = clamp(r.x + 8, 42, IPW - 42); p.iy = clamp(r.y + 20, IWALL + 16, IPH - 22); p.itarget = null;
    return talkToResident(p, r);
  },
  petTheCat(pi) {
    const p = players[pi || 0];
    if (!p || !p.inside || !interior || !interior.cat) return -1;
    p.ix = interior.cat.x; p.iy = clamp(interior.cat.y + 24, IWALL + 16, IPH - 22);
    interactInside(p);
    return catPets;
  },
  exitHouse(pi) {
    const p = players[pi || 0];
    if (!p || !p.inside) return false;
    exitInterior(p);
    return true;
  },
  events() { return recentEvents.map(e => e.k); },
  addEvent(k) { pushEvent(k); return recentEvents.length; },
  setCookieDay(v) { cookieDay = v || ''; },
  roomBlocked(x, y) { return interior ? iBlocked(x, y) : null; },
};

/* ───── boot ───── */
initSprites();
initDecorSprites();                             // v5a: paths, garden, showpieces, gold
initInteriorSprites();                          // v5b: residents, the cat, speech bubbles
extraSprites();
otherWorld = mkMoonBundle();                    // the moon bundle waits in the wings
loadSlotSummaries();
document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
addEventListener('pagehide', () => saveGame());
requestAnimationFrame(loop);
</script>
</body>
</html>
